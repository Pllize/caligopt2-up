<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Caligo Pt.2 드볼관리기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0e1018;--s2:#13161f;--s3:#191d28;
  --bd:#1f2535;--bd2:#2a3347;
  --tx:#e8edf8;--tx2:#7a8fb0;--tx3:#384560;
  --blue:#4f8aff;--purple:#8b5cf6;
  --want:#f43f5e;--want-g:rgba(244,63,94,.12);--want-bd:rgba(244,63,94,.3);
  --have:#3b82f6;--have-g:rgba(59,130,246,.12);--have-bd:rgba(59,130,246,.3);
  --ok:#22c55e;--warn:#f59e0b;
  --r:12px;--r-sm:8px;
}
[data-theme="light"]{
  --bg:#f0f2f9;--s1:#fff;--s2:#f4f6ff;--s3:#e8ecf7;
  --bd:#d4daf0;--bd2:#b8c2de;--tx:#141830;--tx2:#5a6a90;--tx3:#a0aecb;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;overflow:hidden;height:100svh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,textarea{font-family:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-sm);outline:none}
input:focus,textarea:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100svh}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50}
.logo-wrap{flex-shrink:0;display:flex;align-items:baseline;gap:7px}
.logo-main{font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;letter-spacing:-.3px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;color:var(--tx2)}
.hdr-r{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.abtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);background:var(--s2);border:1px solid var(--bd);font-size:14px}

/* TABS */
.dtabs{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;display:none;flex-shrink:0}
.dtab{padding:9px 14px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Outfit',sans-serif}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);display:none}
.bnav-inner{display:flex;height:52px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:9px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;transition:color .15s}
.btab.on{color:var(--blue)}
.btab-ico{font-size:18px;line-height:1}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px calc(60px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch}
@media(min-width:641px){.dtabs{display:flex}.bnav{display:none!important}.main{padding:12px}}
@media(max-width:640px){.dtabs{display:none}.bnav{display:block}}

/* TOP TOOLBAR */
.toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px;padding:6px 8px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r)}

/* TOGGLE BUTTONS — single state cycling */
.tog-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--bd);color:var(--tx2);background:var(--s2);cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;transition:all .14s;flex-shrink:0}
.tog-btn.active{background:var(--s3);border-color:var(--blue);color:var(--blue)}
.tog-btn.filter-active{background:linear-gradient(135deg,var(--blue)22,var(--purple)22);border-color:var(--blue);color:var(--blue)}
.tsep{width:1px;height:18px;background:var(--bd);flex-shrink:0;margin:0 2px}
.tog-spacer{flex:1}

/* SECTION */
.sets-wrap{display:grid;gap:6px;align-items:start}
.sec-block{border-radius:var(--r);background:var(--s1);border:1px solid var(--bd);overflow:hidden;min-width:0}
.sec-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;user-select:none;transition:background .12s}
.sec-hdr:hover{background:var(--s2)}
.sec-atag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;color:#fff;flex-shrink:0}
.sec-name{font-size:11px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-pw{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sec-pct{font-size:9px;font-weight:700;color:var(--tx2);font-family:'Outfit',sans-serif}
.sec-pb{width:28px;height:2px;background:var(--bd);border-radius:2px;overflow:hidden}
.sec-pbf{height:100%;border-radius:2px;transition:width .4s}
.chev{font-size:10px;color:var(--tx3);transition:transform .22s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.sec-body{padding:6px 7px 8px}

/* CARD GRID */
.pcg{display:grid;gap:4px}

/* CARD TILE */
.pct{border-radius:7px;overflow:hidden;background:var(--s2);border:1px solid var(--bd);transition:border-color .2s,box-shadow .2s;user-select:none;display:flex;flex-direction:column;position:relative}
.pct.ng{opacity:.4}
.pct.sc{border-color:rgba(244,63,94,.5)}
.pct.sm{border-color:rgba(34,197,94,.6);box-shadow:0 0 6px rgba(34,197,94,.15)}
.pct.sh{border-color:rgba(59,130,246,.6);box-shadow:0 0 6px rgba(59,130,246,.15)}
.pci{aspect-ratio:5/7;position:relative;overflow:hidden;cursor:pointer;background:var(--s3)}
.pci img{width:100%;height:100%;object-fit:cover;display:block}
.pcph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--tx3);text-align:center;padding:2px}
.pbdg{position:absolute;top:3px;right:3px;border-radius:4px;font-size:7px;font-weight:800;padding:1px 3px;line-height:1.4;font-family:'Outfit',monospace}
.pbdg.w{background:rgba(244,63,94,.85);color:#fff}
.pcf{padding:4px 5px;display:flex;align-items:center;justify-content:space-between;gap:2px;flex-shrink:0}
.pclbl{font-size:8px;font-weight:700;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%;flex-shrink:1}
.pcc{display:flex;align-items:center;gap:2px;flex-shrink:0}
.pcbtn{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:11px;font-weight:700;border:1px solid var(--bd);color:var(--tx2);background:var(--s3);line-height:1}
.pcbtn:active{transform:scale(.9)}
.pcnum{min-width:18px;text-align:center;font-size:10px;font-weight:800;color:var(--tx);font-family:'Outfit',sans-serif}
.pcgoal{font-size:8px;font-weight:700;color:var(--tx3);font-family:'Outfit',sans-serif}

/* OVERLAY sheets */
.ov{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:auto}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}
.sheet{position:relative;width:100%;max-width:520px;margin:0 auto;background:var(--s1);border-radius:20px 20px 0 0;border-top:1px solid var(--bd);padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s}
.ov.open .sheet{transform:translateY(0)}
.sh-bar{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 14px}
.sh-ttl{font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;margin-bottom:12px}

/* FULLSCREEN OVERLAY */
.fs-ov{position:fixed;inset:0;z-index:400;background:rgba(8,9,15,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.fs-ov.open{opacity:1;pointer-events:auto}
.fs-img-wrap{width:min(220px,60vw);flex-shrink:0;margin-bottom:12px}
.fsimg{width:100%;border-radius:10px;display:block}
.fsph{width:100%;aspect-ratio:5/7;display:flex;align-items:center;justify-content:center;background:var(--s2);border-radius:10px;font-size:28px}
.fs-name{font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;text-align:center}
.fs-meta{font-size:11px;color:var(--tx2);text-align:center;margin-top:2px;margin-bottom:10px}
.fs-chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;min-height:24px}
.fs-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:8px}
.fs-lbl{font-size:11px;color:var(--tx2);min-width:60px;text-align:right}
.fs-val{font-family:'Outfit',sans-serif;font-weight:800;font-size:22px;min-width:40px;text-align:center}
.fs-adj{display:flex;align-items:center;background:var(--s2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.fs-adj button{padding:8px 18px;font-size:18px;font-weight:800;color:var(--tx);font-family:'Outfit',sans-serif}
.fs-close{position:absolute;top:16px;right:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--s2);border:1px solid var(--bd);font-size:16px}

/* FILTER PANEL */
.filt-section{margin-bottom:12px}
.filt-label{font-size:10px;font-weight:700;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-family:'Outfit',sans-serif}
.filt-chips{display:flex;flex-wrap:wrap;gap:5px}
.fchip{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;transition:all .12s;font-family:'Outfit',sans-serif}
.fchip.on{background:var(--s3);border-color:var(--blue);color:var(--blue)}
.fchip.on-all{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:#fff}

/* SETTINGS BUTTONS */
.btn{padding:9px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .14s}
.btn-p{background:var(--blue);color:#fff;border:none}
.btn-s{background:var(--s2);color:var(--tx2);border:1px solid var(--bd)}
.btn-d{background:rgba(244,63,94,.12);color:var(--want);border:1px solid rgba(244,63,94,.3)}
.btn-sm{padding:8px 14px;font-size:11px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.set-item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--s2);border-radius:var(--r-sm);border:1px solid var(--bd);margin-bottom:6px}
.set-lbl{font-size:12px;font-weight:600}
.set-sub{font-size:10px;color:var(--tx2);margin-top:1px}

/* TRADE TAB */
.trade-section{margin-bottom:14px}
.trade-ttl{font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.trade-empty{padding:20px;text-align:center;color:var(--tx2);font-size:12px;background:var(--s2);border-radius:var(--r);border:1px solid var(--bd)}

/* GOAL TAB */
.goal-alb{margin-bottom:14px}
.goal-alb-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.goal-alb-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;color:#fff}
.goal-alb-name{font-weight:700;font-size:13px}
.goal-set{margin-bottom:10px}
.goal-set-name{font-size:10px;color:var(--tx2);font-weight:600;margin-bottom:5px}
.goal-card-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--s2);border-radius:8px;border:1px solid var(--bd);margin-bottom:4px}
.goal-thumb{width:28px;height:40px;border-radius:5px;overflow:hidden;background:var(--s3);flex-shrink:0}
.goal-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.goal-name{flex:1;font-size:11px;font-weight:600}
.goal-adj{display:flex;align-items:center;background:var(--s3);border:1px solid var(--bd);border-radius:10px;overflow:hidden;flex-shrink:0}
.goal-adj button{padding:4px 12px;font-size:14px;font-weight:800;color:var(--tx);font-family:'Outfit',sans-serif}
.goal-adj-num{font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;min-width:28px;text-align:center}

/* SUMMARY STATS */
.stats-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.stat-chip{padding:5px 10px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r-sm);font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;flex-shrink:0}
.stat-chip span{color:var(--blue);font-size:13px}

/* TOAST */
#tw{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0px) + 8px);left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:5px}
.toast{background:var(--tx);color:var(--bg);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;animation:tin .2s,tout .3s 1.8s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0}}

/* SHOT AREA */
#shot-area{position:fixed;left:-9999px;top:0;min-width:360px}

/* SCROLL TOP */
.scroll-top-btn{position:fixed;right:12px;bottom:calc(60px + env(safe-area-inset-bottom,0px) + 12px);width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;border:none;opacity:0;pointer-events:none;transition:opacity .2s;z-index:200;box-shadow:0 2px 10px rgba(79,138,255,.3)}
.scroll-top-btn.vis{opacity:1;pointer-events:auto}

/* USAGE TAB */
.use-sec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.use-sec h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;margin-bottom:8px;color:var(--blue)}
.use-sec p{font-size:12px;line-height:1.7;color:var(--tx2)}
.use-sec ul{padding-left:14px;font-size:12px;line-height:2;color:var(--tx2)}

/* Wizard chips */
.wiz-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--bd);color:var(--tx2);background:var(--s2);cursor:pointer;transition:all .14s;font-family:'Outfit',sans-serif}

/* Notice */
.notice-body{font-size:12px;line-height:1.8;color:var(--tx2);white-space:pre-wrap;max-height:300px;overflow-y:auto;padding:10px;background:var(--s2);border-radius:var(--r-sm);border:1px solid var(--bd)}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="logo-wrap">
      <span class="logo-main">Caligo Pt.2</span>
      <span class="logo-sub">드볼관리기</span>
    </div>
    <div class="hdr-r">
      <button class="abtn" id="theme-btn" onclick="toggleTheme()" title="테마">🌙</button>
      <button class="abtn" onclick="showSettings()" title="설정">⚙️</button>
    </div>
  </div>

  <!-- DESKTOP TABS -->
  <div class="dtabs" id="dtabs"></div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div id="page-content"></div>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <div class="bnav"><div class="bnav-inner" id="bnav"></div></div>
</div>

<!-- SCROLL TOP -->
<button class="scroll-top-btn" id="scroll-top-btn" onclick="document.getElementById('main').scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- FULLSCREEN OVERLAY -->
<div class="fs-ov" id="fsov">
  <button class="fs-close" onclick="closeFull()">✕</button>
  <div class="fs-img-wrap"><div id="fs-img"></div></div>
  <div class="fs-name" id="fs-name"></div>
  <div class="fs-meta" id="fs-meta"></div>
  <div class="fs-chips" id="fs-chips"></div>
  <div class="fs-row">
    <span class="fs-lbl">수집</span>
    <div class="fs-adj">
      <button onclick="fsAdj(-1)">−</button>
      <span class="fs-val" id="fs-coll">0</span>
      <button onclick="fsAdj(+1)">+</button>
    </div>
  </div>
  <div class="fs-row">
    <span class="fs-lbl">목표</span>
    <div class="fs-adj">
      <button onclick="fsGoal(-1)">−</button>
      <span class="fs-val" id="fs-goal">0</span>
      <button onclick="fsGoal(+1)">+</button>
    </div>
  </div>
  <div style="margin-top:8px;padding:0 16px;width:100%;max-width:400px">
    <button id="fs-hide-btn" onclick="toggleHide()" style="display:none"></button>
    <textarea id="fs-memo" placeholder="메모..." rows="2" style="width:100%;margin-top:6px;padding:7px;font-size:12px;resize:none;border-radius:var(--r-sm)" oninput="saveMemo()"></textarea>
  </div>
</div>

<!-- FILTER PANEL OVERLAY -->
<div class="ov" id="filt-ov">
  <div class="ov-bg" onclick="closeSheet('filt-ov')"></div>
  <div class="sheet">
    <div class="sh-bar"></div>
    <div class="sh-ttl">🔍 필터 설정</div>
    <div id="filt-body"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-s btn-sm" onclick="resetFilters()" style="flex:1">초기화</button>
      <button class="btn btn-p btn-sm" onclick="applyFilters()" style="flex:2">적용하기</button>
    </div>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="ov" id="set-ov">
  <div class="ov-bg" onclick="closeSheet('set-ov')"></div>
  <div class="sheet">
    <div class="sh-bar"></div>
    <div class="sh-ttl">⚙️ 설정</div>
    <div class="set-item">
      <div><div class="set-lbl">백업 내보내기</div><div class="set-sub">수집·목표 데이터를 JSON으로 저장</div></div>
      <button class="btn btn-s btn-sm" onclick="exportState()">저장</button>
    </div>
    <div class="set-item">
      <div><div class="set-lbl">백업 불러오기</div><div class="set-sub">JSON 파일에서 데이터 복원</div></div>
      <button class="btn btn-s btn-sm" onclick="document.getElementById('import-inp').click()">불러오기</button>
      <input type="file" id="import-inp" accept=".json" onchange="importState(this)" style="display:none">
    </div>
    <div class="set-item">
      <div><div class="set-lbl">목표 일괄 설정</div><div class="set-sub">마법사로 빠르게 목표 설정</div></div>
      <button class="btn btn-p btn-sm" onclick="closeSheet('set-ov');showWizard()">마법사</button>
    </div>
    <div class="set-item" style="border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.05)">
      <div><div class="set-lbl" style="color:var(--want)">초기화</div><div class="set-sub">모든 수집·목표·메모 삭제</div></div>
      <button class="btn btn-d btn-sm" onclick="resetState()">초기화</button>
    </div>
  </div>
</div>

<!-- WIZARD OVERLAY -->
<div class="ov" id="wiz-ov">
  <div class="ov-bg" onclick="closeSheet('wiz-ov')"></div>
  <div class="sheet">
    <div class="sh-bar"></div>
    <div class="sh-ttl" id="wiz-ttl">🎯 목표 설정 마법사</div>
    <div id="wiz-body"></div>
    <div id="wiz-foot" style="display:flex;gap:8px;margin-top:14px"></div>
  </div>
</div>

<!-- SCREENSHOT AREA -->
<div id="shot-area"></div>

<!-- TOAST WRAPPER -->
<div id="tw"></div>

<script>
/* ══════════════════════════════════
   STATE & DB
══════════════════════════════════ */
let DB = null;
let ST = {goals:{},collected:{},memos:{},hidden:{}};
let UI = {
  tab:'collect',
  theme:'dark',
  col:{},  // collapsed sections: {sectionKey: true}
  // Filter state
  flt_cardType:[],  // [] = all
  flt_member:[],
  flt_unit:[],
  flt_mmmm:[],
  flt_album:[],     // album ids
  // Card visibility toggle: 'all' | 'have' | 'nothave'
  cardVis:'all',
  // Collapse state: 'mixed' | 'expanded' | 'collapsed'
  collapseAll: false,
  noticeVer:0
};
let fsId = null;
let wiz = {};

const TABS = [
  {id:'collect',label:'수집',ico:'📦'},
  {id:'trade',label:'교환',ico:'🔄'},
  {id:'goals',label:'목표',ico:'🎯'},
  {id:'usage',label:'사용법',ico:'📖'},
];
const MEMBERS = ['예준','노아','밤비','은호','하민'];
const CARD_TYPES = ['Individual','Unit','All','MMMM'];
const UNITS = ['맛탕즈','베리즈','댕댕즈','예라인','쁜라인','노라인','냥냥즈','야타즈','댄라즈','댕냥즈'];
const MMMS = ['몌무','뫄','미므','므모','먀미'];

/* ══ STORAGE ══ */
function saveST(){try{localStorage.setItem('poca_st',JSON.stringify(ST));}catch(e){}}
function saveUI(){try{localStorage.setItem('poca_ui',JSON.stringify(UI));}catch(e){}}
function saveDB(){try{if(DB)localStorage.setItem('poca_db',JSON.stringify(DB));}catch(e){}}
function loadST(){try{const d=localStorage.getItem('poca_st');if(d){ST=JSON.parse(d);ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};}}catch(e){}}
function loadUI(){try{const d=localStorage.getItem('poca_ui');if(d){const u=JSON.parse(d);UI={...UI,...u};}}catch(e){}}
function loadDB(){
  try{
    const d=localStorage.getItem('poca_db');
    if(d){DB=JSON.parse(d);return;}
  }catch(e){}
  // Use inline DB (will be replaced by fetch)
  DB=null;
}

/* ══ HELPERS ══ */
const g = id => (ST.goals[id]||0);
const c = id => (ST.collected[id]||0);
const mo = id => (ST.memos[id]||'');
const hid = id => !!(ST.hidden[id]);
// spare = collected - goal (if goal>0, spare = c-g; if no goal, spare = c)
const sp = id => { const cv=c(id),gv=g(id); return gv>0?Math.max(0,cv-gv):cv; };
const wt = id => { const cv=c(id),gv=g(id); return gv>0?Math.max(0,gv-cv):0; };
const sts = id => { // 'c'=want, 'm'=met, 'h'=have-spare, 'n'=none
  const cv=c(id),gv=g(id);
  if(gv>0&&cv<gv)return'c';
  if(gv>0&&cv>=gv&&cv>gv)return'h';
  if(gv>0&&cv===gv)return'm';
  if(cv>0)return'h';
  return'n';
};
function setGoal(id,v){if(v<0)v=0;if(v===0)delete ST.goals[id];else ST.goals[id]=v;saveST();}
function allCards(){
  if(!DB)return[];
  const r=[];
  for(const alb of DB.albumTypes)
    for(const set of alb.sets)
      for(const card of set.cards)
        r.push({...card,aId:alb.id,sId:set.id});
  return r;
}
function findCard(id){
  if(!DB)return null;
  for(const alb of DB.albumTypes)
    for(const set of alb.sets)
      for(const card of set.cards)
        if(card.id===id)return{card,alb,set};
  return null;
}
function isLS(){return window.innerWidth>window.innerHeight;}

/* ══ FILTER LOGIC ══ */
function filterCard(card){
  const {flt_cardType,flt_member,flt_unit,flt_mmmm} = UI;
  if(flt_cardType.length){if(!flt_cardType.includes(card.cardType))return false;}
  if(flt_member.length&&card.cardType==='Individual'){if(!flt_member.includes(card.member))return false;}
  if(flt_unit.length&&card.cardType==='Unit'){if(!flt_unit.includes(card.unit))return false;}
  if(flt_mmmm.length&&card.cardType==='MMMM'){if(!flt_mmmm.includes(card.mmmm))return false;}
  return true;
}
function filterAlbum(albId){
  const {flt_album} = UI;
  if(!flt_album.length)return true;
  return flt_album.includes(albId);
}
function hasActiveFilter(){
  return UI.flt_cardType.length||UI.flt_member.length||UI.flt_unit.length||UI.flt_mmmm.length||UI.flt_album.length;
}
function resetFilters(){
  UI.flt_cardType=[];UI.flt_member=[];UI.flt_unit=[];UI.flt_mmmm=[];UI.flt_album=[];
  saveUI();renderFilterPanel();
}
function applyFilters(){
  // read from panel checkboxes
  ['flt_cardType','flt_member','flt_unit','flt_mmmm','flt_album'].forEach(key=>{
    const boxes=document.querySelectorAll(`[data-fk="${key}"]`);
    UI[key]=[];
    boxes.forEach(b=>{if(b.classList.contains('on'))UI[key].push(b.dataset.fv);});
  });
  saveUI();
  closeSheet('filt-ov');
  renderCur();
}

/* ══ VISIBILITY TOGGLE ══ */
function cycleCardVis(){
  if(UI.cardVis==='all')UI.cardVis='have';
  else if(UI.cardVis==='have')UI.cardVis='nothave';
  else UI.cardVis='all';
  saveUI();renderCur();
}
function visLabel(){
  if(UI.cardVis==='have')return'✨ 있는것';
  if(UI.cardVis==='nothave')return'🔍 없는것';
  return'👁 전체';
}
function cardVisFilter(card){
  if(UI.cardVis==='have')return c(card.id)>0;
  if(UI.cardVis==='nothave')return c(card.id)===0;
  return true;
}

/* ══ COLLAPSE TOGGLE ══ */
function toggleCollapseAll(){

}
function collapseLabel(){

}
function isSectionOpen(key){

/* ── COLLECT ── */
function renderCollect(){
  const all=allCards();
  const totalCards=all.length;
  const haveCards=all.filter(c2=>c(c2.id)>0).length;
  const goalCards=all.filter(c2=>g(c2.id)>0).length;
  const metCards=all.filter(c2=>g(c2.id)>0&&c(c2.id)>=g(c2.id)).length;

  let html=`<div class="stats-bar">
    <div class="stat-chip">전체 <span>${totalCards}</span></div>
    <div class="stat-chip">수집 <span>${haveCards}</span></div>
    <div class="stat-chip">목표 <span>${metCards}/${goalCards}</span></div>
  </div>`;

  // Toolbar
  const filtActive=hasActiveFilter();
  html+=`<div class="toolbar">
    <button class="tog-btn${filtActive?' filter-active':''}" onclick="openFilterPanel()">
      🔍 필터${filtActive?' ●':''}
    </button>
    <div class="tsep"></div>
    <button class="tog-btn${UI.cardVis!=='all'?' active':''}" onclick="cycleCardVis()">${visLabel()}</button>
    <div class="tsep"></div>
    <button class="tog-btn" onclick="toggleCollapseAll()">${collapseLabel()}</button>
    <div class="tog-spacer"></div>
    <button class="abtn" onclick="exportCollectScreenshot()" title="스크린샷">📸</button>
  </div>`;

  html+='<div class="sets-wrap">';
  for(const alb of DB.albumTypes){
    if(!filterAlbum(alb.id))continue;
    for(const set of alb.sets){
      let cards=set.cards.filter(c2=>filterCard(c2)&&cardVisFilter(c2));
      if(!cards.length)continue;
      const key=`${alb.id}_${set.id}`;
      const open=isSectionOpen(key);
      const total=set.cards.length;
      const have=set.cards.filter(c2=>c(c2.id)>0).length;
      const pct=total>0?Math.round(have/total*100):0;
      const cols=Math.min(cards.length,5);
      html+=`<div class="sec-block">
        <div class="sec-hdr" onclick="toggleSection('${key}')">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
          <div class="sec-pw">
            <span class="sec-pct">${have}/${total}</span>
            <div class="sec-pb"><div class="sec-pbf" style="width:${pct}%;background:${alb.color}"></div></div>
          </div>
          <span class="chev${open?' open':''}">▼</span>
        </div>`;
      if(open){
        html+=`<div class="sec-body"><div class="pcg" style="grid-template-columns:repeat(${cols},1fr)">`;
        for(const card of cards){
          const cv=c(card.id),gv=g(card.id),st=sts(card.id);
          const cls=st==='c'?'sc':st==='m'?'sm':st==='h'?'sh':'';
          html+=`<div class="pct${cls?' '+cls:''}${cv===0&&gv===0?' ng':''}">
            <div class="pci" onclick="openFull('${card.id}')">
              ${card.img?`<img loading="lazy" src="${card.img}" alt="${card.name}">`:`<div class="pcph">${card.name}</div>`}
              ${wt(card.id)>0?`<div class="pbdg w">−${wt(card.id)}</div>`:''}
            </div>
            <div class="pcf">
              <span class="pclbl">${card.name}</span>
              <div class="pcc">
                <button class="pcbtn" onclick="adj('${card.id}',-1)">−</button>
                <span class="pcnum">${cv}</span>
                <button class="pcbtn" onclick="adj('${card.id}',+1)">+</button>
              </div>
            </div>
          </div>`;
        }
        html+='</div></div>';
      }
      html+='</div>';
    }
  }
  html+='</div>';
  document.getElementById('page-content').innerHTML=html;
}

function adj(id,d){
  ST.collected[id]=Math.max(0,(ST.collected[id]||0)+d);
  saveST();
  const el=document.querySelector(`[onclick="adj('${id}',-1)"]`);
  if(el){
    const num=el.parentNode.querySelector('.pcnum');
    if(num)num.textContent=ST.collected[id];
    const tile=el.closest('.pct');
    if(tile){
      const cv=c(id),gv=g(id),st=sts(id);
      tile.classList.remove('sc','sm','sh');
      if(st==='c')tile.classList.add('sc');
      else if(st==='m')tile.classList.add('sm');
      else if(st==='h')tile.classList.add('sh');
      tile.classList.toggle('ng',cv===0&&gv===0);
    }
  }
  if(d>0){const gv=g(id);if(gv>0&&c(id)===gv)toast('🎉 목표 달성!');}
}

/* ── TRADE ── */
function renderTrade(){
  const all=allCards();
  const wCards=all.filter(x=>wt(x.id)>0);
  const hCards=all.filter(x=>sp(x.id)>0&&!hid(x.id));
  let html='';
  if(!wCards.length&&!hCards.length){
    html='<div class="trade-empty">수집 정보를 입력하면 교환 현황이 자동으로 표시돼요.<br>목표보다 적게 갖고 있으면 🔍 구해요에, 더 많으면 ✨ 있어요에 나타나요.</div>';
  } else {
    if(wCards.length){
      html+=`<div class="trade-section">
        <div class="trade-ttl"><span style="background:rgba(244,63,94,.15);color:var(--want);border:1px solid rgba(244,63,94,.3);padding:3px 10px;border-radius:12px;font-size:12px">🔍 구해요 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</span></div>`;
      html+=buildTradeGrid(wCards,'want');
      html+='</div>';
    }
    if(hCards.length){
      html+=`<div class="trade-section">
        <div class="trade-ttl"><span style="background:rgba(59,130,246,.15);color:var(--have);border:1px solid rgba(59,130,246,.3);padding:3px 10px;border-radius:12px;font-size:12px">✨ 있어요 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</span></div>`;
      html+=buildTradeGrid(hCards,'have');
      html+='</div>';
    }
  }
  if(wCards.length||hCards.length){
    html+=`<div style="margin-top:12px;text-align:center">
      <button class="btn btn-s btn-sm" onclick="exportScreenshot()">📸 교환 스크린샷 저장</button>
    </div>`;
  }
  document.getElementById('page-content').innerHTML=html;
}

function buildTradeGrid(cards,mode){
  if(!DB||!cards.length)return'';
  let h='<div class="sets-wrap">';
  for(const alb of DB.albumTypes){
    const ac=cards.filter(x=>x.aId===alb.id);
    if(!ac.length)continue;
    const sids=[...new Set(ac.map(x=>x.sId))];
    for(const sid of sids){
      const sc=ac.filter(x=>x.sId===sid);
      const set=alb.sets.find(s=>s.id===sid);
      if(!set)continue;
      const cols=Math.min(sc.length,5);
      h+=`<div class="sec-block">
        <div class="sec-hdr" style="cursor:default">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
        </div>
        <div class="sec-body"><div class="pcg" style="grid-template-columns:repeat(${cols},1fr)">`;
      for(const card of sc){
        const cnt=mode==='want'?wt(card.id):sp(card.id);
        const col=mode==='want'?'rgba(244,63,94,.6)':'rgba(59,130,246,.6)';
        const bg=mode==='want'?'var(--want)':'var(--have)';
        h+=`<div class="pct" style="border-color:${col}">
          <div class="pci" onclick="openFull('${card.id}')">
            ${card.img?`<img loading="lazy" src="${card.img}" alt="${card.name}">`:`<div class="pcph">${card.name}</div>`}
          </div>
          <div class="pcf">
            <span class="pclbl">${card.name}</span>
            <span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:11px;color:${bg}">${mode==='want'?'−':'+'}${cnt}</span>
          </div>
        </div>`;
      }
      h+='</div></div></div>';
    }
  }
  h+='</div>';
  return h;
}

  document.getElementById('filt-ov').classList.add('open');
}
function renderFilterPanel(){
  const {flt_cardType,flt_member,flt_unit,flt_mmmm,flt_album}=UI;

  let h='';
  // Album
  h+=`<div class="filt-section">
    <div class="filt-label">앨범</div>
    <div class="filt-chips">`;
  for(const alb of DB.albumTypes){
    const on=flt_album.includes(alb.id);
    h+=`<div class="fchip${on?' on':''}" data-fk="flt_album" data-fv="${alb.id}" onclick="toggleFchip(this)">${alb.shortName}</div>`;
  }
  h+='</div></div>';
  // Card Type
  h+=`<div class="filt-section">
    <div class="filt-label">카드 종류</div>
    <div class="filt-chips">
      ${CARD_TYPES.map(ct=>`<div class="fchip${flt_cardType.includes(ct)?' on':''}" data-fk="flt_cardType" data-fv="${ct}" onclick="toggleFchip(this)">${ct==='Individual'?'개인':ct==='Unit'?'유닛':ct==='All'?'단체':'MMMM'}</div>`).join('')}

  </div>`;

  h+=`<div class="filt-section">
    <div class="filt-label">멤버</div>
    <div class="filt-chips">
      ${MEMBERS.map(m=>`<div class="fchip${flt_member.includes(m)?' on':''}" data-fk="flt_member" data-fv="${m}" onclick="toggleFchip(this)">${m}</div>`).join('')}
    </div>
  </div>`;
  // Unit
  h+=`<div class="filt-section">
    <div class="filt-label">유닛</div>
    <div class="filt-chips">
      ${UNITS.map(u=>`<div class="fchip${flt_unit.includes(u)?' on':''}" data-fk="flt_unit" data-fv="${u}" onclick="toggleFchip(this)">${u}</div>`).join('')}
    </div>
  </div>`;
  // MMMM
  h+=`<div class="filt-section">
    <div class="filt-label">MMMM</div>
    <div class="filt-chips">
      ${MMMS.map(m=>`<div class="fchip${flt_mmmm.includes(m)?' on':''}" data-fk="flt_mmmm" data-fv="${m}" onclick="toggleFchip(this)">${m}</div>`).join('')}
    </div>
  </div>`;
  document.getElementById('filt-body').innerHTML=h;
}
function toggleFchip(el){el.classList.toggle('on');}

/* ══ FULLSCREEN ══ */
function openFull(id){
  const r=findCard(id);if(!r)return;
  fsId=id;const{card,alb,set}=r;
  document.getElementById('fs-img').innerHTML=card.img?`<img class="fsimg" src="${card.img}" alt="${card.name}">`:`<div class="fsph">📷</div>`;
  document.getElementById('fs-name').textContent=card.name;
  document.getElementById('fs-meta').textContent=`${alb.name} · ${set.name}`;
  updFull();
  const m=document.getElementById('fs-memo');if(m)m.value=mo(id);
  document.getElementById('fsov').classList.add('open');
}
function updFull(){
  if(!fsId)return;
  const cv=c(fsId),gv=g(fsId),s_=sp(fsId),w_=wt(fsId);
  document.getElementById('fs-coll').textContent=cv;
  document.getElementById('fs-goal').textContent=gv;
  const ch=document.getElementById('fs-chips');
  if(ch){
    let h='';
    if(s_>0)h+=`<span style="background:var(--have-g);border:1px solid var(--have-bd);color:var(--have);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">✨ 있어요 ${s_}</span>`;
    if(w_>0)h+=`<span style="background:var(--want-g);border:1px solid var(--want-bd);color:var(--want);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">🔍 구해요 ${w_}</span>`;
    ch.innerHTML=h;
  }
  const hb=document.getElementById('fs-hide-btn');
  if(hb){
    if(s_>0){
      const isH=hid(fsId);
      hb.style.cssText=`display:block;background:none;border:1px solid ${isH?'var(--ok)':'var(--want)'};color:${isH?'var(--ok)':'var(--want)'};width:100%;padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif`;
      hb.textContent=isH?'👁 있어요에 다시 표시하기':'🚫 있어요에서 숨기기';
    } else {
      hb.style.display='none';
    }
  }
}
function closeFull(){document.getElementById('fsov').classList.remove('open');fsId=null;}
function fsAdj(d){
  if(!fsId)return;
  ST.collected[fsId]=Math.max(0,(ST.collected[fsId]||0)+d);
  saveST();updFull();renderCur();
  if(d>0){const gv=g(fsId),cv=c(fsId);if(gv>0&&cv===gv)toast('🎉 목표 달성!');}
}
function fsGoal(d){
  if(!fsId)return;
  setGoal(fsId,g(fsId)+d);
  updFull();
}
function toggleHide(){
  if(!fsId)return;
  const isH=hid(fsId);
  if(!confirm(isH?'다시 있어요에 표시할까요?':'있어요 목록에서 숨길까요?\n(수집 수는 유지됩니다)'))return;
  if(isH)delete ST.hidden[fsId];else ST.hidden[fsId]=true;
  saveST();updFull();renderCur();
  toast(isH?'있어요에 표시됩니다':'있어요에서 숨겼어요');
}
function saveMemo(){
  if(!fsId)return;
  const v=document.getElementById('fs-memo').value;
  if(v)ST.memos[fsId]=v;else delete ST.memos[fsId];
  saveST();
}

/* ══ WIZARD ══ */
function showWizard(){
  wiz={step:1,albums:['poca','photobook','inventory','idpass'],inclUnpo:false,members:[...MEMBERS],count:1};
  renderWizStep();
  document.getElementById('wiz-ov').classList.add('open');
}
function renderWizStep(){
  const body=document.getElementById('wiz-body'),foot=document.getElementById('wiz-foot');
  document.getElementById('wiz-ttl').textContent=wiz.step===1?'🎯 Step 1/2 — 앨범 선택':'🎯 Step 2/2 — 멤버 & 수량';
  if(wiz.step===1){
    const albs=[{id:'poca',name:'포카앨범',color:'#4f7eff'},{id:'photobook',name:'포토북앨범',color:'#7b5fff'},{id:'inventory',name:'인벤토리앨범',color:'#ec4899'},{id:'idpass',name:'아이디 패스앨범',color:'#c9c9c9'}];
    body.innerHTML=`<p style="font-size:12px;color:var(--tx2);margin-bottom:12px">수집할 앨범을 선택하세요 (복수 선택 가능)</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px">
        ${albs.map(a=>`<button class="wiz-chip" onclick="wizToggleAlb('${a.id}')" style="${wiz.albums.includes(a.id)?`background:${a.color};border-color:${a.color};color:#fff`:`border-color:${a.color}55;color:${a.color};background:none`}">${a.name}</button>`).join('')}
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)">
        <input type="checkbox" ${wiz.inclUnpo?'checked':''} onchange="wiz.inclUnpo=this.checked" style="width:16px;height:16px">
        <span style="font-size:12px;font-weight:600">미공포 포함 <span style="font-size:11px;font-weight:400;color:var(--tx2)">(메이크스타, 무신사, HMV 등)</span></span>
      </label>`;
    foot.innerHTML=`<button class="btn btn-s btn-sm" onclick="closeSheet('wiz-ov')" style="flex:1">나중에</button><button class="btn btn-p btn-sm" onclick="wizNext()" style="flex:2">다음 →</button>`;
  } else {
    body.innerHTML=`<p style="font-size:12px;color:var(--tx2);margin-bottom:12px">수집할 멤버와 목표 수량을 설정하세요.</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px">
        ${MEMBERS.map(m=>`<button class="wiz-chip" onclick="wizToggleMember('${m}');renderWizStep()" style="${wiz.members.includes(m)?'background:var(--blue);border-color:var(--blue);color:#fff':'border-color:var(--bd);color:var(--tx2);background:none'}">${m}</button>`).join('')}
      </div>
      <div style="text-align:center">
        <p style="font-size:11px;color:var(--tx2);margin-bottom:12px">선택한 멤버 전체에 동일하게 적용</p>
        <div style="display:inline-flex;align-items:center;background:var(--s2);border:1px solid var(--bd);border-radius:14px;overflow:hidden">
          <button onclick="if(wiz.count>0)wiz.count--;renderWizStep()" style="padding:12px 22px;font-size:22px;font-weight:800;border-right:1px solid var(--bd);color:var(--tx)">−</button>
          <span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:32px;min-width:64px;text-align:center;padding:0 8px">${wiz.count}</span>
          <button onclick="wiz.count++;renderWizStep()" style="padding:12px 22px;font-size:22px;font-weight:800;border-left:1px solid var(--bd);color:var(--tx)">+</button>
        </div>
        <div style="font-size:12px;color:var(--tx2);margin-top:8px">장 / 멤버</div>
      </div>`;
    foot.innerHTML=`<button class="btn btn-s btn-sm" onclick="wizPrev()" style="flex:1">← 이전</button><button class="btn btn-p btn-sm" onclick="wizApply()" style="flex:2">설정 완료 ✓</button>`;
  }
}
function wizToggleAlb(id){const i=wiz.albums.indexOf(id);if(i>=0)wiz.albums.splice(i,1);else wiz.albums.push(id);renderWizStep();}
function wizToggleMember(m){const i=wiz.members.indexOf(m);if(i>=0)wiz.members.splice(i,1);else wiz.members.push(m);}
function wizNext(){if(!wiz.albums.length){toast('앨범을 선택해주세요');return;}wiz.step=2;renderWizStep();}
function wizPrev(){wiz.step=1;renderWizStep();}
function wizApply(){
  if(!wiz.members.length){toast('멤버를 선택해주세요');return;}
  const albs=[...wiz.albums,...(wiz.inclUnpo?['unpo']:[])];
  for(const alb of DB.albumTypes){
    if(!albs.includes(alb.id))continue;
    for(const set of alb.sets)
      for(const card of set.cards)
        if(wiz.members.includes(card.member)||wiz.members.includes(card.name))
          ST.goals[card.id]=wiz.count;
  }
  saveST();closeSheet('wiz-ov');renderCur();toast('🎉 목표 설정 완료!');
}

/* ══ SCREENSHOT ══ */
async function loadH2C(){
  if(window.html2canvas)return;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}
function buildShotGrid(cards,mode,bg,tx2){
  if(!cards.length)return`<div style="color:${tx2};font-size:11px;padding:10px">없음</div>`;
  let h='';
  for(const alb of DB.albumTypes){
    const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
    const sids=[...new Set(ac.map(x=>x.sId))];
    h+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:${alb.color};margin-bottom:3px">${alb.name}</div>`;
    for(const sid of sids){
      const sc=ac.filter(x=>x.sId===sid);
      h+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:5px">`;
      for(const card of sc){
        const cnt=mode==='w'?wt(card.id):sp(card.id);
        h+=`<div style="border-radius:5px;overflow:hidden;border:1px solid ${mode==='w'?'rgba(244,63,94,.4)':'rgba(59,130,246,.4)'}">
          <div style="aspect-ratio:5/7;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:7px;color:${tx2};background:${alb.color}22">
            ${card.img?`<img src="${card.img}" style="width:100%;height:100%;object-fit:cover">`:`${card.name}`}
          </div>
          <div style="padding:2px 3px;background:${mode==='w'?'rgba(244,63,94,.1)':'rgba(59,130,246,.1)'};font-size:8px;font-weight:800;color:${mode==='w'?'#f43f5e':'#3b82f6'};text-align:center">${mode==='w'?'−':'+'} ${cnt}</div>
        </div>`;
      }
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}
async function exportScreenshot(){
  toast('스크린샷 준비 중...');
  try{await loadH2C();}catch(e){toast('라이브러리 로드 실패');return;}
  const all=allCards();
  const wCards=all.filter(x=>wt(x.id)>0);
  const hCards=all.filter(x=>sp(x.id)>0&&!hid(x.id));
  if(!wCards.length&&!hCards.length){toast('교환할 카드가 없어요');return;}
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const bg=dark?'#08090f':'#f0f2f9';const tx2=dark?'#7a8fb0':'#5a6a90';
  const bd=dark?'#1f2535':'#d4daf0';const now=new Date().toLocaleDateString('ko-KR');
  const area=document.getElementById('shot-area');
  area.style.cssText=`position:fixed;left:-9999px;top:0;width:360px;background:${bg};padding:12px;font-family:'Noto Sans KR',sans-serif;color:${dark?'#e8edf8':'#141830'}`;
  const hdr=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid ${bd}"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Caligo Pt.2 드볼관리기</div><div style="font-size:10px;color:${tx2}">${now}</div></div>`;
  area.innerHTML=hdr+
    (wCards.length?`<div style="background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:8px;padding:10px;margin-bottom:10px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:#f43f5e;margin-bottom:7px">🔍 구해요 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</div>${buildShotGrid(wCards,'w',bg,tx2)}</div>`:'')+
    (hCards.length?`<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:10px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:#3b82f6;margin-bottom:7px">✨ 있어요 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</div>${buildShotGrid(hCards,'h',bg,tx2)}</div>`:'');
  try{
    const canvas=await html2canvas(area,{backgroundColor:bg,scale:2,useCORS:true,logging:false,windowWidth:360});
    const link=document.createElement('a');link.download=`교환_${now.replace(/\./g,'')}.png`;link.href=canvas.toDataURL('image/png');link.click();
    toast('📸 저장 완료!');
  }catch(e){toast('실패: '+e.message);}
  area.innerHTML='';
}
async function exportCollectScreenshot(){
  toast('스크린샷 준비 중...');
  try{await loadH2C();}catch(e){toast('라이브러리 로드 실패');return;}
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const bg=dark?'#08090f':'#f0f2f9';const tx2=dark?'#7a8fb0':'#5a6a90';
  const bd=dark?'#1f2535':'#d4daf0';const now=new Date().toLocaleDateString('ko-KR');
  const area=document.getElementById('shot-area');
  area.style.cssText=`position:fixed;left:-9999px;top:0;width:360px;background:${bg};padding:12px;font-family:'Noto Sans KR',sans-serif;color:${dark?'#e8edf8':'#141830'}`;
  let secH='';
  for(const alb of DB.albumTypes){
    for(const set of alb.sets){
      const cards=set.cards.filter(c2=>filterCard(c2));
      if(!cards.length)continue;
      secH+=`<div style="margin-bottom:8px">
        <div style="font-size:10px;font-weight:700;margin-bottom:3px"><span style="background:${alb.color};color:#fff;padding:1px 6px;border-radius:5px;font-size:9px">${alb.shortName}</span> ${set.name}</div>
        <div style="display:grid;grid-template-columns:repeat(${Math.min(cards.length,5)},1fr);gap:3px">
          ${cards.map(card=>{
            const cv=c(card.id),gv=g(card.id),st=sts(card.id);
            const bdr=st==='c'?'rgba(244,63,94,.5)':st==='m'?'rgba(34,197,94,.6)':st==='h'?'rgba(59,130,246,.6)':'rgba(255,255,255,.1)';
            return`<div style="border-radius:5px;overflow:hidden;border:1px solid ${bdr}">
              <div style="aspect-ratio:5/7;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:7px;color:${tx2};background:${alb.color}22">${card.img?`<img src="${card.img}" style="width:100%;height:100%;object-fit:cover">`:`${card.name}`}</div>
              <div style="padding:2px 3px;background:rgba(0,0,0,.5);display:flex;justify-content:space-between;font-size:7px;font-family:'Outfit',monospace;font-weight:700">
                <span style="color:${st==='c'?'#f43f5e':st==='m'?'#22c55e':st==='h'?'#3b82f6':'#7a8fb0'}">${cv}</span><span style="color:${tx2}">${gv}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
  }
  const hdr=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid ${bd}"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Caligo Pt.2 수집 현황</div><div style="font-size:10px;color:${tx2}">${now}</div></div>`;
  area.innerHTML=hdr+`<div style="display:grid;gap:6px">${secH}</div>`;
  try{
    const canvas=await html2canvas(area,{backgroundColor:bg,scale:2,useCORS:true,logging:false,windowWidth:360});
    const link=document.createElement('a');link.download=`수집_${now.replace(/\./g,'')}.png`;link.href=canvas.toDataURL('image/png');link.click();
    toast('📸 저장 완료!');
  }catch(e){toast('실패: '+e.message);}
  area.innerHTML='';
}

/* ══ SETTINGS ══ */
function showSettings(){document.getElementById('set-ov').classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function importState(inp){
  if(!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      ST=JSON.parse(e.target.result);
      ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};
      saveST();closeSheet('set-ov');renderCur();toast('복원 완료 ✓');
    }catch(e){toast('파일 오류');}
  };
  r.readAsText(inp.files[0]);
}
function exportState(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(ST,null,2)],{type:'application/json'}));
  a.download=`포카백업_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast('백업 파일 저장됨 ✓');
}
function resetState(){
  if(!confirm('모든 수집·목표·메모를 초기화할까요?'))return;
  ST={goals:{},collected:{},memos:{},hidden:{}};
  saveST();closeSheet('set-ov');renderCur();toast('초기화 완료');
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const b=document.getElementById('theme-btn');
  if(b)b.textContent=t==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  UI.theme=UI.theme==='dark'?'light':'dark';
  applyTheme(UI.theme);saveUI();
}

/* ══ TOAST ══ */
function toast(msg){
  const w=document.getElementById('tw');
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(),2100);
}

/* ══ INIT ══ */
function init(){
  loadST();loadUI();
  applyTheme(UI.theme||'dark');
  renderNav();
  // Show loading state
  document.getElementById('page-content').innerHTML='<div style="padding:24px;text-align:center;color:var(--tx2);font-size:13px">📦 DB 로딩 중...</div>';
  // Load DB
  fetch('./poca_db.json')
    .then(r=>r.json())
    .then(d=>{
      DB=d;
      saveDB();
      renderCur();
      // Auto wizard for new users
      const hasGoal=Object.values(ST.goals).some(v=>v>0);
      if(!hasGoal)setTimeout(showWizard,600);
    })
    .catch(()=>{
      // Try from localStorage
      loadDB();
      if(DB){renderCur();}
      else{document.getElementById('page-content').innerHTML='<div style="padding:24px;text-align:center;color:var(--want)">⚠️ poca_db.json을 같은 폴더에 두고 웹서버로 열어주세요.</div>';}
    });
  // Scroll top button
  document.getElementById('main').addEventListener('scroll',function(){
    const btn=document.getElementById('scroll-top-btn');
    if(!btn)return;
    btn.classList.toggle('vis',this.scrollTop>200);
  },{passive:true});
}
init();
</script>
