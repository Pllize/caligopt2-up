<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Caligo Pt.2 드볼관리기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0e1018;--s2:#13161f;--s3:#191d28;
  --bd:#1f2535;--bd2:#2a3347;
  --tx:#e8edf8;--tx2:#7a8fb0;--tx3:#384560;
  --blue:#4f8aff;--purple:#8b5cf6;
  --want:#f43f5e;--want-g:rgba(244,63,94,.12);--want-bd:rgba(244,63,94,.3);
  --have:#3b82f6;--have-g:rgba(59,130,246,.12);--have-bd:rgba(59,130,246,.3);
  --ok:#22c55e;
  --r:12px;--r-sm:8px;
}
[data-theme="light"]{
  --bg:#f0f2f9;--s1:#fff;--s2:#f4f6ff;--s3:#e8ecf7;
  --bd:#d4daf0;--bd2:#b8c2de;--tx:#141830;--tx2:#5a6a90;--tx3:#a0aecb;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;overflow:hidden;height:100svh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,textarea{font-family:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-sm);outline:none}
input[type=number]{font-size:13px;padding:5px 8px;width:100%}
input:focus,textarea:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100svh}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;height:50px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:50}
.logo-wrap{flex-shrink:0;line-height:1}
.logo-top{font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;letter-spacing:-.3px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.logo-sub{font-family:'Outfit',sans-serif;font-weight:600;font-size:10px;color:var(--tx2);display:block;margin-top:1px}
.hdr-stats{flex:1;display:flex;gap:5px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.hdr-stats::-webkit-scrollbar{display:none}
.schip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;font-family:'Outfit',sans-serif;border:1px solid var(--bd);background:var(--s2)}
.hdr-acts{display:flex;gap:4px;flex-shrink:0}
.abtn{width:31px;height:31px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);background:var(--s2);border:1px solid var(--bd);font-size:14px}

/* DESKTOP TABS */
.dtabs{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;display:none;flex-shrink:0}
.dtab{padding:10px 16px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Outfit',sans-serif}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* MOBILE BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);display:none}
.bnav-inner{display:flex;height:54px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:9px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;transition:color .15s}
.btab.on{color:var(--blue)}
.btab-ico{font-size:19px;line-height:1}

.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px calc(62px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch}
@media(min-width:641px){.dtabs{display:flex}.bnav{display:none!important}.main{padding:12px}}
@media(max-width:640px){.dtabs{display:none}.bnav{display:block}}

/* FILTER ROW */
.frow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.fp{padding:4px 11px;border-radius:16px;font-size:11px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;transition:all .14s;white-space:nowrap;font-family:'Outfit',sans-serif}
.fp.on-all{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:#fff}
.fp.on-alb{color:#fff;border-color:transparent}
.fp.on-f{background:var(--s3);border-color:var(--blue);color:var(--blue)}
.fsep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.coltog{display:inline-flex;background:var(--s2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;flex-shrink:0}
.coltog-btn{padding:4px 10px;font-size:10px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;border-right:1px solid var(--bd)}
.coltog-btn:last-child{border-right:none}
.coltog-btn:hover{background:var(--s3);color:var(--tx)}

/* SETS WRAP - responsive grid */
.sets-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:7px;align-items:start}

/* SECTION BLOCK */
.sec-block{border-radius:var(--r);background:var(--s1);border:1px solid var(--bd);overflow:hidden;min-width:0}
.sec-hdr{display:flex;align-items:center;gap:6px;padding:9px 11px;cursor:pointer;user-select:none;transition:background .12s}
.sec-hdr:hover{background:var(--s2)}
.sec-atag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;color:#fff;flex-shrink:0}
.sec-name{font-size:12px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-pw{display:flex;align-items:center;gap:5px;flex-shrink:0}
.sec-pct{font-size:10px;font-weight:700;color:var(--tx2);font-family:'Outfit',sans-serif}
.sec-pb{width:32px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.sec-pbf{height:100%;border-radius:2px;transition:width .4s}
.chev{font-size:10px;color:var(--tx3);transition:transform .22s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.sec-body{padding:7px 8px 9px}

/* CARD GRID — always 5 cols */
.pcg{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}

/* CARD TILE */
.pct{border-radius:7px;overflow:hidden;background:var(--s2);border:1px solid var(--bd);transition:border-color .2s,box-shadow .2s;user-select:none;display:flex;flex-direction:column;position:relative}
.pct.ng{opacity:.4}
/* Status borders — collecting=red, met=green, spare=blue */
.pct.sc{border-color:rgba(244,63,94,.45)}
.pct.sm{border-color:rgba(34,197,94,.55);box-shadow:0 0 6px rgba(34,197,94,.15)}
.pct.sh{border-color:rgba(59,130,246,.55);box-shadow:0 0 6px rgba(59,130,246,.15)}
.pci{aspect-ratio:5/7;position:relative;overflow:hidden;cursor:pointer;background:var(--s3)}
.pci img{width:100%;height:100%;object-fit:cover;display:block}
.pcph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--tx3);text-align:center;padding:2px}
.pbdg{position:absolute;top:3px;right:3px;border-radius:4px;font-size:7px;font-weight:800;padding:1px 3px;line-height:1.4;font-family:'Outfit',monospace}
.pbdg.w{background:rgba(244,63,94,.85);color:#fff}
.pbdg.h{background:rgba(59,130,246,.85);color:#fff}
.pbdg.m{background:rgba(34,197,94,.85);color:#fff}
.mdot{position:absolute;top:3px;left:3px;width:5px;height:5px;border-radius:50%;background:var(--ok);box-shadow:0 0 3px rgba(34,197,94,.6)}
/* card bottom — no name, show 보유/목표 */
.pcb{flex-shrink:0;display:flex;align-items:center;min-height:24px;background:rgba(0,0,0,.6)}
[data-theme="light"] .pcb{background:rgba(0,0,0,.1)}
.pcbtn{width:18px;height:24px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.55);font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
[data-theme="light"] .pcbtn{color:rgba(0,0,0,.4)}
.pcbtn:active{background:rgba(255,255,255,.1)}
.pcm{flex:1;text-align:center;overflow:hidden;padding:0 1px}
.pcv{font-size:8px;font-family:'Outfit',monospace;font-weight:700;white-space:nowrap}

/* TAB STATS */
.tab-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.tsb{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r-sm);padding:7px 5px;text-align:center;position:relative;overflow:hidden}
.tsb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tscolor,var(--blue))}
.tsv{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px}
.tsl{font-size:9px;color:var(--tx2);font-weight:600}

/* GOALS TAB */
.msec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-bottom:1px solid var(--bd);gap:6px;cursor:pointer}
.mtitle{font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.macts{display:flex;gap:4px;flex-shrink:0}
.sbtn{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:'Outfit',sans-serif}
.mmems{display:grid;grid-template-columns:repeat(5,1fr)}
.mmem{padding:6px 3px;text-align:center;border-right:1px solid var(--bd)}
.mmem:last-child{border-right:none}
.mmimg{width:32px;height:45px;border-radius:4px;overflow:hidden;margin:0 auto 3px;background:var(--s2);border:1px solid var(--bd)}
.mmimg img{width:100%;height:100%;object-fit:cover}
.mmph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--tx3)}
.mmn{font-size:9px;font-weight:700;margin-bottom:3px}
.mmctrl{display:flex;align-items:center;justify-content:center;gap:2px}
.mmbtn{width:18px;height:18px;border-radius:3px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.mmbtn:active{background:var(--s3)}
.mmval{font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;min-width:14px;text-align:center}
.mmcol{font-size:8px;color:var(--tx3);margin-top:1px;font-family:'Outfit',monospace}

/* TRADE */
.tr-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:9px;margin-bottom:8px;border:1.5px solid}
.tr-hdr.wh{background:var(--want-g);border-color:var(--want-bd)}
.tr-hdr.hh{background:var(--have-g);border-color:var(--have-bd)}
.tr-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px}
.tr-title.wt{color:var(--want)}.tr-title.ht{color:var(--have)}
.tr-badge{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif;margin-left:auto}
.tr-badge.wb{background:var(--want);color:#fff}.tr-badge.hb{background:var(--have);color:#fff}
.tr-empty{text-align:center;padding:18px;color:var(--tx3);font-size:12px;line-height:1.8}
.tr-alb-lbl{font-size:10px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.tr-set-lbl{font-size:9px;color:var(--tx3);font-weight:600;margin-bottom:4px}
/* trade tile — thin soft border */
.trt{border-radius:7px;overflow:hidden;background:var(--s2);cursor:pointer;display:flex;flex-direction:column;user-select:none;transition:transform .12s}
.trt:active{transform:scale(.96)}
.trt.wt{border:1px solid rgba(244,63,94,.35)}
.trt.ht{border:1px solid rgba(59,130,246,.35)}
.trb{display:flex;align-items:center;justify-content:space-between;padding:3px 5px;flex-shrink:0}
.trb.wb{background:var(--want-g)}.trb.hb{background:var(--have-g)}
.trn{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.trcnt{font-size:10px;font-weight:800;font-family:'Outfit',monospace;flex-shrink:0}
.trcnt.w{color:var(--want)}.trcnt.h{color:var(--have)}
/* LANDSCAPE TRADE */
.trade-ls{display:flex;height:100%}
.trade-ls-sidebar{width:130px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bd);padding:6px 5px;transition:width .25s ease;background:var(--s1);display:flex;flex-direction:column;gap:4px}
.trade-ls-sidebar.collapsed{width:30px;overflow:hidden;padding:6px 3px}
.trade-ls-toggle{width:24px;height:24px;border-radius:5px;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;align-self:flex-end}
.trade-ls-filters{display:flex;flex-direction:column;gap:4px;overflow:hidden}
.ls-fp{padding:5px 8px;border-radius:8px;font-size:11px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;text-align:left;white-space:nowrap}
.ls-fp.on-alb{color:#fff;border-color:transparent}
.ls-fp.on-all{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:#fff}
.trade-ls-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.trade-ls-colhdr{display:flex;flex-shrink:0;border-bottom:1px solid var(--bd)}
.trade-ls-colhdr>div{flex:1;padding:8px 10px;display:flex;align-items:center;gap:6px}
.trade-ls-colhdr>div:first-child{border-right:1px solid var(--bd)}
.trade-ls-cols{flex:1;display:flex;overflow:hidden}
.trade-ls-col{flex:1;overflow-y:auto;padding:8px 6px}
.trade-ls-col:first-child{border-right:1px solid var(--bd)}
.shot-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.9);cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;gap:4px}
[data-theme="light"] .shot-btn{background:var(--s2);border-color:var(--bd);color:var(--tx)}
.shot-btn:active{opacity:.8}

/* FULLSCREEN */
.fsov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;padding:12px 12px calc(14px + env(safe-area-inset-bottom));overflow-y:auto}
.fsov.open{display:flex}
.fscl{position:fixed;top:12px;right:12px;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:34px;height:34px;font-size:15px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1}
.fsimg{max-width:min(88vw,220px);max-height:56vh;border-radius:10px;object-fit:contain;box-shadow:0 12px 48px rgba(0,0,0,.9);margin-top:40px;flex-shrink:0}
.fsph{width:160px;height:224px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx3);margin-top:40px;flex-shrink:0}
.fsi{width:100%;max-width:300px;margin-top:12px}
.fsname{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;text-align:center;margin-bottom:2px}
.fsmeta{font-size:11px;color:var(--tx2);text-align:center;margin-bottom:10px}
.fscounts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.fscb{background:rgba(255,255,255,.06);border-radius:9px;padding:7px;text-align:center;border:1px solid rgba(255,255,255,.07)}
[data-theme="light"] .fscb{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.07)}
.fscv{font-family:'Outfit',sans-serif;font-weight:800;font-size:20px}
.fscl2{font-size:10px;color:var(--tx2);margin-top:1px;font-weight:600}
.fsbtns{display:flex;gap:5px;margin-bottom:8px}
.fsbtn{flex:1;padding:9px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Outfit',sans-serif}
.fsgoal{display:flex;gap:5px;margin-bottom:10px}
.fsgoalbtn{flex:1;padding:6px;border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;background:var(--s3);border:1px solid var(--bd);color:var(--tx);font-family:'Outfit',sans-serif}
.fsmemow{width:100%;margin-bottom:10px}
.fsmeml{font-size:11px;color:var(--tx2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.fsmemi{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-family:inherit;font-size:12px;padding:8px 10px;resize:none;min-height:50px;line-height:1.5;outline:none}
[data-theme="light"] .fsmemi{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--tx)}
.fsmemi:focus{border-color:rgba(255,255,255,.28)}
.fs-hide-btn{width:100%;padding:9px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;border:1px solid;font-family:'Outfit',sans-serif;transition:all .15s}

/* SHEET */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;animation:shup .2s ease}
@keyframes shup{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sttl{font-weight:800;font-size:14px;font-family:'Outfit',sans-serif}
.sbdy{overflow-y:auto;padding:16px;flex:1}
.sfot{display:flex;justify-content:flex-end;gap:8px;padding:10px 16px;border-top:1px solid var(--bd);flex-shrink:0}
.desc{font-size:11px;color:var(--tx2);line-height:1.7;background:var(--s2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;border:1px solid var(--bd)}
.desc b{color:var(--tx)}

/* WIZARD */
.wiz-chip{padding:9px 16px;border-radius:10px;font-size:12px;font-weight:700;border:2px solid;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r-sm);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;border:none;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center;margin-bottom:7px}
.btn-warn{color:var(--want);border:1px solid var(--want-bd);justify-content:center;width:100%}

/* TOAST */
.tw{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}
.toast{background:var(--s3);border:1px solid var(--bd2);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;white-space:nowrap;font-family:'Outfit',sans-serif;animation:tin .2s ease,tout .3s ease 1.7s forwards}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0}}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="logo-wrap">
      <span class="logo-top">Caligo Pt.2</span>
      <span class="logo-sub">드볼관리기</span>
    </div>
    <div class="hdr-stats" id="hdr-stats"></div>
    <div class="hdr-acts">
      <button class="abtn" onclick="showSettings()">⚙️</button>
      <button class="abtn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </header>
  <div class="dtabs">
    <div class="dtab on" data-v="collect" onclick="goTab('collect')">수집</div>
    <div class="dtab" data-v="goals" onclick="goTab('goals')">목표</div>
    <div class="dtab" data-v="trade" onclick="goTab('trade')">교환</div>
  </div>
  <main class="main" id="main"></main>
  <nav class="bnav">
    <div class="bnav-inner">

/* ══ LOAD/SAVE ══ */
function loadDB(){const s=localStorage.getItem(DB_KEY);DB=s?JSON.parse(s):JSON.parse(JSON.stringify(DEF_DB));}
function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(DB));}
function loadST(){const s=localStorage.getItem(ST_KEY);if(s)try{ST=JSON.parse(s);}catch(e){}ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};}
function saveST(){localStorage.setItem(ST_KEY,JSON.stringify(ST));}
function loadUI(){const s=localStorage.getItem(UI_KEY);if(s)try{UI=Object.assign(UI,JSON.parse(s));}catch(e){}UI.col=UI.col||{};UI.mgl=UI.mgl||{};UI.talbArr=Array.isArray(UI.talbArr)?UI.talbArr:[];UI.memberFilter=Array.isArray(UI.memberFilter)?UI.memberFilter:[];UI.theme=UI.theme||'dark';}
function saveUI(){localStorage.setItem(UI_KEY,JSON.stringify(UI));}

/* ══ HELPERS ══ */
const g=id=>ST.goals[id]||0;
const c=id=>ST.collected[id]||0;
const sp=id=>Math.max(0,c(id)-g(id));
const wt=id=>g(id)>0?Math.max(0,g(id)-c(id)):0;
const mo=id=>ST.memos[id]||'';
const hid=id=>!!ST.hidden[id];
function sts(id){const gv=g(id),cv=c(id);if(!gv)return'n';if(cv>gv)return'h';if(cv===gv)return'm';return'c';}
function allCards(){const r=[];for(const a of DB.albumTypes)for(const s of a.sets)for(const card of s.cards)r.push({...card,aId:a.id,aN:a.name,aS:a.shortName,aC:a.color,sId:s.id,sN:s.name});return r;}
function findCard(id){for(const a of DB.albumTypes)for(const s of a.sets)for(const card of s.cards)if(card.id===id)return{card,alb:a,set:s};return null;}

/* ══ ACTIONS ══ */
function addC(id,e){if(e)e.stopPropagation();ST.collected[id]=(ST.collected[id]||0)+1;saveST();renderCur();updStats();const g0=g(id),c0=c(id);if(g0>0&&c0===g0)toast('🎉 달성!');else if(g0>0&&c0>g0)toast(`✨ +${c0-g0}`);}
function subC(id,e){if(e)e.stopPropagation();ST.collected[id]=Math.max(0,(ST.collected[id]||0)-1);saveST();renderCur();updStats();}
function setGoal(id,n){ST.goals[id]=Math.max(0,n);saveST();renderCur();updStats();}
function saveMemo(v){if(!fsId)return;ST.memos[fsId]=v;saveST();renderCur();}
function addSetGoal(sid,d){ // d=+1 or -1, applies to EACH card individually
  for(const a of DB.albumTypes)for(const s of a.sets)if(s.id===sid){for(const card of s.cards)ST.goals[card.id]=Math.max(0,(ST.goals[card.id]||0)+d);break;}
  saveST();renderCur();updStats();toast(d>0?'세트 전체 목표+1 ✓':'세트 전체 목표−1');
}
function toggleHide(){
  if(!fsId)return;
  const isHid=hid(fsId);
  const msg=isHid?'이 카드를 있어요 목록에 다시 표시할까요?':'이 카드를 있어요 목록에서 숨길까요?\n수집 개수는 유지됩니다.';
  if(!confirm(msg))return;
  if(isHid)delete ST.hidden[fsId];else ST.hidden[fsId]=true;
  saveST();updHideBtn();renderCur();
  toast(isHid?'있어요에 다시 표시됩니다':'있어요에서 숨겼어요');
}
function updHideBtn(){
  const btn=document.getElementById('fs-hide-btn');if(!btn||!fsId)return;
  const isHid=hid(fsId);
  btn.textContent=isHid?'👁 있어요에 다시 표시하기':'🚫 있어요에서 숨기기';
  btn.style.cssText=`background:none;border-color:${isHid?'var(--ok)':'var(--want)'};color:${isHid?'var(--ok)':'var(--want)'}`;
}
function colSec(k){UI.col[k]=!UI.col[k];saveUI();renderCur();}
function collapseAll(){allCards().forEach(x=>{if(!UI.col[x.sId])UI.col[x.sId]=true;});saveUI();renderCur();toast('모두 접음');}
function expandAll(){UI.col={};saveUI();renderCur();toast('모두 펼침');}
function colAllGoals(){allCards().forEach(x=>{UI.mgl[x.sId]=true;});saveUI();renderGoals();}
function expAllGoals(){UI.mgl={};saveUI();renderGoals();}
function resetAllGoals(){if(!confirm('모든 목표를 0으로 초기화할까요?'))return;ST.goals={};saveST();renderCur();updStats();toast('목표가 초기화됐어요');}
function toggleMemberFilter(m){const i=UI.memberFilter.indexOf(m);if(i>=0)UI.memberFilter.splice(i,1);else UI.memberFilter.push(m);saveUI();renderCollect();}

/* ══ HEADER STATS ══ */
function updStats(){
  const all=allCards();
  const tgt=all.filter(x=>g(x.id)>0);
  const metC=tgt.filter(x=>c(x.id)>=g(x.id)).length;
  const spT=all.filter(x=>sp(x.id)>0&&!hid(x.id)).length;
  const wtT=tgt.filter(x=>wt(x.id)>0).length;
  const el=document.getElementById('hdr-stats');if(!el)return;
  if(curTab==='collect'){
    el.innerHTML=`<span class="schip">🎯 ${metC}/${tgt.length}</span>${spT?`<span class="schip" style="border-color:var(--have-bd);color:var(--have)">✨ ${spT}</span>`:''}${wtT?`<span class="schip" style="border-color:var(--want-bd);color:var(--want)">🔍 ${wtT}</span>`:''}`;

    el.innerHTML=`<span class="schip">📋 목표 ${tgt.length}</span><span class="schip" style="color:var(--ok);border-color:rgba(34,197,94,.3)">✓ ${pct}%</span>`;
  }else{
    const wAll=all.reduce((a,x)=>a+wt(x.id),0);const sAll=all.filter(x=>sp(x.id)>0&&!hid(x.id)).reduce((a,x)=>a+sp(x.id),0);
    el.innerHTML=`${wAll?`<span class="schip" style="border-color:var(--want-bd);color:var(--want)">🔍 구해요 ${wAll}</span>`:''}${sAll?`<span class="schip" style="border-color:var(--have-bd);color:var(--have)">✨ 있어요 ${sAll}</span>`:''}${!wAll&&!sAll?`<span class="schip">🔄 교환 없음</span>`:''}`;

/* ══ COLLECT ══ */
function renderCollect(){
  const el=document.getElementById('main');
  const all=allCards();
  const tgt=all.filter(x=>g(x.id)>0);
  const metC=tgt.filter(x=>c(x.id)>=g(x.id)).length;
  const spT=all.reduce((a,x)=>a+sp(x.id),0);
  const wtT=tgt.reduce((a,x)=>a+wt(x.id),0);

  const stats=`<div class="tab-stats">
    <div class="tsb" style="--tscolor:var(--blue)"><div class="tsv">${tgt.length}</div><div class="tsl">목표</div></div>
    <div class="tsb" style="--tscolor:var(--ok)"><div class="tsv">${metC}</div><div class="tsl">수집 완료</div></div>
    <div class="tsb" style="--tscolor:var(--have)"><div class="tsv">${spT}</div><div class="tsl">있어요</div></div>
    <div class="tsb" style="--tscolor:var(--want)"><div class="tsv">${wtT}</div><div class="tsl">구해요</div></div>
  </div>`;

  const f=UI.flt;
  const filters=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px">
      <div class="frow" style="margin-bottom:0;flex:1">
        <button class="fp${!cAlb?' on-all':''}" onclick="setAlb(null)">전체</button>
        ${DB.albumTypes.map(a=>`<button class="fp alb${cAlb===a.id?' on-alb':''}" onclick="setAlb('${a.id}')" style="${cAlb===a.id?`background:${a.color};border-color:transparent;color:#fff`:`border-color:${a.color}44;color:${a.color}`}">${a.shortName}</button>`).join('')}
        <div class="fsep"></div>
        <button class="fp${f==='h'?' on-f':''}" onclick="setFlt('h')">있는것만</button>
        <button class="fp${f==='n'?' on-f':''}" onclick="setFlt('n')">없는것만</button>
      </div>
      <div class="coltog" style="flex-shrink:0;margin-top:1px">
        <span class="coltog-btn" onclick="collapseAll()">접기</span>
        <span class="coltog-btn" onclick="expandAll()">펼치기</span>
      </div>
    </div>
    <div class="frow">
      ${MEMBERS.map(m=>`<button class="fp${UI.memberFilter.includes(m)?' on-f':''}" onclick="toggleMemberFilter('${m}')">${m}</button>`).join('')}
    </div>`;

  const albums=cAlb?DB.albumTypes.filter(a=>a.id===cAlb):DB.albumTypes;
  let secs='';
  for(const alb of albums){
    for(const set of alb.sets){
      let cards=set.cards.slice();
      if(f==='h') cards=cards.filter(x=>c(x.id)>0);
      else if(f==='n') cards=cards.filter(x=>c(x.id)===0&&g(x.id)>0);
      if(UI.memberFilter.length) cards=cards.filter(x=>UI.memberFilter.includes(x.name));
      if(!cards.length&&f!=='all'&&UI.memberFilter.length===0) continue;
      if(!cards.length) continue;
      const isC=UI.col[set.id];
      const t2=set.cards.filter(x=>g(x.id)>0).length;
      const m2=set.cards.filter(x=>g(x.id)>0&&c(x.id)>=g(x.id)).length;
      const pct=t2?Math.round(m2/t2*100):0;
      secs+=`<div class="sec-block">
        <div class="sec-hdr" onclick="colSec('${set.id}')">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
          ${t2>0?`<div class="sec-pw"><span class="sec-pct">${m2}/${t2}</span><div class="sec-pb"><div class="sec-pbf" style="width:${pct}%;background:${alb.color}"></div></div></div>`:''}
          <span class="chev${isC?'':' open'}">▼</span>
        </div>
        ${isC?'':`<div class="sec-body"><div class="pcg">
          ${cards.map(card=>{
            const gv=g(card.id),cv=c(card.id),s_=sp(card.id),w_=wt(card.id),st=sts(card.id);
            const hasMemo=mo(card.id).trim().length>0;
            let cls='pct';if(st==='n')cls+=' ng';else if(st==='c')cls+=' sc';else if(st==='m')cls+=' sm';else if(st==='h')cls+=' sh';
            let bdg='';if(s_>0)bdg=`<div class="pbdg h">+${s_}</div>`;else if(w_>0)bdg=`<div class="pbdg w">−${w_}</div>`;else if(st==='m')bdg=`<div class="pbdg m">✓</div>`;
            // Number colors matching border: red=collecting, green=met, blue=spare
            const cC=st==='c'?'var(--want)':st==='m'?'var(--ok)':st==='h'?'var(--have)':'var(--tx3)';
            const gC='var(--tx3)';
            return `<div class="${cls}">
              <div class="pci" onclick="openFull('${card.id}')">
                ${card.img?`<img src="${card.img}" alt="${card.name}" loading="lazy">`:`<div class="pcph">${card.name}</div>`}
                ${bdg}${hasMemo?'<div class="mdot"></div>':''}
              </div>
              <div class="pcb">
                <div class="pcbtn" onclick="subC('${card.id}',event)">−</div>
                <div class="pcm"><div class="pcv"><span style="color:${cC}">보유 ${cv}</span><span style="color:${gC}"> / 목표 ${gv}</span></div></div>
                <div class="pcbtn" onclick="addC('${card.id}',event)">+</div>
              </div>
            </div>`;}).join('')}
        </div></div>`}
      </div>`;
    }
  }
  el.innerHTML=stats+filters+`<div class="sets-wrap">${secs}</div>`;
}
function setAlb(id){cAlb=id===cAlb?null:id;renderCollect();}
function setFlt(f){UI.flt=UI.flt===f?'all':f;saveUI();renderCollect();}

/* ══ TRADE ══ */
function isLandscapeMode(){return window.innerWidth>window.innerHeight&&window.innerHeight<520;}
function renderTrade(){if(isLandscapeMode())renderTradeLandscape();else renderTradePortrait();}

function buildTradeGrid(cards,mode,compact){
  if(!cards.length)return`<div class="tr-empty">${mode==='w'?'🔍 구하는 카드가 없어요':'✨ 여유분이 없어요'}</div>`;
  let h='';
  for(const alb of DB.albumTypes){
    const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
    const sids=[...new Set(ac.map(x=>x.sId))];
    h+=`<div style="margin-bottom:${compact?'8':'12'}px"><div class="tr-alb-lbl"><span style="width:7px;height:7px;border-radius:50%;background:${alb.color};display:inline-block"></span><span style="color:${alb.color};font-weight:800;font-size:${compact?'10':'11'}px">${alb.name}</span><span style="color:var(--tx3);font-size:10px"> ${ac.length}종</span></div>`;
    for(const sid of sids){
      const sc=ac.filter(x=>x.sId===sid);
      h+=`<div class="tr-set-lbl">${sc[0]?.sN||''}</div><div class="pcg" style="margin-bottom:8px;grid-template-columns:repeat(5,1fr)">`;
      for(const card of sc){
        const cnt=mode==='w'?wt(card.id):sp(card.id);
        const hasMemo=mo(card.id).trim().length>0;
        h+=`<div class="trt ${mode==='w'?'wt':'ht'}" onclick="openFull('${card.id}')">
          <div class="pci" style="cursor:pointer;position:relative">
            ${card.img?`<img src="${card.img}" alt="${card.name}" loading="lazy">`:`<div class="pcph" style="font-size:8px">${card.name}</div>`}
            ${hasMemo?'<div class="mdot"></div>':''}
          </div>
          <div class="trb ${mode==='w'?'wb':'hb'}">
            <span class="trcnt ${mode==='w'?'w':'h'}">${mode==='w'?'−':'+'} ${cnt}</span>
          </div>
        </div>`;
      }
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}

    body.innerHTML=`<p style="font-size:12px;color:var(--tx2);margin-bottom:12px">수집할 앨범 종류를 선택하세요 (복수 선택 가능)</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px">
        ${albs.map(a=>`<button class="wiz-chip" onclick="wizToggleAlb('${a.id}')" style="${wiz.albums.includes(a.id)?`background:${a.color};border-color:${a.color};color:#fff`:`border-color:${a.color}55;color:${a.color};background:none`}">${a.name}</button>`).join('')}
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)">
        <input type="checkbox" id="wiz-unpo" ${wiz.inclUnpo?'checked':''} onchange="wiz.inclUnpo=this.checked" style="width:16px;height:16px">
        <span style="font-size:12px;font-weight:600">미공포도 포함 <span style="font-size:11px;font-weight:400;color:var(--tx2)">(메이크스타, 무신사, HMV 등)</span></span>
      </label>`;
    foot.innerHTML=`<button class="btn btn-s btn-sm" onclick="closeSheet('wiz-ov')">나중에</button><button class="btn btn-p btn-sm" onclick="wizNext()">다음 →</button>`;
  }else{
    body.innerHTML=`<p style="font-size:12px;color:var(--tx2);margin-bottom:10px">원하는 멤버를 선택하고 각각의 목표 수량을 입력하세요.</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${MEMBERS.map(m=>`<button class="wiz-chip" onclick="wizToggleMember('${m}');renderWizStep()" style="${wiz.members.includes(m)?'background:var(--blue);border-color:var(--blue);color:#fff':'border-color:var(--bd);color:var(--tx2);background:none'}">${m}</button>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px">
        ${MEMBERS.filter(m=>wiz.members.includes(m)).map(m=>`<div style="text-align:center"><div style="font-size:10px;font-weight:700;margin-bottom:4px">${m}</div><input type="number" value="${wiz.counts[m]||1}" min="0" max="99" onchange="wiz.counts['${m}']=Math.max(0,parseInt(this.value)||0)"></div>`).join('')}
      </div>
      <div style="display:flex;gap:6px">
        ${[1,2,3,5].map(n=>`<button onclick="MEMBERS.filter(m=>wiz.members.includes(m)).forEach(m=>wiz.counts[m]=${n});renderWizStep()" style="padding:5px 12px;border-radius:10px;font-size:11px;font-weight:700;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);cursor:pointer">전체 ${n}장</button>`).join('')}
      </div>`;
    foot.innerHTML=`<button class="btn btn-s btn-sm" onclick="wizPrev()">← 이전</button><button class="btn btn-p btn-sm" onclick="wizApply()">설정 완료 ✓</button>`;
  }
}
function wizToggleAlb(id){const i=wiz.albums.indexOf(id);if(i>=0)wiz.albums.splice(i,1);else wiz.albums.push(id);renderWizStep();}
function wizToggleMember(m){const i=wiz.members.indexOf(m);if(i>=0)wiz.members.splice(i,1);else wiz.members.push(m);}
function wizNext(){if(!wiz.albums.length){toast('앨범을 하나 이상 선택해주세요');return;}wiz.step=2;renderWizStep();}
function wizPrev(){wiz.step=1;renderWizStep();}
function wizApply(){
  if(!wiz.members.length){toast('멤버를 하나 이상 선택해주세요');return;}
  const albs=[...wiz.albums,...(wiz.inclUnpo?['unpo']:[])];
  for(const alb of DB.albumTypes){
    if(!albs.includes(alb.id))continue;
    for(const set of alb.sets)for(const card of set.cards)
      if(wiz.members.includes(card.name))ST.goals[card.id]=wiz.counts[card.name]||1;
  }
  saveST();closeSheet('wiz-ov');renderCur();updStats();
  toast('🎉 목표 설정 완료! 세부 조정은 목표 탭에서 할 수 있어요');
}

/* ══ SCREENSHOT ══ */
async function loadH2C(){if(window.html2canvas)return;return new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function exportScreenshot(){
  toast('스크린샷 준비 중...');
  try{await loadH2C();}catch(e){toast('라이브러리 로드 실패');return;}
  const all=allCards();
  const wCards=all.filter(x=>wt(x.id)>0);
  const hCards=all.filter(x=>sp(x.id)>0&&!hid(x.id));
  if(!wCards.length&&!hCards.length){toast('교환할 카드가 없어요');return;}
  const isLS=isLandscapeMode();
  const bg=document.documentElement.getAttribute('data-theme')==='dark'?'#08090f':'#f0f2f9';
  const tx2=document.documentElement.getAttribute('data-theme')==='dark'?'#7a8fb0':'#5a6a90';
  const now=new Date().toLocaleDateString('ko-KR');
  const area=document.getElementById('shot-area');

  function miniGrid(cards,mode){
    if(!cards.length)return`<div style="color:${tx2};font-size:11px;padding:12px">없음</div>`;
    let h='';
    for(const alb of DB.albumTypes){
      const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
      const sids=[...new Set(ac.map(x=>x.sId))];
      h+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:${alb.color};margin-bottom:3px">${alb.name}</div>`;
      for(const sid of sids){
        const sc=ac.filter(x=>x.sId===sid);
        h+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:5px">`;
        for(const card of sc){
          const cnt=mode==='w'?wt(card.id):sp(card.id);
          const bdr=mode==='w'?'rgba(244,63,94,.4)':'rgba(59,130,246,.4)';
          h+=`<div style="border-radius:5px;overflow:hidden;border:1px solid ${bdr}">
            <div style="aspect-ratio:5/7;background:${alb.color}22;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:7px;color:${tx2}">
              ${card.img?`<img src="${card.img}" style="width:100%;height:100%;object-fit:cover">`:`${card.name}`}
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 3px;background:${mode==='w'?'rgba(244,63,94,.1)':'rgba(59,130,246,.1)'}">
              <span style="font-size:7px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:${mode==='w'?'#f43f5e':'#3b82f6'}">${mode==='w'?'−':'+'} ${cnt}</span>
            </div>
          </div>`;
        }
        h+='</div>';
      }
      h+='</div>';
    }
    return h;
  }

  const header=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid ${document.documentElement.getAttribute('data-theme')==='dark'?'#1f2535':'#d4daf0'}">
    <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Caligo Pt.2 드볼관리기</div>
    <div style="font-size:10px;color:${tx2}">${now}</div>
  </div>`;

  if(isLS){
    area.style.cssText=`position:fixed;left:-9999px;top:0;width:720px;background:${bg};padding:12px;font-family:'Noto Sans KR',sans-serif;color:${bg==='#08090f'?'#e8edf8':'#141830'}`;
    area.innerHTML=`${header}<div style="display:flex;gap:10px">
      <div style="flex:1;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:8px;padding:8px">
        <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:#f43f5e;margin-bottom:6px">🔍 구해요 <span style="font-size:11px">총 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</span></div>
        ${miniGrid(wCards,'w')}
      </div>
      <div style="flex:1;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:8px">
        <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:#3b82f6;margin-bottom:6px">✨ 있어요 <span style="font-size:11px">총 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</span></div>
        ${miniGrid(hCards,'h')}
      </div>
    </div>`;
  }else{
    area.style.cssText=`position:fixed;left:-9999px;top:0;width:360px;background:${bg};padding:12px;font-family:'Noto Sans KR',sans-serif;color:${bg==='#08090f'?'#e8edf8':'#141830'}`;
    area.innerHTML=`${header}
      ${wCards.length?`<div style="background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:8px;padding:10px;margin-bottom:10px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;color:#f43f5e;margin-bottom:7px">🔍 구해요 <span style="font-size:11px">총 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</span></div>${miniGrid(wCards,'w')}</div>`:''}
      ${hCards.length?`<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:10px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;color:#3b82f6;margin-bottom:7px">✨ 있어요 <span style="font-size:11px">총 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</span></div>${miniGrid(hCards,'h')}</div>`:''}`;
  }

  try{
    const canvas=await html2canvas(area,{backgroundColor:bg,scale:2,useCORS:true,logging:false,windowWidth:isLS?720:360});
    const link=document.createElement('a');
    link.download=`교환정보_${now.replace(/\./g,'')}.png`;link.href=canvas.toDataURL('image/png');link.click();
    toast('📸 저장 완료!');
  }catch(e){toast('스크린샷 실패: '+e.message);}
  area.innerHTML='';
}

/* ══ SETTINGS ══ */
function showSettings(){document.getElementById('set-ov').classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function importState(inp){if(!inp.files[0])return;const r=new FileReader();r.onload=e=>{try{ST=JSON.parse(e.target.result);ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};saveST();closeSheet('set-ov');renderCur();updStats();toast('복원 완료 ✓');}catch(e){toast('파일 오류');}};r.readAsText(inp.files[0]);}
function exportState(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(ST,null,2)],{type:'application/json'}));a.download=`포카백업_${new Date().toISOString().split('T')[0]}.json`;a.click();toast('백업 파일 저장됨 ✓');}
function resetState(){if(!confirm('모든 수집·목표·메모 데이터를 초기화할까요?'))return;ST={goals:{},collected:{},memos:{},hidden:{}};saveST();closeSheet('set-ov');renderCur();updStats();toast('초기화 완료');}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);const btn=document.getElementById('theme-btn');if(btn)btn.textContent=t==='dark'?'🌙':'☀️';}
function toggleTheme(){UI.theme=UI.theme==='dark'?'light':'dark';applyTheme(UI.theme);saveUI();}
function toast(msg){const w=document.getElementById('tw');const el=document.createElement('div');el.className='toast';el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),2100);}

/* ══ INIT ══ */
function init(){
  loadDB();loadST();loadUI();
  applyTheme(UI.theme||'dark');
  renderCur();updStats();
  const hasGoal=Object.values(ST.goals).some(v=>v>0);
  if(!hasGoal)setTimeout(showWizard,400);
  fetch('./poca_db.json').then(r=>r.json()).then(d=>{DB=d;saveDB();renderCur();updStats();}).catch(()=>{});
}
init();
</script>
