<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>PLAVE 포카</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0e1018;--s2:#13161f;--s3:#191d28;
  --bd:#1f2535;--bd2:#2a3347;
  --tx:#e8edf8;--tx2:#7a8fb0;--tx3:#384560;
  --blue:#4f8aff;--purple:#8b5cf6;
  --want:#f43f5e;--want-g:rgba(244,63,94,.12);--want-bd:rgba(244,63,94,.3);
  --have:#3b82f6;--have-g:rgba(59,130,246,.12);--have-bd:rgba(59,130,246,.3);
  --ok:#22c55e;--warn:#f59e0b;
  --r:12px;--r-sm:8px;
}
[data-theme="light"]{
  --bg:#f0f2f9;--s1:#fff;--s2:#f4f6ff;--s3:#e8ecf7;
  --bd:#d4daf0;--bd2:#b8c2de;--tx:#141830;--tx2:#5a6a90;--tx3:#a0aecb;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;overflow:hidden;height:100svh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,textarea{font-family:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-sm);outline:none}
input{font-size:12px;padding:6px 10px}
input:focus,textarea:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ═══ LAYOUT ═══ */
.app{display:flex;flex-direction:column;height:100svh}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;height:50px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:50}
.logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.5px;flex-shrink:0;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-stats{flex:1;display:flex;gap:5px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.hdr-stats::-webkit-scrollbar{display:none}
.schip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;font-family:'Outfit',sans-serif;border:1px solid var(--bd);background:var(--s2)}
.schip .sv{font-size:12px}
.hdr-acts{display:flex;gap:4px;flex-shrink:0}
.abtn{width:31px;height:31px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);background:var(--s2);border:1px solid var(--bd);font-size:14px;cursor:pointer}

/* DESKTOP TOP TABS */
.dtabs{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;display:flex;gap:2px;flex-shrink:0}
.dtab{padding:10px 16px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Outfit',sans-serif}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* MOBILE BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);display:none}
.bnav-inner{display:flex;height:54px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:9px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;transition:color .15s}
.btab.on{color:var(--blue)}
.btab-ico{font-size:19px;line-height:1}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px calc(62px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch}
@media(min-width:641px){.dtabs{display:flex}.bnav{display:none!important}.main{padding:12px}}
@media(max-width:640px){.dtabs{display:none}.bnav{display:block}}

/* ═══ FILTER ROW ═══ */
.filter-row{display:flex;align-items:center;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.fp{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;transition:all .14s;white-space:nowrap;font-family:'Outfit',sans-serif}
.fp.on-all{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:#fff}
.fp.on-alb{color:#fff;border-color:transparent}
.fp.on-f{background:var(--s3);border-color:var(--blue);color:var(--blue)}
.fp.sort.on-sort{border-color:var(--blue);color:var(--blue)}
.fsep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.fc-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:8px;justify-content:space-between}
.fc-left{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.fc-right{display:flex;gap:4px;flex-shrink:0}
.tog-btn{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}
.tog-btn.active{background:var(--s3);border-color:var(--blue);color:var(--blue)}

/* ═══ SECTION ═══ */
.sec-block{margin-bottom:8px;border-radius:var(--r);background:var(--s1);border:1px solid var(--bd);overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:7px;padding:9px 11px;cursor:pointer;user-select:none;transition:background .12s}
.sec-hdr:hover{background:var(--s2)}
.sec-atag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;color:#fff;flex-shrink:0}
.sec-name{font-size:12px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-prog-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.sec-pct{font-size:10px;font-weight:700;color:var(--tx2);font-family:'Outfit',sans-serif}
.sec-pb{width:36px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.sec-pbf{height:100%;border-radius:2px;transition:width .4s}
.chev{font-size:11px;color:var(--tx3);transition:transform .22s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.sec-body{padding:8px 9px 10px}

/* ═══ CARD GRID ═══ */
.pcg{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}

/* ═══ CARD TILE ═══ */
.pct{border-radius:8px;overflow:hidden;background:var(--s2);border:2px solid var(--bd);transition:border-color .2s,box-shadow .2s;user-select:none;display:flex;flex-direction:column;position:relative}
.pct.ng{opacity:.42}
.pct.sc{border-color:var(--want)} /* 미달 = 빨강 */
.pct.sm{border-color:var(--ok);box-shadow:0 0 8px rgba(34,197,94,.18)} /* 달성 = 초록 */
.pct.sh{border-color:var(--have);box-shadow:0 0 8px rgba(59,130,246,.18)} /* 초과 = 파랑 */
.pci{aspect-ratio:5/7;position:relative;overflow:hidden;cursor:pointer;background:var(--s3)}
.pci img{width:100%;height:100%;object-fit:cover;display:block}
.pcph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--tx3);text-align:center;padding:2px}
.pbdg{position:absolute;top:3px;right:3px;border-radius:4px;font-size:8px;font-weight:800;padding:1px 4px;line-height:1.5;font-family:'Outfit',monospace}
.pbdg.w{background:var(--want);color:#fff}  /* 구해요 = 빨강 */
.pbdg.h{background:var(--have);color:#fff}   /* 있어요(초과) = 파랑 */
.pbdg.m{background:var(--ok);color:#fff}     /* 달성 = 초록 */
.mdot{position:absolute;top:3px;left:3px;width:5px;height:5px;border-radius:50%;background:var(--ok);box-shadow:0 0 4px rgba(34,197,94,.6)}
.pcb{flex-shrink:0;display:flex;align-items:center;min-height:28px;background:rgba(0,0,0,.55)}
[data-theme="light"] .pcb{background:rgba(0,0,0,.1)}
.pcm{flex:1;text-align:center;overflow:hidden;padding:1px 0}
.pcn{font-size:9px;font-weight:700;color:rgba(255,255,255,.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
[data-theme="light"] .pcn{color:rgba(0,0,0,.75)}
.pcv{font-size:9px;font-family:'Outfit',monospace;font-weight:700;line-height:1.2}
.pcbtn{width:20px;height:28px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;line-height:1}
[data-theme="light"] .pcbtn{color:rgba(0,0,0,.45)}
.pcbtn:active{background:rgba(255,255,255,.1)}

/* ═══ TAB STATS ═══ */
.tab-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.tsb{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r-sm);padding:7px 5px;text-align:center;position:relative;overflow:hidden}
.tsb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tscolor,var(--blue))}
.tsv{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px}
.tsl{font-size:9px;color:var(--tx2);font-weight:600}

/* ═══ MANAGE ═══ */
.msec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-bottom:1px solid var(--bd);gap:6px;cursor:pointer}
.mtitle{font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.macts{display:flex;gap:4px;flex-shrink:0}
.sbtn{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:'Outfit',sans-serif}
.mmems{display:grid;grid-template-columns:repeat(5,1fr)}
.mmem{padding:6px 3px;text-align:center;border-right:1px solid var(--bd)}
.mmem:last-child{border-right:none}
.mmimg{width:32px;height:45px;border-radius:4px;overflow:hidden;margin:0 auto 3px;background:var(--s2);border:1px solid var(--bd)}
.mmimg img{width:100%;height:100%;object-fit:cover}
.mmph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--tx3)}
.mmn{font-size:9px;font-weight:700;margin-bottom:3px}
.mmctrl{display:flex;align-items:center;justify-content:center;gap:2px}
.mmbtn{width:18px;height:18px;border-radius:3px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.mmbtn:active{background:var(--s3)}
.mmval{font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;min-width:14px;text-align:center}
.mmcol{font-size:8px;color:var(--tx3);margin-top:1px;font-family:'Outfit',monospace}

/* ═══ TRADE ═══ */
.tr-filter{display:flex;align-items:center;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.tr-sec-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:10px;margin-bottom:10px;border:1.5px solid}
.tr-sec-hdr.wh{background:var(--want-g);border-color:var(--want-bd)}
.tr-sec-hdr.hh{background:var(--have-g);border-color:var(--have-bd);margin-top:14px}
.tr-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:18px}
.tr-title.wt{color:var(--want)}
.tr-title.ht{color:var(--have)}
.tr-cnt-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;margin-left:auto}
.tr-cnt-badge.wb{background:var(--want);color:#fff}
.tr-cnt-badge.hb{background:var(--have);color:#fff}
.tr-empty{text-align:center;padding:20px;color:var(--tx3);font-size:12px;line-height:1.8}
.tr-alb-grp{margin-bottom:10px}
.tr-alb-lbl{font-size:10px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.tr-set-lbl{font-size:9px;color:var(--tx3);font-weight:600;margin-bottom:4px}
/* trade tile */
.trt{border-radius:8px;overflow:hidden;background:var(--s2);border:2px solid;cursor:pointer;display:flex;flex-direction:column;user-select:none;transition:all .14s}
.trt:active{transform:scale(.96)}
.trt.wt{border-color:var(--want)}
.trt.ht{border-color:var(--have)}
.trb{display:flex;align-items:center;justify-content:space-between;padding:3px 5px;flex-shrink:0}
.trb.wb{background:var(--want-g)}
.trb.hb{background:var(--have-g)}
.trn{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.trcnt{font-size:11px;font-weight:800;font-family:'Outfit',monospace;flex-shrink:0}
.trcnt.w{color:var(--want)}
.trcnt.h{color:var(--have)}
/* export screenshot btn */
.shot-btn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;gap:4px;transition:background .15s}
.shot-btn:active{background:rgba(255,255,255,.18)}
/* landscape */
@media(orientation:landscape) and (max-height:520px){
  .tr-split{display:flex;gap:10px}
  .tr-split>div{flex:1}
  .tr-split .tr-sec-hdr.hh{margin-top:0}
}

/* ═══ FULLSCREEN ═══ */
.fsov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;padding:12px 12px calc(12px + env(safe-area-inset-bottom));overflow-y:auto}
.fsov.open{display:flex}
.fscl{position:fixed;top:12px;right:12px;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:34px;height:34px;font-size:15px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1}
.fsimg{max-width:min(88vw,220px);max-height:58vh;border-radius:10px;object-fit:contain;box-shadow:0 12px 48px rgba(0,0,0,.9);margin-top:40px;flex-shrink:0}
.fsph{width:160px;height:224px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx3);margin-top:40px;flex-shrink:0}
.fsi{width:100%;max-width:300px;margin-top:12px}
.fsname{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;text-align:center;margin-bottom:2px}
.fsmeta{font-size:11px;color:var(--tx2);text-align:center;margin-bottom:10px}
.fscounts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.fscb{background:rgba(255,255,255,.06);border-radius:9px;padding:7px;text-align:center;border:1px solid rgba(255,255,255,.07)}
[data-theme="light"] .fscb{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.07)}
.fscv{font-family:'Outfit',sans-serif;font-weight:800;font-size:20px}
.fscl2{font-size:10px;color:var(--tx2);margin-top:1px;font-weight:600}
.fsbtns{display:flex;gap:5px;margin-bottom:8px}
.fsbtn{flex:1;padding:9px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Outfit',sans-serif}
.fsgoal{display:flex;gap:5px;margin-bottom:12px}
.fsgoalbtn{flex:1;padding:6px;border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;background:var(--s3);border:1px solid var(--bd);color:var(--tx);font-family:'Outfit',sans-serif}
.fsmemow{width:100%}
.fsmeml{font-size:11px;color:var(--tx2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.fsmemi{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-family:inherit;font-size:12px;padding:8px 10px;resize:none;min-height:52px;line-height:1.5;outline:none}
[data-theme="light"] .fsmemi{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--tx)}
.fsmemi:focus{border-color:rgba(255,255,255,.28)}

/* ═══ SHEET ═══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:82vh;display:flex;flex-direction:column;animation:shup .2s ease}
@keyframes shup{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sttl{font-weight:800;font-size:14px;font-family:'Outfit',sans-serif}
.sbdy{overflow-y:auto;padding:16px;flex:1}
.sfot{display:flex;justify-content:flex-end;gap:8px;padding:10px 16px;border-top:1px solid var(--bd);flex-shrink:0}
.desc{font-size:11px;color:var(--tx2);line-height:1.7;background:var(--s2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px;border:1px solid var(--bd)}
.desc b{color:var(--tx);font-weight:700}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r-sm);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;border:none;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center;margin-bottom:7px}

/* TOAST */
.tw{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}
.toast{background:var(--s3);border:1px solid var(--bd2);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;white-space:nowrap;font-family:'Outfit',sans-serif;animation:tin .2s ease,tout .3s ease 1.7s forwards}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0}}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div style="display:flex;flex-direction:column;line-height:1.1;gap:1px;flex-shrink:0">
      <span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;letter-spacing:-.3px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Caligo Pt.2</span>
      <span style="font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;color:var(--tx2);letter-spacing:0">드볼관리기</span>
    </div>
    <div class="hdr-stats" id="hdr-stats"></div>
    <div class="hdr-acts">
      <button class="abtn" onclick="showSettings()">⚙️</button>
      <button class="abtn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </header>

  <!-- Desktop tabs -->
  <div class="dtabs">
    <div class="dtab on" data-v="collect" onclick="goTab('collect')">수집</div>
    <div class="dtab" data-v="manage" onclick="goTab('manage')">관리</div>
    <div class="dtab" data-v="trade" onclick="goTab('trade')">교환</div>
  </div>

  <main class="main" id="main"></main>

  <!-- Mobile bottom nav -->
  <nav class="bnav">
    <div class="bnav-inner">
      <div class="btab on" data-v="collect" onclick="goTab('collect')"><span class="btab-ico">🗂</span>수집</div>
      <div class="btab" data-v="manage" onclick="goTab('manage')"><span class="btab-ico">🎯</span>관리</div>
      <div class="btab" data-v="trade" onclick="goTab('trade')"><span class="btab-ico">🔄</span>교환</div>
    </div>
  </nav>
</div>

<!-- FULLSCREEN CARD DETAIL -->
<div class="fsov" id="fsov" onclick="if(event.target===this)closeFull()">
  <button class="fscl" onclick="closeFull()">✕</button>
  <div id="fs-img"></div>
  <div class="fsi">
    <div class="fsname" id="fs-name"></div>
    <div class="fsmeta" id="fs-meta"></div>
    <div class="fscounts">
      <div class="fscb"><div class="fscv" id="fs-coll">0</div><div class="fscl2">보유</div></div>

function loadDB(){const s=localStorage.getItem(DB_KEY);DB=s?JSON.parse(s):JSON.parse(JSON.stringify(DEF_DB));}
function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(DB));}
function loadST(){const s=localStorage.getItem(ST_KEY);if(s)try{ST=JSON.parse(s);}catch(e){}ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};}
function saveST(){localStorage.setItem(ST_KEY,JSON.stringify(ST));}
function loadUI(){const s=localStorage.getItem(UI_KEY);if(s)try{const u=JSON.parse(s);UI=Object.assign(UI,u);}catch(e){}UI.col=UI.col||{};UI.mgl=UI.mgl||{};UI.talbArr=Array.isArray(UI.talbArr)?UI.talbArr:[];}
function saveUI(){localStorage.setItem(UI_KEY,JSON.stringify(UI));}

const g=id=>ST.goals[id]||0;
const c=id=>ST.collected[id]||0;
const sp=id=>Math.max(0,c(id)-g(id));
const wt=id=>g(id)>0?Math.max(0,g(id)-c(id)):0;
const mo=id=>ST.memos[id]||'';
function sts(id){const gv=g(id),cv=c(id);if(!gv)return'n';if(cv>gv)return'h';if(cv===gv)return'm';return'c';}
function allCards(){const r=[];for(const a of DB.albumTypes)for(const s of a.sets)for(const card of s.cards)r.push({...card,aId:a.id,aN:a.name,aS:a.shortName,aC:a.color,sId:s.id,sN:s.name});return r;}
function findCard(id){for(const a of DB.albumTypes)for(const s of a.sets)for(const card of s.cards)if(card.id===id)return{card,alb:a,set:s};return null;}
function sortedCards(cards){return UI.srt?[...cards].sort((a,b)=>a.name.localeCompare(b.name,'ko')):cards;}

function addC(id,e){if(e)e.stopPropagation();ST.collected[id]=(ST.collected[id]||0)+1;saveST();renderCur();updStats();const g0=g(id),c0=c(id);if(g0>0&&c0===g0)toast('🎉 달성!');else if(g0>0&&c0>g0)toast(`✨+${c0-g0}`);}
function subC(id,e){if(e)e.stopPropagation();ST.collected[id]=Math.max(0,(ST.collected[id]||0)-1);saveST();renderCur();updStats();}
function setGoal(id,n){ST.goals[id]=Math.max(0,n);saveST();renderCur();updStats();}
function saveMemo(v){if(!fsId)return;ST.memos[fsId]=v;saveST();renderCur();}
function addSetGoal(sid,d){for(const a of DB.albumTypes)for(const s of a.sets)if(s.id===sid){for(const c of s.cards)ST.goals[c.id]=Math.max(0,(ST.goals[c.id]||0)+d);break;}saveST();renderCur();updStats();toast(d>0?'세트+1 ✓':'세트−1');}

function colSec(key){UI.col[key]=!UI.col[key];saveUI();renderCur();}
function collapseAll(){const all=allCards();const keys=new Set(all.map(x=>x.sId));keys.forEach(k=>UI.col[k]=true);saveUI();renderCur();toast('모두 접음');}
function expandAll(){UI.col={};saveUI();renderCur();toast('모두 펼침');}
function colAllMgmt(){const all=allCards();const keys=new Set(all.map(x=>x.sId));keys.forEach(k=>UI.mgl[k]=true);saveUI();renderManage();toast('모두 접음');}
function expAllMgmt(){UI.mgl={};saveUI();renderManage();toast('모두 펼침');}

function updStats(){
  const all=allCards();
  const tgt=all.filter(x=>g(x.id)>0);
  const metC=tgt.filter(x=>c(x.id)>=g(x.id)).length;
  const spT=all.reduce((a,x)=>a+sp(x.id),0);
  const wtT=all.reduce((a,x)=>a+wt(x.id),0);
  const el=document.getElementById('hdr-stats');if(!el)return;
  if(curTab==='collect'){
    el.innerHTML=`<span class="schip">🎯<span class="sv">${metC}/${tgt.length}</span></span>${spT?`<span class="schip" style="border-color:var(--want-bd);color:var(--want)">✨<span class="sv">${spT}</span></span>`:''}${wtT?`<span class="schip" style="border-color:var(--have-bd);color:var(--have)">🔍<span class="sv">${wtT}</span></span>`:''}`;
  }else if(curTab==='manage'){
    const pct=tgt.length?Math.round(metC/tgt.length*100):0;
    el.innerHTML=`<span class="schip">📋<span class="sv">목표 ${tgt.length}</span></span><span class="schip" style="color:var(--ok);border-color:rgba(34,197,94,.3)">✓<span class="sv">${pct}%</span></span>`;
  }else{
    el.innerHTML=`${wtT?`<span class="schip" style="border-color:var(--want-bd);color:var(--want)">🔍<span class="sv">구해요 ${wtT}</span></span>`:''}${spT?`<span class="schip" style="border-color:var(--have-bd);color:var(--have)">✨<span class="sv">있어요 ${spT}</span></span>`:''}${!wtT&&!spT?`<span class="schip">🔄 교환 없음</span>`:''}`;
  }
}

function goTab(v){curTab=v;document.querySelectorAll('[data-v]').forEach(el=>el.classList.toggle('on',el.dataset.v===v));renderCur();updStats();}
function renderCur(){if(curTab==='collect')renderCollect();else if(curTab==='manage')renderManage();else renderTrade();}

// ══ COLLECT ══
function renderCollect(){
  const el=document.getElementById('main');
  const all=allCards();
  const tgt=all.filter(x=>g(x.id)>0);
  const metC=tgt.filter(x=>c(x.id)>=g(x.id)).length;
  const spT=all.reduce((a,x)=>a+sp(x.id),0);
  const wtT=all.reduce((a,x)=>a+wt(x.id),0);
  const stats=`<div class="tab-stats">
    <div class="tsb" style="--tscolor:var(--blue)"><div class="tsv">${tgt.length}</div><div class="tsl">목표</div></div>
    <div class="tsb" style="--tscolor:var(--ok)"><div class="tsv">${metC}</div><div class="tsl">수집 완료</div></div>
    <div class="tsb" style="--tscolor:var(--warn)"><div class="tsv">${spT}</div><div class="tsl">있어요</div></div>
    <div class="tsb" style="--tscolor:var(--want)"><div class="tsv">${wtT}</div><div class="tsl">구해요</div></div>
  </div>`;

  const collapseBar=`<div style="display:flex;justify-content:flex-end;margin-bottom:6px">

    </div>
  </div>`;

  const f=UI.flt;
  const albFilter=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
    <button class="fp${!cAlb?' on-all':''}" onclick="setAlb(null)">전체</button>
    ${DB.albumTypes.map(a=>`<button class="fp alb${cAlb===a.id?' on-alb':''}" onclick="setAlb('${a.id}')" style="--ac:${a.color};${cAlb===a.id?`background:${a.color};border-color:transparent;color:#fff`:`border-color:${a.color}44;color:${a.color}`}">${a.shortName}</button>`).join('')}
    <div class="fsep"></div>
    <button class="tog-btn${UI.srt?' active':''}" onclick="toggleSort()">가나다</button>
    <button class="tog-btn${f==='h'?' active':''}" onclick="setFlt('h')">있는것만</button>
    <button class="tog-btn${f==='n'?' active':''}" onclick="setFlt('n')">없는것만</button>
  </div>`;

  const albums=cAlb?DB.albumTypes.filter(a=>a.id===cAlb):DB.albumTypes;
  let secs='';
  for(const alb of albums){
    const sortedSets=[...alb.sets].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    for(const set of sortedSets){
      let cards=set.cards.slice(); // DB 순서 고정: 예준·노아·밤비·은호·하민
      if(f==='h') cards=cards.filter(x=>c(x.id)>0);
      else if(f==='n') cards=cards.filter(x=>c(x.id)===0&&g(x.id)>0);
      if(!cards.length&&f!=='all') continue;
      const isC=UI.col[set.id];
      const t2=set.cards.filter(x=>g(x.id)>0).length;
      const m2=set.cards.filter(x=>g(x.id)>0&&c(x.id)>=g(x.id)).length;
      const pct=t2?Math.round(m2/t2*100):0;
      secs+=`<div class="sec-block">
        <div class="sec-hdr" onclick="colSec('${set.id}')">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
          ${t2>0?`<div class="sec-prog-wrap"><span class="sec-pct">${m2}/${t2}</span><div class="sec-pb"><div class="sec-pbf" style="width:${pct}%;background:${alb.color}"></div></div></div>`:''}
          <span class="chev${isC?'':' open'}">▼</span>
        </div>
        ${isC?'':`<div class="sec-body"><div class="pcg">
        ${cards.map(card=>{
          const gv=g(card.id),cv=c(card.id),s_=sp(card.id),w_=wt(card.id),st=sts(card.id);
          const hasMemo=mo(card.id).trim().length>0;
          let cls='pct';if(st==='n')cls+=' ng';else if(st==='c')cls+=' sc';else if(st==='m')cls+=' sm';else if(st==='h')cls+=' sh';
          let bdg='';if(s_>0)bdg=`<div class="pbdg h">+${s_}</div>`;else if(w_>0)bdg=`<div class="pbdg w">−${w_}</div>`;else if(st==='m')bdg=`<div class="pbdg m">✓</div>`;
          // 숫자색: 미달=빨강, 달성=초록, 초과=파랑, 없음=회색
          const nc = st==='c'?'var(--want)' : st==='m'?'var(--ok)' : st==='h'?'var(--have)' : 'var(--tx3)';
          return `<div class="${cls}">
            <div class="pci" onclick="openFull('${card.id}')">
              ${card.img?`<img src="${card.img}" alt="${card.name}" loading="lazy">`:`<div class="pcph">${card.name}</div>`}
              ${bdg}${hasMemo?'<div class="mdot"></div>':''}
            </div>
            <div class="pcb">
              <div class="pcbtn" onclick="subC('${card.id}',event)">−</div>
              <div class="pcm">
                <div class="pcn">${card.name}</div>
                <div class="pcv"><span style="color:${nc}">${cv}</span><span style="color:var(--tx3);font-size:8px"> / ${gv||'0'}</span></div>
              </div>
              <div class="pcbtn" onclick="addC('${card.id}',event)">+</div>
            </div>
          </div>`;}).join('')}
        </div></div>`}
      </div>`;
    }
  }
  el.innerHTML=stats+collapseBar+albFilter+secs;
}
function setAlb(id){cAlb=id===cAlb?null:id;renderCollect();}
function setFlt(f){UI.flt=UI.flt===f?'all':f;saveUI();renderCollect();}
function toggleSort(){UI.srt=!UI.srt;saveUI();renderCollect();}

// ══ MANAGE ══

    <div class="tsb" style="--tscolor:var(--ok)"><div class="tsv">${metC}</div><div class="tsl">수집 완료</div></div>

      <button style="padding:4px 11px;font-size:10px;font-weight:700;background:none;border:none;border-right:1px solid var(--bd);color:var(--tx2);cursor:pointer" onclick="colAllMgmt()">모두 접기</button>
      <button style="padding:4px 11px;font-size:10px;font-weight:700;background:none;border:none;color:var(--tx2);cursor:pointer" onclick="expAllMgmt()">모두 펼치기</button>

  const filters=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;align-items:center">

    <div class="fsep"></div>
    <button class="tog-btn${mf==='h'?' active':''}" onclick="setMF('h')">있는것만</button>
    <button class="tog-btn${mf==='n'?' active':''}" onclick="setMF('n')">없는것만</button>
  </div>`;
  const hint=`<div style="font-size:11px;color:var(--tx2);background:var(--s1);border:1px solid var(--bd);border-radius:var(--r-sm);padding:7px 11px;margin-bottom:9px">💡 세트+1 버튼으로 해당 세트 전체 목표 +1</div>`;
  const albums=(mAlb?DB.albumTypes.filter(a=>a.id===mAlb):DB.albumTypes);
  let secs='';
  for(const alb of albums){
    const sortedSets=[...alb.sets].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    for(const set of sortedSets){
      let cards=set.cards.slice(); // DB 순서: 예준·노아·밤비·은호·하민
      if(mf==='h') cards=cards.filter(x=>c(x.id)>0);
      else if(mf==='n') cards=cards.filter(x=>c(x.id)===0);
      if(!cards.length&&mf!=='all') continue;
      const isC=UI.mgl[set.id];
      secs+=`<div class="msec">
        <div class="mhdr" onclick="UI.mgl['${set.id}']=!UI.mgl['${set.id}'];saveUI();renderManage()">
          <div class="mtitle">
            <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${set.name}</span>
          </div>
          <div class="macts" onclick="event.stopPropagation()">
            <button class="sbtn" style="color:${alb.color};border-color:${alb.color}44" onclick="addSetGoal('${set.id}',-1)">−1</button>
            <button class="sbtn" style="color:#fff;background:${alb.color};border-color:${alb.color}" onclick="addSetGoal('${set.id}',1)">세트+1</button>
          </div>
          <span class="chev${isC?'':' open'}" style="margin-left:4px">▼</span>
        </div>
        ${isC?'':`<div class="mmems">
          ${cards.map(card=>{const gv=g(card.id),cv=c(card.id);return `<div class="mmem">
            <div class="mmimg">${card.img?`<img src="${card.img}">`:`<div class="mmph">${card.name.substring(0,1)}</div>`}</div>
            <div class="mmn">${card.name}</div>
            <div class="mmctrl">
              <button class="mmbtn" onclick="setGoal('${card.id}',${gv-1})">−</button>
              <span class="mmval">${gv}</span>
              <button class="mmbtn" onclick="setGoal('${card.id}',${gv+1})">+</button>
            </div>
            <div class="mmcol">${cv>0?cv+'장':'-'}</div>

        </div>`}
      </div>`;
    }
  }
  el.innerHTML=stats+collapseBarM+filters+hint+secs;

function setMAlb(id){UI.mAlb=id===UI.mAlb?null:id;saveUI();renderManage();}
function setMF(f){UI.mf=UI.mf===f?'all':f;saveUI();renderManage();}

// ══ TRADE ══
function renderTrade(){
  const el=document.getElementById('main');
  const all=allCards();
  const taf=UI.talbArr||[]; // multi-select array
  const wCards=all.filter(x=>wt(x.id)>0&&(!taf.length||taf.includes(x.aId)));
  const hCards=all.filter(x=>sp(x.id)>0&&(!taf.length||taf.includes(x.aId)));
  const wtT=all.reduce((a,x)=>a+wt(x.id),0);
  const spT=all.reduce((a,x)=>a+sp(x.id),0);

  const tf=`<div class="tr-filter">
    <button class="fp${!taf.length?' on-all':''}" onclick="setTAF(null)">전체</button>
    ${DB.albumTypes.map(a=>{const on=taf.includes(a.id);return`<button class="fp alb${on?' on-alb':''}" onclick="setTAF('${a.id}')" style="--ac:${a.color};${on?`background:${a.color};border-color:transparent;color:#fff`:`border-color:${a.color}44;color:${a.color}`}">${a.shortName}</button>`;}).join('')}
    <button class="shot-btn" onclick="exportScreenshot()" style="margin-left:auto">📸 스크린샷</button>
  </div>`;

  function grid(cards, mode){
    if(!cards.length) return `<div class="tr-empty">${mode==='w'?'🔍 구하는 카드가 없어요<br><small>목표 설정 후 수집하면 자동 표시</small>':'✨ 여유분이 없어요<br><small>목표 초과 수집 시 여유분 생성</small>'}</div>`;
    let h='';
    for(const alb of DB.albumTypes){
      const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
      const sids=[...new Set(ac.map(x=>x.sId))];
      h+=`<div class="tr-alb-grp"><div class="tr-alb-lbl"><span style="width:7px;height:7px;border-radius:50%;background:${alb.color};display:inline-block"></span><span style="color:${alb.color};font-weight:800">${alb.name}</span><span style="color:var(--tx3)">&nbsp;${ac.length}종</span></div>`;
      for(const sid of sids){
        const sc=ac.filter(x=>x.sId===sid); // DB 순서 유지
        h+=`<div class="tr-set-lbl">${sc[0]?.sN||''}</div><div class="pcg" style="margin-bottom:10px">`;
        for(const card of sc){
          const cnt=mode==='w'?wt(card.id):sp(card.id);
          const hasMemo=mo(card.id).trim().length>0;
          // softer border: thin rgba instead of solid bright
          const borderC=mode==='w'?'rgba(244,63,94,.35)':'rgba(59,130,246,.35)';
          h+=`<div class="trt ${mode==='w'?'wt':'ht'}" style="border-color:${borderC};border-width:1px" onclick="openFull('${card.id}')">
            <div class="pci" style="cursor:pointer;position:relative">
              ${card.img?`<img src="${card.img}" alt="${card.name}" loading="lazy">`:`<div class="pcph" style="background:${alb.color}22">${card.name}</div>`}
              ${hasMemo?'<div class="mdot"></div>':''}
            </div>
            <div class="trb ${mode==='w'?'wb':'hb'}">
              <span class="trn">${card.name}</span>
              <span class="trcnt ${mode==='w'?'w':'h'}">${mode==='w'?'−':'+'}&nbsp;${cnt}</span>
            </div>
          </div>`;
        }
        h+='</div>';
      }
      h+='</div>';
    }
    return h;
  }

  el.innerHTML=`${tf}<div class="tr-split">
    <div>
      <div class="tr-sec-hdr wh">
        <span class="tr-title wt">🔍 구해요</span>
        <span class="tr-cnt-badge wb">총 ${wtT}개</span>
      </div>
      ${grid(wCards,'w')}
    </div>
    <div>
      <div class="tr-sec-hdr hh">
        <span class="tr-title ht">✨ 있어요</span>
        <span class="tr-cnt-badge hb">총 ${spT}개</span>
      </div>
      ${grid(hCards,'h')}
    </div>
  </div>`;
}
function setTAF(id){
  if(!id){UI.talbArr=[];} // 전체 = clear
  else{
    const arr=UI.talbArr||[];
    const idx=arr.indexOf(id);
    if(idx>=0) arr.splice(idx,1); else arr.push(id);
    UI.talbArr=[...arr];
  }
  renderTrade();
}

// ══ SCREENSHOT EXPORT ══
async function loadH2C(){
  if(window.html2canvas)return;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}
async function exportScreenshot(){
  toast('스크린샷 준비 중...');
  try{await loadH2C();}catch(e){toast('라이브러리 로드 실패. 온라인 상태를 확인해주세요.');return;}
  const all=allCards();
  const wCards=all.filter(x=>wt(x.id)>0);
  const hCards=all.filter(x=>sp(x.id)>0);
  if(!wCards.length&&!hCards.length){toast('교환할 카드가 없어요');return;}

  const area=document.getElementById('shot-area');
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const bg=isDark?'#08090f':'#f0f2f9';
  const tx=isDark?'#e8edf8':'#141830';
  const s2=isDark?'#13161f':'#fff';
  const bd=isDark?'#1f2535':'#d4daf0';

  function miniGrid(cards, mode){
    let h='';
    for(const alb of DB.albumTypes){
      const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
      const sids=[...new Set(ac.map(x=>x.sId))];

      for(const sid of sids){
        const sc=ac.filter(x=>x.sId===sid);
        h+=`<div style="font-size:9px;color:#7a8fb0;margin-bottom:3px">${sc[0]?.sN||''}</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:6px">`;
        for(const card of sc){
          const cnt=mode==='w'?wt(card.id):sp(card.id);
          const bdrC=mode==='w'?'#f43f5e':'#3b82f6';
          h+=`<div style="border-radius:6px;overflow:hidden;background:${s2};border:2px solid ${bdrC};display:flex;flex-direction:column">
            <div style="aspect-ratio:5/7;background:${alb.color}22;display:flex;align-items:center;justify-content:center;font-size:8px;color:${tx};font-weight:700;overflow:hidden">
              ${card.img?`<img src="${card.img}" style="width:100%;height:100%;object-fit:cover">`:`${card.name}`}
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 4px;background:${mode==='w'?'rgba(244,63,94,.12)':'rgba(59,130,246,.12)'}">
              <span style="font-size:8px;font-weight:700;color:${tx};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${card.name}</span>
              <span style="font-size:9px;font-weight:800;color:${mode==='w'?'#f43f5e':'#3b82f6'};flex-shrink:0;margin-left:2px">${mode==='w'?'−':'+'} ${cnt}</span>
            </div>
          </div>`;
        }
        h+='</div>';
      }
      h+='</div>';
    }
    return h;
  }

  const now=new Date().toLocaleDateString('ko-KR');
  area.style.cssText=`position:fixed;left:-9999px;top:0;width:360px;background:${bg};padding:14px;font-family:'Noto Sans KR',sans-serif;color:${tx}`;
  area.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid ${bd}">
      <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">PLAVE Caligo Pt.2</div>
      <div style="font-size:10px;color:#7a8fb0">교환 정보 · ${now}</div>
    </div>
    ${wCards.length?`<div style="background:rgba(244,63,94,.12);border:1.5px solid rgba(244,63,94,.3);border-radius:10px;padding:10px 12px;margin-bottom:12px">
      <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;color:#f43f5e;margin-bottom:8px">🔍 구해요 <span style="font-size:12px">총 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</span></div>
      ${miniGrid(wCards,'w')}
    </div>`:''}
    ${hCards.length?`<div style="background:rgba(59,130,246,.12);border:1.5px solid rgba(59,130,246,.3);border-radius:10px;padding:10px 12px">
      <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;color:#3b82f6;margin-bottom:8px">✨ 있어요 <span style="font-size:12px">총 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</span></div>
      ${miniGrid(hCards,'h')}
    </div>`:''}
    <div style="text-align:center;margin-top:10px;font-size:9px;color:#384560">PLAVE POCA TRACKER</div>
  `;

  try{
    const canvas=await html2canvas(area,{backgroundColor:bg,scale:2,useCORS:true,logging:false,windowWidth:360});
    const link=document.createElement('a');
    link.download=`교환정보_${now.replace(/\./g,'')}.png`;
    link.href=canvas.toDataURL('image/png');link.click();
    toast('📸 스크린샷 저장 완료!');
  }catch(e){toast('스크린샷 생성 실패: '+e.message);}
  area.innerHTML='';
}

// ══ FULLSCREEN ══
function openFull(id){
  const r=findCard(id);if(!r)return;
  fsId=id;const{card,alb,set}=r;
  document.getElementById('fs-img').innerHTML=card.img?`<img class="fsimg" src="${card.img}" alt="${card.name}">`:`<div class="fsph">📷<br><small>이미지 없음</small></div>`;
  document.getElementById('fs-name').textContent=card.name;
  document.getElementById('fs-meta').textContent=`${alb.name} · ${set.name}`;
  updFull();
  const m=document.getElementById('fs-memo');if(m)m.value=mo(id);
  document.getElementById('fsov').classList.add('open');
}
function updFull(){if(!fsId)return;document.getElementById('fs-coll').textContent=c(fsId);document.getElementById('fs-goal').textContent=g(fsId);document.getElementById('fs-have').textContent=sp(fsId);document.getElementById('fs-want').textContent=wt(fsId);}
function closeFull(){document.getElementById('fsov').classList.remove('open');fsId=null;}
function fsAdj(d){if(!fsId)return;ST.collected[fsId]=Math.max(0,(ST.collected[fsId]||0)+d);saveST();updFull();renderCur();updStats();if(d>0){const g0=g(fsId),c0=c(fsId);if(g0>0&&c0===g0)toast('🎉 목표 달성!');}}
function fsGoal(d){if(!fsId)return;setGoal(fsId,g(fsId)+d);updFull();}

function showSettings(){document.getElementById('set-ov').classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function importState(inp){if(!inp.files[0])return;const r=new FileReader();r.onload=e=>{try{ST=JSON.parse(e.target.result);ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};saveST();closeSheet('set-ov');renderCur();updStats();toast('복원 완료 ✓');}catch(e){toast('파일 오류');}};r.readAsText(inp.files[0]);}
function exportState(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(ST,null,2)],{type:'application/json'}));a.download=`poca_백업_${new Date().toISOString().split('T')[0]}.json`;a.click();toast('백업 파일 저장됨 ✓');}
function resetState(){if(!confirm('정말 모든 데이터를 초기화할까요?'))return;ST={goals:{},collected:{},memos:{}};saveST();closeSheet('set-ov');renderCur();updStats();toast('초기화 완료');}
function toggleTheme(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('theme-btn').textContent=t==='dark'?'🌙':'☀️';}
function toast(msg){const w=document.getElementById('tw');const el=document.createElement('div');el.className='toast';el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),2100);}

function init(){
  loadDB();loadST();loadUI();
  renderCollect();updStats();
  fetch('./poca_db.json').then(r=>r.json()).then(d=>{DB=d;saveDB();renderCur();updStats();}).catch(()=>{});
}
init();
</script>
