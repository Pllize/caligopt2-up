<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Caligo Pt.2 드볼관리기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0e1018;--s2:#13161f;--s3:#191d28;
  --bd:#1f2535;--bd2:#2a3347;
  --tx:#e8edf8;--tx2:#7a8fb0;--tx3:#384560;
  --blue:#4f8aff;--purple:#8b5cf6;
  --want:#f43f5e;--want-g:rgba(244,63,94,.12);--want-bd:rgba(244,63,94,.3);
  --have:#3b82f6;--have-g:rgba(59,130,246,.12);--have-bd:rgba(59,130,246,.3);
  --ok:#22c55e;--warn:#f59e0b;
  --r:12px;--r-sm:8px;
}
[data-theme="light"]{
  --bg:#f0f2f9;--s1:#fff;--s2:#f4f6ff;--s3:#e8ecf7;
  --bd:#d4daf0;--bd2:#b8c2de;--tx:#141830;--tx2:#5a6a90;--tx3:#a0aecb;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;overflow:hidden;height:100svh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,textarea{font-family:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-sm);outline:none}
input:focus,textarea:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100svh}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50}
.logo-wrap{flex-shrink:0;display:flex;align-items:baseline;gap:7px}
.logo-main{font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;letter-spacing:-.3px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;color:var(--tx2)}
.hdr-r{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.abtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);background:var(--s2);border:1px solid var(--bd);font-size:14px}

/* TABS */
.dtabs{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;display:none;flex-shrink:0}
.dtab{padding:9px 14px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Outfit',sans-serif}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);display:none}
.bnav-inner{display:flex;height:52px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:9px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;transition:color .15s}
.btab.on{color:var(--blue)}
.btab-ico{font-size:18px;line-height:1}

.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px calc(60px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch}
@media(min-width:641px){.dtabs{display:flex}.bnav{display:none!important}.main{padding:12px}}
@media(max-width:640px){.dtabs{display:none}.bnav{display:block}}

/* FILTERS */
.frow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.fp{padding:4px 11px;border-radius:16px;font-size:11px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;transition:all .14s;white-space:nowrap;font-family:'Outfit',sans-serif}
.fp.on-all{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:#fff}
.fp.on-alb{color:#fff;border-color:transparent}
.fp.on-m{background:var(--s3);border-color:var(--blue);color:var(--blue)}
.fp.on-f{background:var(--s3);border-color:var(--blue);color:var(--blue)}
.fsep{width:1px;height:16px;background:var(--bd);flex-shrink:0;margin:0 2px}
/* 3-way toggle */
.ftog{display:inline-flex;background:var(--s2);border:1px solid var(--bd);border-radius:20px;overflow:hidden;flex-shrink:0}
.ftog-btn{padding:4px 11px;font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .14s;font-family:'Outfit',sans-serif}
.ftog-btn.on{background:var(--blue);color:#fff}
/* collapse toggle */
.coltog{display:inline-flex;background:var(--s2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;flex-shrink:0}
.coltog-btn{padding:4px 10px;font-size:10px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;border-right:1px solid var(--bd)}
.coltog-btn:last-child{border-right:none}
.coltog-btn:hover{background:var(--s3);color:var(--tx)}

/* SECTION */
.sets-wrap{display:grid;gap:6px;align-items:start}
.sec-block{border-radius:var(--r);background:var(--s1);border:1px solid var(--bd);overflow:hidden;min-width:0}
.sec-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;user-select:none;transition:background .12s}
.sec-hdr:hover{background:var(--s2)}
.sec-atag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;color:#fff;flex-shrink:0}
.sec-name{font-size:11px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-pw{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sec-pct{font-size:9px;font-weight:700;color:var(--tx2);font-family:'Outfit',sans-serif}
.sec-pb{width:28px;height:2px;background:var(--bd);border-radius:2px;overflow:hidden}
.sec-pbf{height:100%;border-radius:2px;transition:width .4s}
.chev{font-size:10px;color:var(--tx3);transition:transform .22s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.sec-body{padding:6px 7px 8px}

/* CARD GRID — always N cols, responsive sections */
.pcg{display:grid;gap:4px}

/* CARD TILE */
.pct{border-radius:7px;overflow:hidden;background:var(--s2);border:1px solid var(--bd);transition:border-color .2s,box-shadow .2s;user-select:none;display:flex;flex-direction:column;position:relative}
.pct.ng{opacity:.4}
.pct.sc{border-color:rgba(244,63,94,.5)}
.pct.sm{border-color:rgba(34,197,94,.6);box-shadow:0 0 6px rgba(34,197,94,.15)}
.pct.sh{border-color:rgba(59,130,246,.6);box-shadow:0 0 6px rgba(59,130,246,.15)}
.pci{aspect-ratio:5/7;position:relative;overflow:hidden;cursor:pointer;background:var(--s3)}
.pci img{width:100%;height:100%;object-fit:cover;display:block}
.pcph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--tx3);text-align:center;padding:2px}
.pbdg{position:absolute;top:3px;right:3px;border-radius:4px;font-size:7px;font-weight:800;padding:1px 3px;line-height:1.4;font-family:'Outfit',monospace}
.pbdg.w{background:rgba(244,63,94,.85);color:#fff}
.pbdg.h{background:rgba(59,130,246,.85);color:#fff}
.pbdg.m{background:rgba(34,197,94,.85);color:#fff}
.mdot{position:absolute;top:3px;left:3px;width:5px;height:5px;border-radius:50%;background:var(--ok);box-shadow:0 0 3px rgba(34,197,94,.6)}
/* card bottom — two rows */
.pcb{flex-shrink:0;display:flex;align-items:center;min-height:32px;background:rgba(0,0,0,.6)}
[data-theme="light"] .pcb{background:rgba(0,0,0,.1)}
.pcbtn{width:18px;height:32px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.55);font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;line-height:1}
[data-theme="light"] .pcbtn{color:rgba(0,0,0,.4)}
.pcbtn:active{background:rgba(255,255,255,.1)}
.pcm{flex:1;text-align:left;overflow:hidden;padding:3px 4px}
.pc-row{display:flex;align-items:center;justify-content:space-between;line-height:1.35}
.pc-lbl{font-size:7px;color:rgba(255,255,255,.45);font-weight:600;flex-shrink:0;width:18px}
[data-theme="light"] .pc-lbl{color:rgba(0,0,0,.35)}
.pc-val{font-size:9px;font-family:'Outfit',monospace;font-weight:700}

/* GOALS TAB */
.msec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:7px;overflow:hidden}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--bd);gap:6px;cursor:pointer}
.mtitle{font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.macts{display:flex;gap:4px;flex-shrink:0}
.sbtn{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:'Outfit',sans-serif}
.mmems{display:grid;grid-template-columns:repeat(5,1fr)}
.mmem{padding:6px 3px;text-align:center;border-right:1px solid var(--bd)}
.mmem:last-child{border-right:none}
.mmimg{width:32px;height:45px;border-radius:4px;overflow:hidden;margin:0 auto 3px;background:var(--s2);border:1px solid var(--bd)}
.mmimg img{width:100%;height:100%;object-fit:cover}
.mmph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--tx3)}
.mmn{font-size:9px;font-weight:700;margin-bottom:3px}
.mmctrl{display:flex;align-items:center;justify-content:center;gap:2px}
.mmbtn{width:18px;height:18px;border-radius:3px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.mmbtn:active{background:var(--s3)}
.mmval{font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;min-width:14px;text-align:center}
.mmcol{font-size:8px;color:var(--tx3);margin-top:1px;font-family:'Outfit',monospace}

/* TRADE */
.tr-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:9px;margin-bottom:8px;border:1.5px solid}
.tr-hdr.wh{background:var(--want-g);border-color:var(--want-bd)}
.tr-hdr.hh{background:var(--have-g);border-color:var(--have-bd)}
.tr-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px}
.tr-title.wt{color:var(--want)}.tr-title.ht{color:var(--have)}
.tr-badge{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif;margin-left:auto}
.tr-badge.wb{background:var(--want);color:#fff}.tr-badge.hb{background:var(--have);color:#fff}
.tr-empty{text-align:center;padding:20px;color:var(--tx3);font-size:12px;line-height:1.8}
.tr-alb-lbl{font-size:10px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.tr-set-lbl{font-size:9px;color:var(--tx3);font-weight:600;margin-bottom:3px}
.trt{border-radius:7px;overflow:hidden;background:var(--s2);cursor:pointer;display:flex;flex-direction:column;user-select:none;transition:transform .12s}
.trt:active{transform:scale(.96)}
.trt.wt{border:1px solid rgba(244,63,94,.35)}
.trt.ht{border:1px solid rgba(59,130,246,.35)}
.trb{display:flex;align-items:center;justify-content:space-between;padding:3px 5px;flex-shrink:0}
.trb.wb{background:var(--want-g)}.trb.hb{background:var(--have-g)}
.trn{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.trcnt{font-size:10px;font-weight:800;font-family:'Outfit',monospace;flex-shrink:0}
.trcnt.w{color:var(--want)}.trcnt.h{color:var(--have)}
/* landscape trade */
.trade-ls{display:flex;height:100%}
.trade-ls-sb{width:130px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bd);padding:6px 5px;transition:width .25s ease;background:var(--s1);display:flex;flex-direction:column;gap:4px}
.trade-ls-sb.col{width:30px;overflow:hidden;padding:6px 3px}
.ls-tog{width:22px;height:22px;border-radius:5px;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;align-self:flex-end}
.ls-fp{padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;text-align:left;white-space:nowrap}
.ls-fp.on{color:#fff;border-color:transparent}
.trade-ls-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.trade-ls-ch{display:flex;flex-shrink:0;border-bottom:1px solid var(--bd)}
.trade-ls-ch>div{flex:1;padding:7px 10px;display:flex;align-items:center;gap:6px}
.trade-ls-ch>div:first-child{border-right:1px solid var(--bd)}
.trade-ls-cols{flex:1;display:flex;overflow:hidden}
.trade-ls-col{flex:1;overflow-y:auto;padding:7px 6px}
.trade-ls-col:first-child{border-right:1px solid var(--bd)}
.shot-btn{padding:4px 12px;border-radius:14px;font-size:11px;font-weight:700;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;gap:3px;white-space:nowrap}
.shot-btn:active{background:var(--s3)}

/* FULLSCREEN */
.fsov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;padding:12px 12px calc(14px + env(safe-area-inset-bottom));overflow-y:auto}
.fsov.open{display:flex}
.fscl{position:fixed;top:12px;right:12px;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:32px;height:32px;font-size:14px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1}
.fsimg{max-width:min(88vw,200px);max-height:52vh;border-radius:10px;object-fit:contain;box-shadow:0 12px 48px rgba(0,0,0,.9);margin-top:40px;flex-shrink:0}
.fsph{width:150px;height:210px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx3);margin-top:40px;flex-shrink:0}
.fsi{width:100%;max-width:300px;margin-top:10px}
.fsname{font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;text-align:center;margin-bottom:2px}
.fsmeta{font-size:11px;color:var(--tx2);text-align:center;margin-bottom:10px}
/* status chips */
.fs-chips{display:flex;gap:6px;justify-content:center;margin-bottom:12px;min-height:22px}
/* ctrl rows */
.fs-ctrl{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:9px;padding:9px 12px;margin-bottom:7px;border:1px solid rgba(255,255,255,.07)}
[data-theme="light"] .fs-ctrl{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.07)}
.fs-lbl{font-size:11px;font-weight:700;color:var(--tx2);width:28px;flex-shrink:0}
.fs-cb{padding:6px 14px;border-radius:7px;font-size:14px;font-weight:800;background:var(--s3);border:1px solid var(--bd);color:var(--tx);cursor:pointer;font-family:'Outfit',sans-serif;flex-shrink:0}
.fs-cb:active{background:var(--bd2)}
.fs-cb.p{background:var(--blue);border-color:var(--blue);color:#fff}
.fs-cb.p:active{background:#3a70f0}
.fs-cbv{font-family:'Outfit',sans-serif;font-weight:800;font-size:22px;flex:1;text-align:center}
.fsmemow{width:100%;margin-bottom:10px}
.fsmeml{font-size:11px;color:var(--tx2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.fsmemi{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-family:inherit;font-size:12px;padding:8px 10px;resize:none;min-height:48px;line-height:1.5;outline:none}
[data-theme="light"] .fsmemi{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--tx)}
.fsmemi:focus{border-color:rgba(255,255,255,.28)}
.fs-hide-btn{width:100%;padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;border:1px solid;font-family:'Outfit',sans-serif;display:none;margin-top:4px}

/* USAGE TAB */
.usage-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.usage-h{font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.usage-p{font-size:12px;color:var(--tx2);line-height:1.8}
.usage-p b{color:var(--tx);font-weight:700}

/* SHEET */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;animation:shup .2s ease}
@keyframes shup{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sttl{font-weight:800;font-size:14px;font-family:'Outfit',sans-serif}
.sbdy{overflow-y:auto;padding:16px;flex:1}
.sfot{display:flex;justify-content:flex-end;gap:8px;padding:10px 16px;border-top:1px solid var(--bd);flex-shrink:0}
.desc{font-size:11px;color:var(--tx2);line-height:1.7;background:var(--s2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;border:1px solid var(--bd)}
.desc b{color:var(--tx)}

/* NOTICE POPUP */
.notice-wrap{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:440px;max-height:80vh;display:flex;flex-direction:column;animation:shup .25s ease}
.notice-body{overflow-y:auto;padding:20px;flex:1}
.notice-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.notice-lang{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);font-size:10px;font-weight:700;color:var(--tx2);margin-bottom:10px}
.notice-text{font-size:12px;color:var(--tx2);line-height:1.9;white-space:pre-line;margin-bottom:14px}
.notice-text b{color:var(--tx)}
.notice-sig{text-align:center;font-size:13px;margin-top:6px;padding-top:14px;border-top:1px solid var(--bd);color:var(--tx2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r-sm);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;border:none;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center;margin-bottom:7px}
.btn-warn{color:var(--want);border:1px solid var(--want-bd);justify-content:center;width:100%}
.cta-box{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.cta-box p{font-size:11px;color:var(--tx2);flex:1;min-width:120px}

/* WIZARD */
.wiz-chip{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;border:2px solid;cursor:pointer;transition:all .14s;font-family:'Outfit',sans-serif}

/* TOAST */
.tw{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}
.toast{background:var(--s3);border:1px solid var(--bd2);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;white-space:nowrap;font-family:'Outfit',sans-serif;animation:tin .2s ease,tout .3s ease 1.7s forwards}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0}}

<body>
<div class="app">
  <header class="hdr">

    </div>

/* ══ LOAD/SAVE ══ */
function loadDB(){const s=localStorage.getItem(DB_KEY);DB=s?JSON.parse(s):JSON.parse(JSON.stringify(DEF_DB));}
function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(DB));}
function loadST(){const s=localStorage.getItem(ST_KEY);if(s)try{ST=JSON.parse(s);}catch(e){}ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};}
function saveST(){localStorage.setItem(ST_KEY,JSON.stringify(ST));}
function loadUI(){const s=localStorage.getItem(UI_KEY);if(s)try{UI=Object.assign(UI,JSON.parse(s));}catch(e){}
  UI.col=UI.col||{};UI.mgl=UI.mgl||{};UI.cAlbs=Array.isArray(UI.cAlbs)?UI.cAlbs:[];
  UI.cMembers=Array.isArray(UI.cMembers)?UI.cMembers:[];
  UI.mAlbs=Array.isArray(UI.mAlbs)?UI.mAlbs:[];
  UI.mMembers=Array.isArray(UI.mMembers)?UI.mMembers:[];
  UI.talbArr=Array.isArray(UI.talbArr)?UI.talbArr:[];UI.theme=UI.theme||'dark';}
function saveUI(){localStorage.setItem(UI_KEY,JSON.stringify(UI));}

/* ══ HELPERS ══ */
const g=id=>ST.goals[id]||0;
const c=id=>ST.collected[id]||0;
const sp=id=>Math.max(0,c(id)-g(id));
const wt=id=>g(id)>0?Math.max(0,g(id)-c(id)):0;
const mo=id=>ST.memos[id]||'';
const hid=id=>!!ST.hidden[id];
function sts(id){const gv=g(id),cv=c(id);if(!gv)return'n';if(cv>gv)return'h';if(cv===gv)return'm';return'c';}
function allCards(){const r=[];for(const a of DB.albumTypes)for(const s of a.sets)for(const card of s.cards)r.push({...card,aId:a.id,aN:a.name,aS:a.shortName,aC:a.color,sId:s.id,sN:s.name});return r;}
function findCard(id){for(const a of DB.albumTypes)for(const s of a.sets)for(const card of s.cards)if(card.id===id)return{card,alb:a,set:s};return null;}

/* ══ ACTIONS ══ */
function addC(id,e){if(e)e.stopPropagation();ST.collected[id]=(ST.collected[id]||0)+1;saveST();renderCur();const g0=g(id),c0=c(id);if(g0>0&&c0===g0)toast('🎉 달성!');else if(g0>0&&c0>g0)toast(`✨ +${c0-g0}`);}
function subC(id,e){if(e)e.stopPropagation();ST.collected[id]=Math.max(0,(ST.collected[id]||0)-1);saveST();renderCur();}
function setGoal(id,n){ST.goals[id]=Math.max(0,n);saveST();renderCur();}
function saveMemo(v){if(!fsId)return;ST.memos[fsId]=v;saveST();renderCur();}
function addSetGoal(sid,d){for(const a of DB.albumTypes)for(const s of a.sets)if(s.id===sid){for(const card of s.cards)ST.goals[card.id]=Math.max(0,(ST.goals[card.id]||0)+d);break;}saveST();renderCur();toast(d>0?'전체+1 ✓':'전체−1');}
function toggleHide(){if(!fsId)return;const isH=hid(fsId);const msg=isH?'다시 있어요 목록에 표시할까요?':'있어요 목록에서 숨길까요? (수집 수는 유지됩니다)';if(!confirm(msg))return;if(isH)delete ST.hidden[fsId];else ST.hidden[fsId]=true;saveST();updFull();renderCur();toast(isH?'있어요에 표시됩니다':'있어요에서 숨겼어요');}
function colSec(k){UI.col[k]=!UI.col[k];saveUI();renderCur();}
function collapseAll(){allCards().forEach(x=>{UI.col[x.sId]=true;});saveUI();renderCur();toast('모두 접음');}

function colAllGoals(){allCards().forEach(x=>{UI.mgl[x.sId]=true;});saveUI();renderGoals();}

/* ══ FILTER BUILDERS ══ */
function filterRow(cAlbs,cMembers,flt,onAlb,onMem,onFlt,extraRight=''){
  return `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:8px">
    <div style="display:flex;flex-direction:column;gap:5px;flex:1">
      <div class="frow" style="margin-bottom:0">
        <button class="fp${!cAlbs.length?' on-all':''}" onclick="${onAlb}(null)">전체</button>
        ${DB.albumTypes.map(a=>`<button class="fp${cAlbs.includes(a.id)?' on-alb':''}" onclick="${onAlb}('${a.id}')" style="${cAlbs.includes(a.id)?`background:${a.color};border-color:transparent;color:#fff`:`border-color:${a.color}44;color:${a.color}`}">${a.shortName}</button>`).join('')}
      </div>
      <div class="frow" style="margin-bottom:0">
        ${MEMBERS.map(m=>`<button class="fp${cMembers.includes(m)?' on-m':''}" onclick="${onMem}('${m}')">${m}</button>`).join('')}
        <div class="fsep"></div>
        <div class="ftog">
          <span class="ftog-btn${flt==='all'?' on':''}" onclick="${onFlt}('all')">모두</span>
          <span class="ftog-btn${flt==='h'?' on':''}" onclick="${onFlt}('h')">있는것만</span>
          <span class="ftog-btn${flt==='n'?' on':''}" onclick="${onFlt}('n')">없는것만</span>
        </div>
      </div>
    </div>
    ${extraRight}
  </div>`;
}

/* ══ NAVIGATION ══ */
function goTab(v){curTab=v;document.querySelectorAll('[data-v]').forEach(el=>el.classList.toggle('on',el.dataset.v===v));document.getElementById('main').style.padding='';renderCur();}
function renderCur(){if(curTab==='collect')renderCollect();else if(curTab==='trade')renderTrade();else if(curTab==='goals')renderGoals();else renderUsage();}

/* ══ COLLECT ══ */
function renderCollect(){
  const el=document.getElementById('main');
  const nMem=UI.cMembers.length||5;
  // min section width per visible card, capped for readability
  const minW=Math.max(nMem*50+28, 110);

  const colCtrl=`<div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">
    <div class="coltog"><span class="coltog-btn" onclick="collapseAll()">접기</span><span class="coltog-btn" onclick="expandAll()">펼치기</span></div>
    <button class="shot-btn" onclick="exportCollectScreenshot()">📸 저장</button>
  </div>`;

  const filters=filterRow(UI.cAlbs,UI.cMembers,UI.flt,'setCAl','setCM','setFlt',colCtrl);

  const albums=UI.cAlbs.length?DB.albumTypes.filter(a=>UI.cAlbs.includes(a.id)):DB.albumTypes;
  let secs='';
  for(const alb of albums){
    for(const set of alb.sets){
      let cards=set.cards.slice();
      if(UI.cMembers.length) cards=cards.filter(x=>UI.cMembers.includes(x.name));
      if(UI.flt==='h') cards=cards.filter(x=>c(x.id)>0);
      else if(UI.flt==='n') cards=cards.filter(x=>c(x.id)===0&&g(x.id)>0);
      if(!cards.length) continue;
      const isC=UI.col[set.id];
      const t2=set.cards.filter(x=>g(x.id)>0).length;
      const m2=set.cards.filter(x=>g(x.id)>0&&c(x.id)>=g(x.id)).length;
      const pct=t2?Math.round(m2/t2*100):0;
      const nc=cards.length; // actual visible card count
      secs+=`<div class="sec-block">
        <div class="sec-hdr" onclick="colSec('${set.id}')">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
          ${t2>0?`<div class="sec-pw"><span class="sec-pct">${m2}/${t2}</span><div class="sec-pb"><div class="sec-pbf" style="width:${pct}%;background:${alb.color}"></div></div></div>`:''}
          <span class="chev${isC?'':' open'}">▼</span>
        </div>
        ${isC?'':`<div class="sec-body"><div class="pcg" style="grid-template-columns:repeat(${nc},1fr)">
          ${cards.map(card=>{
            const gv=g(card.id),cv=c(card.id),s_=sp(card.id),w_=wt(card.id),st=sts(card.id);
            const hasMemo=mo(card.id).trim().length>0;
            let cls='pct';if(st==='n')cls+=' ng';else if(st==='c')cls+=' sc';else if(st==='m')cls+=' sm';else if(st==='h')cls+=' sh';
            let bdg='';if(s_>0)bdg=`<div class="pbdg h">+${s_}</div>`;else if(w_>0)bdg=`<div class="pbdg w">−${w_}</div>`;else if(st==='m')bdg=`<div class="pbdg m">✓</div>`;
            const cC=st==='c'?'var(--want)':st==='m'?'var(--ok)':st==='h'?'var(--have)':'var(--tx3)';
            return `<div class="${cls}">
              <div class="pci" onclick="openFull('${card.id}')">
                ${card.img?`<img src="${card.img}" alt="${card.name}" loading="lazy">`:`<div class="pcph">${card.name}</div>`}
                ${bdg}${hasMemo?'<div class="mdot"></div>':''}
              </div>
              <div class="pcb">
                <div class="pcbtn" onclick="subC('${card.id}',event)">−</div>
                <div class="pcm">
                  <div class="pc-row"><span class="pc-lbl">보유</span><span class="pc-val" style="color:${cC}">${cv}</span></div>
                  <div class="pc-row"><span class="pc-lbl">목표</span><span class="pc-val" style="color:var(--tx3)">${gv}</span></div>
                </div>
                <div class="pcbtn" onclick="addC('${card.id}',event)">+</div>
              </div>
            </div>`;}).join('')}
        </div></div>`}
      </div>`;
    }
  }
  el.innerHTML=filters+`<div class="sets-wrap" style="grid-template-columns:repeat(auto-fill,minmax(${minW}px,1fr))">${secs}</div>`;
}
function setCAl(id){if(id===null)UI.cAlbs=[];else{const i=UI.cAlbs.indexOf(id);if(i>=0)UI.cAlbs.splice(i,1);else UI.cAlbs.push(id);}saveUI();renderCollect();}
function setCM(m){if(!m)return;const i=UI.cMembers.indexOf(m);if(i>=0)UI.cMembers.splice(i,1);else UI.cMembers.push(m);saveUI();renderCollect();}
function setFlt(f){UI.flt=f;saveUI();renderCollect();}

/* ══ GOALS TAB ══ */
function renderGoals(){
  const el=document.getElementById('main');
  const mAlbs=UI.mAlbs||[], mMems=UI.mMembers||[], mflt=UI.mflt||'all';
  const colCtrl=`<div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">
    <div class="coltog"><span class="coltog-btn" onclick="colAllGoals()">접기</span><span class="coltog-btn" onclick="expAllGoals()">펼치기</span></div>
  </div>`;
  const filters=filterRow(mAlbs,mMems,mflt,'setMAl','setMM','setMFlt',colCtrl);

  const cta=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <button class="btn btn-p" style="justify-content:center;padding:12px" onclick="showWizard()">
      <span style="font-size:16px">⚡</span><div><div style="font-size:12px;font-weight:800">빠른 목표 설정</div><div style="font-size:10px;opacity:.8;font-weight:500">처음 사용자 추천</div></div>
    </button>
    <button class="btn" style="justify-content:center;padding:12px;background:var(--s1);border:1px solid var(--want-bd);color:var(--want)" onclick="resetAllGoals()">
      <span style="font-size:16px">🗑</span><div><div style="font-size:12px;font-weight:800">목표 전체 초기화</div><div style="font-size:10px;opacity:.7;font-weight:500">모든 목표를 0으로</div></div>
    </button>
  </div>`;

  const albums=(mAlbs.length?DB.albumTypes.filter(a=>mAlbs.includes(a.id)):DB.albumTypes);
  let secs='';
  for(const alb of albums){
    for(const set of alb.sets){
      let cards=set.cards.slice();
      if(mMems.length) cards=cards.filter(x=>mMems.includes(x.name));
      if(mflt==='h') cards=cards.filter(x=>c(x.id)>0);
      else if(mflt==='n') cards=cards.filter(x=>c(x.id)===0);
      if(!cards.length) continue;
      const isC=UI.mgl[set.id];
      secs+=`<div class="msec">
        <div class="mhdr" onclick="UI.mgl['${set.id}']=!UI.mgl['${set.id}'];saveUI();renderGoals()">
          <div class="mtitle">
            <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${set.name}</span>
          </div>
          <div class="macts" onclick="event.stopPropagation()">
            <button class="sbtn" style="color:${alb.color};border-color:${alb.color}44" onclick="addSetGoal('${set.id}',-1)">전체−1</button>
            <button class="sbtn" style="color:#fff;background:${alb.color};border-color:${alb.color}" onclick="addSetGoal('${set.id}',1)">전체+1</button>
          </div>
          <span class="chev${isC?'':' open'}" style="margin-left:4px">▼</span>
        </div>
        ${isC?'':`<div class="mmems">
          ${cards.map(card=>{const gv=g(card.id),cv=c(card.id);return `<div class="mmem">
            <div class="mmimg">${card.img?`<img src="${card.img}">`:`<div class="mmph">${card.name.slice(0,1)}</div>`}</div>
            <div class="mmn">${card.name}</div>
            <div class="mmctrl">
              <button class="mmbtn" onclick="setGoal('${card.id}',${gv-1})">−</button>
              <span class="mmval">${gv}</span>
              <button class="mmbtn" onclick="setGoal('${card.id}',${gv+1})">+</button>
            </div>
            <div class="mmcol">${cv>0?cv+'장':'-'}</div>
          </div>`;}).join('')}
        </div>`}
      </div>`;
    }
  }
  el.innerHTML=filters+cta+secs;
}
function setMAl(id){if(id===null)UI.mAlbs=[];else{const i=UI.mAlbs.indexOf(id);if(i>=0)UI.mAlbs.splice(i,1);else UI.mAlbs.push(id);}saveUI();renderGoals();}
function setMM(m){if(!m)return;const i=UI.mMembers.indexOf(m);if(i>=0)UI.mMembers.splice(i,1);else UI.mMembers.push(m);saveUI();renderGoals();}
function setMFlt(f){UI.mflt=f;saveUI();renderGoals();}

/* ══ TRADE ══ */
function isLS(){return window.innerWidth>window.innerHeight&&window.innerHeight<520;}
function renderTrade(){if(isLS())renderTradeLandscape();else renderTradePortrait();}

function buildTradeGrid(cards,mode){
  if(!cards.length)return`<div class="tr-empty">${mode==='w'?'🔍 구하는 카드가 없어요':'✨ 여유분이 없어요'}</div>`;
  let h='';
  for(const alb of DB.albumTypes){
    const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
    const sids=[...new Set(ac.map(x=>x.sId))];
    h+=`<div style="margin-bottom:10px"><div class="tr-alb-lbl"><span style="width:7px;height:7px;border-radius:50%;background:${alb.color};display:inline-block"></span><span style="color:${alb.color};font-weight:800">${alb.name}</span></div>`;
    for(const sid of sids){
      const sc=ac.filter(x=>x.sId===sid);
      h+=`<div class="tr-set-lbl">${sc[0]?.sN||''}</div><div class="pcg" style="grid-template-columns:repeat(5,1fr);margin-bottom:8px">`;
      for(const card of sc){
        const cnt=mode==='w'?wt(card.id):sp(card.id);
        const hasMemo=mo(card.id).trim().length>0;
        h+=`<div class="trt ${mode==='w'?'wt':'ht'}" onclick="openFull('${card.id}')">
          <div class="pci" style="position:relative">
            ${card.img?`<img src="${card.img}" loading="lazy">`:`<div class="pcph">${card.name}</div>`}
            ${hasMemo?'<div class="mdot"></div>':''}
          </div>
          <div class="trb ${mode==='w'?'wb':'hb'}">
            <span class="trcnt ${mode==='w'?'w':'h'}">${mode==='w'?'−':'+'} ${cnt}</span>
          </div>
        </div>`;
      }
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}

function renderTradePortrait(){
  const el=document.getElementById('main');
  el.style.padding='';
  const all=allCards();
  const taf=UI.talbArr;
  const wC=all.filter(x=>wt(x.id)>0&&(!taf.length||taf.includes(x.aId)));
  const hC=all.filter(x=>sp(x.id)>0&&!hid(x.id)&&(!taf.length||taf.includes(x.aId)));
  const wT=all.reduce((a,x)=>a+wt(x.id),0);
  const hT=all.filter(x=>!hid(x.id)).reduce((a,x)=>a+sp(x.id),0);
  const tf=`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:10px">
    <button class="fp${!taf.length?' on-all':''}" onclick="setTAF(null)">전체</button>
    ${DB.albumTypes.map(a=>{const on=taf.includes(a.id);return`<button class="fp${on?' on-alb':''}" onclick="setTAF('${a.id}')" style="${on?`background:${a.color};border-color:transparent;color:#fff`:`border-color:${a.color}44;color:${a.color}`}">${a.shortName}</button>`;}).join('')}
    <button class="shot-btn" onclick="exportScreenshot()" style="margin-left:auto">📸 저장</button>
  </div>`;
  el.innerHTML=`${tf}
    <div class="tr-hdr wh"><span class="tr-title wt">🔍 구해요</span><span class="tr-badge wb">총 ${wT}개</span></div>
    ${buildTradeGrid(wC,'w')}
    <div style="height:12px"></div>
    <div class="tr-hdr hh"><span class="tr-title ht">✨ 있어요</span><span class="tr-badge hb">총 ${hT}개</span></div>
    ${buildTradeGrid(hC,'h')}`;
}

        <div><span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:var(--have)">✨ 있어요</span><span style="font-size:11px;color:var(--tx2);margin-left:5px">총 ${hT}개</span></div>

function setTAF(id){if(!id){UI.talbArr=[];}else{const arr=UI.talbArr;const i=arr.indexOf(id);if(i>=0)arr.splice(i,1);else arr.push(id);UI.talbArr=[...arr];}renderTrade();}

window.addEventListener('resize',()=>{if(curTab==='trade'){document.getElementById('main').style.padding='';renderTrade();}});

      • ⚙️ 설정 → <b>백업하기</b>로 JSON 파일을 저장해두세요<br>
      • 폰 바꾸거나 브라우저 초기화 전에 반드시 백업 필요!<br>
      • 백업 파일로 다른 기기에서도 복원할 수 있어요
    </div>
  </div>
  <div style="text-align:center;padding:16px;font-size:11px;color:var(--tx3)">
    Made with 💙 for PLLIs &nbsp;|&nbsp; @plli_ze
  </div>`;
}

/* ══ FULLSCREEN ══ */
function openFull(id){
  const r=findCard(id);if(!r)return;
  fsId=id;const{card,alb,set}=r;
  document.getElementById('fs-img').innerHTML=card.img?`<img class="fsimg" src="${card.img}">`:`<div class="fsph">📷</div>`;
  document.getElementById('fs-name').textContent=card.name;
  document.getElementById('fs-meta').textContent=`${alb.name} · ${set.name}`;
  updFull();
  const m=document.getElementById('fs-memo');if(m)m.value=mo(id);
  document.getElementById('fsov').classList.add('open');
}
function updFull(){
  if(!fsId)return;
  const cv=c(fsId),gv=g(fsId),s_=sp(fsId),w_=wt(fsId);
  document.getElementById('fs-coll').textContent=cv;
  document.getElementById('fs-goal').textContent=gv;
  const ch=document.getElementById('fs-chips');
  if(ch){let h='';if(s_>0)h+=`<span style="background:var(--have-g);border:1px solid var(--have-bd);color:var(--have);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">✨ 있어요 ${s_}</span>`;if(w_>0)h+=`<span style="background:var(--want-g);border:1px solid var(--want-bd);color:var(--want);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">🔍 구해요 ${w_}</span>`;ch.innerHTML=h;}
  const hb=document.getElementById('fs-hide-btn');
  if(hb){
    hb.style.display=s_>0?'block':'none';
    if(s_>0){const isH=hid(fsId);hb.textContent=isH?'👁 있어요에 다시 표시하기':'🚫 있어요에서 숨기기';hb.style.cssText=`display:block;background:none;border-color:${isH?'var(--ok)':'var(--want)'};color:${isH?'var(--ok)':'var(--want)'};width:100%;padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;border:1px solid;font-family:'Outfit',sans-serif`;}
  }
}
function closeFull(){document.getElementById('fsov').classList.remove('open');fsId=null;}
function fsAdj(d){if(!fsId)return;ST.collected[fsId]=Math.max(0,(ST.collected[fsId]||0)+d);saveST();updFull();renderCur();if(d>0){const g0=g(fsId),c0=c(fsId);if(g0>0&&c0===g0)toast('🎉 목표 달성!');}}
function fsGoal(d){if(!fsId)return;setGoal(fsId,g(fsId)+d);updFull();}
function toggleHide(){if(!fsId)return;const isH=hid(fsId);if(!confirm(isH?'다시 있어요에 표시할까요?':'있어요 목록에서 숨길까요?\n(수집 수는 유지됩니다)'))return;if(isH)delete ST.hidden[fsId];else ST.hidden[fsId]=true;saveST();updFull();renderCur();toast(isH?'있어요에 표시됩니다':'있어요에서 숨겼어요');}

/* ══ WIZARD ══ */
function showWizard(){
  wiz={step:1,albums:['poca','photobook','inventory','idpass'],inclUnpo:false,members:[...MEMBERS],count:1};
  renderWizStep();document.getElementById('wiz-ov').classList.add('open');
}
function renderWizStep(){
  const body=document.getElementById('wiz-body'),foot=document.getElementById('wiz-foot');
  document.getElementById('wiz-ttl').textContent=wiz.step===1?'🎯 Step 1/2 — 앨범 선택':'🎯 Step 2/2 — 멤버 & 수량';
  if(wiz.step===1){
    const albs=[{id:'poca',name:'POCAALBUM',color:'#4f7eff'},{id:'photobook',name:'PHOTOBOOK',color:'#7b5fff'},{id:'inventory',name:'INVENTORY',color:'#06b6d4'},{id:'idpass',name:'IDPASS',color:'#a855f7'}];
    body.innerHTML=`<p style="font-size:12px;color:var(--tx2);margin-bottom:12px">수집할 앨범을 선택하세요 (복수 선택 가능)</p>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px">
        ${albs.map(a=>`<button class="wiz-chip" onclick="wizToggleAlb('${a.id}')" style="${wiz.albums.includes(a.id)?`background:${a.color};border-color:${a.color};color:#fff`:`border-color:${a.color}55;color:${a.color};background:none`}">${a.name}</button>`).join('')}
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)">
        <input type="checkbox" ${wiz.inclUnpo?'checked':''} onchange="wiz.inclUnpo=this.checked" style="width:16px;height:16px">
        <span style="font-size:12px;font-weight:600">미공포 포함 <span style="font-size:11px;font-weight:400;color:var(--tx2)">(메이크스타, 무신사, HMV 등)</span></span>
      </label>`;
    foot.innerHTML=`<button class="btn btn-s btn-sm" onclick="closeSheet('wiz-ov')">나중에</button><button class="btn btn-p btn-sm" onclick="wizNext()">다음 →</button>`;
  }else{
    body.innerHTML=`<p style="font-size:12px;color:var(--tx2);margin-bottom:12px">수집할 멤버와 목표 수량을 설정하세요.</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px">
        ${MEMBERS.map(m=>`<button class="wiz-chip" onclick="wizToggleMember('${m}');renderWizStep()" style="${wiz.members.includes(m)?'background:var(--blue);border-color:var(--blue);color:#fff':'border-color:var(--bd);color:var(--tx2);background:none'}">${m}</button>`).join('')}
      </div>
      <div style="text-align:center">
        <p style="font-size:11px;color:var(--tx2);margin-bottom:12px">선택한 멤버 전체에 동일하게 적용</p>
        <div style="display:inline-flex;align-items:center;background:var(--s2);border:1px solid var(--bd);border-radius:14px;overflow:hidden">
          <button onclick="if(wiz.count>0)wiz.count--;renderWizStep()" style="padding:12px 22px;font-size:22px;font-weight:800;background:none;border:none;border-right:1px solid var(--bd);color:var(--tx);cursor:pointer;font-family:'Outfit',sans-serif">−</button>
          <span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:32px;min-width:64px;text-align:center;padding:0 8px">${wiz.count}</span>
          <button onclick="wiz.count++;renderWizStep()" style="padding:12px 22px;font-size:22px;font-weight:800;background:none;border:none;border-left:1px solid var(--bd);color:var(--tx);cursor:pointer;font-family:'Outfit',sans-serif">+</button>
        </div>
        <div style="font-size:12px;color:var(--tx2);margin-top:8px">장 / 멤버</div>
      </div>`;
    foot.innerHTML=`<button class="btn btn-s btn-sm" onclick="wizPrev()">← 이전</button><button class="btn btn-p btn-sm" onclick="wizApply()">설정 완료 ✓</button>`;
  }
}
function wizToggleAlb(id){const i=wiz.albums.indexOf(id);if(i>=0)wiz.albums.splice(i,1);else wiz.albums.push(id);renderWizStep();}
function wizToggleMember(m){const i=wiz.members.indexOf(m);if(i>=0)wiz.members.splice(i,1);else wiz.members.push(m);}
function wizNext(){if(!wiz.albums.length){toast('앨범을 선택해주세요');return;}wiz.step=2;renderWizStep();}
function wizPrev(){wiz.step=1;renderWizStep();}
function wizApply(){
  if(!wiz.members.length){toast('멤버를 선택해주세요');return;}
  const albs=[...wiz.albums,...(wiz.inclUnpo?['unpo']:[])];
  for(const alb of DB.albumTypes){if(!albs.includes(alb.id))continue;for(const set of alb.sets)for(const card of set.cards)if(wiz.members.includes(card.name))ST.goals[card.id]=wiz.count;}
  saveST();closeSheet('wiz-ov');renderCur();toast('🎉 목표 설정 완료! 세부 조정은 목표 탭에서');
}

/* ══ SCREENSHOT (Trade) ══ */
async function loadH2C(){if(window.html2canvas)return;return new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

function buildShotGrid(cards,mode,bg,tx2,alb2){
  if(!cards.length)return`<div style="color:${tx2};font-size:11px;padding:10px">없음</div>`;
  let h='';
  for(const alb of DB.albumTypes){
    const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
    const sids=[...new Set(ac.map(x=>x.sId))];
    h+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:${alb.color};margin-bottom:3px">${alb.name}</div>`;
    for(const sid of sids){
      const sc=ac.filter(x=>x.sId===sid);
      h+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:5px">`;
      for(const card of sc){
        const cnt=mode==='w'?wt(card.id):sp(card.id);
        h+=`<div style="border-radius:5px;overflow:hidden;border:1px solid ${mode==='w'?'rgba(244,63,94,.4)':'rgba(59,130,246,.4)'}">
          <div style="aspect-ratio:5/7;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:7px;color:${tx2};background:${alb.color}22">
            ${card.img?`<img src="${card.img}" style="width:100%;height:100%;object-fit:cover">`:`${card.name}`}
          </div>
          <div style="padding:2px 3px;background:${mode==='w'?'rgba(244,63,94,.1)':'rgba(59,130,246,.1)'};font-size:8px;font-weight:800;color:${mode==='w'?'#f43f5e':'#3b82f6'};text-align:center">${mode==='w'?'−':'+'} ${cnt}</div>
        </div>`;
      }
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}

async function exportScreenshot(){
  toast('스크린샷 준비 중...');
  try{await loadH2C();}catch(e){toast('라이브러리 로드 실패');return;}
  const all=allCards();
  const wCards=all.filter(x=>wt(x.id)>0);
  const hCards=all.filter(x=>sp(x.id)>0&&!hid(x.id));
  if(!wCards.length&&!hCards.length){toast('교환할 카드가 없어요');return;}
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const bg=dark?'#08090f':'#f0f2f9';const tx2=dark?'#7a8fb0':'#5a6a90';
  const bd=dark?'#1f2535':'#d4daf0';const now=new Date().toLocaleDateString('ko-KR');
  const area=document.getElementById('shot-area');
  const lscape=isLS();
  const w=lscape?720:360;
  area.style.cssText=`position:fixed;left:-9999px;top:0;width:${w}px;background:${bg};padding:12px;font-family:'Noto Sans KR',sans-serif;color:${dark?'#e8edf8':'#141830'}`;
  const hdr=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid ${bd}"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Caligo Pt.2 드볼관리기</div><div style="font-size:10px;color:${tx2}">${now}</div></div>`;
  if(lscape){
    area.innerHTML=`${hdr}<div style="display:flex;gap:10px">
      <div style="flex:1;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:8px;padding:8px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;color:#f43f5e;margin-bottom:6px">🔍 구해요 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</div>${buildShotGrid(wCards,'w',bg,tx2)}</div>
      <div style="flex:1;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:8px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;color:#3b82f6;margin-bottom:6px">✨ 있어요 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</div>${buildShotGrid(hCards,'h',bg,tx2)}</div>
    </div>`;
  }else{
    area.innerHTML=`${hdr}
      ${wCards.length?`<div style="background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);border-radius:8px;padding:10px;margin-bottom:10px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:#f43f5e;margin-bottom:7px">🔍 구해요 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</div>${buildShotGrid(wCards,'w',bg,tx2)}</div>`:''}
      ${hCards.length?`<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:10px"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:#3b82f6;margin-bottom:7px">✨ 있어요 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</div>${buildShotGrid(hCards,'h',bg,tx2)}</div>`:''}`;
  }
  try{
    const canvas=await html2canvas(area,{backgroundColor:bg,scale:2,useCORS:true,logging:false,windowWidth:w});
    const link=document.createElement('a');link.download=`교환_${now.replace(/\./g,'')}.png`;link.href=canvas.toDataURL('image/png');link.click();
    toast('📸 저장 완료!');
  }catch(e){toast('실패: '+e.message);}
  area.innerHTML='';
}

/* ══ COLLECT SCREENSHOT ══ */
async function exportCollectScreenshot(){
  toast('스크린샷 준비 중...');
  try{await loadH2C();}catch(e){toast('라이브러리 로드 실패');return;}
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const bg=dark?'#08090f':'#f0f2f9';const tx2=dark?'#7a8fb0':'#5a6a90';
  const bd=dark?'#1f2535':'#d4daf0';const now=new Date().toLocaleDateString('ko-KR');
  const lscape=isLS();const w=lscape?720:360;
  const area=document.getElementById('shot-area');
  area.style.cssText=`position:fixed;left:-9999px;top:0;width:${w}px;background:${bg};padding:12px;font-family:'Noto Sans KR',sans-serif;color:${dark?'#e8edf8':'#141830'}`;
  const albums=UI.cAlbs.length?DB.albumTypes.filter(a=>UI.cAlbs.includes(a.id)):DB.albumTypes;
  let secH='';
  for(const alb of albums){
    for(const set of alb.sets){
      let cards=set.cards.slice();
      if(UI.cMembers.length)cards=cards.filter(x=>UI.cMembers.includes(x.name));
      if(UI.flt==='h')cards=cards.filter(x=>c(x.id)>0);
      else if(UI.flt==='n')cards=cards.filter(x=>c(x.id)===0&&g(x.id)>0);
      if(!cards.length)continue;
      secH+=`<div style="margin-bottom:8px">
        <div style="font-size:10px;font-weight:700;margin-bottom:3px"><span style="background:${alb.color};color:#fff;padding:1px 6px;border-radius:5px;font-size:9px">${alb.shortName}</span> ${set.name}</div>
        <div style="display:grid;grid-template-columns:repeat(${cards.length},1fr);gap:3px">
          ${cards.map(card=>{const cv=c(card.id),gv=g(card.id),st=sts(card.id);const bdr=st==='c'?'rgba(244,63,94,.5)':st==='m'?'rgba(34,197,94,.6)':st==='h'?'rgba(59,130,246,.6)':'rgba(255,255,255,.1)';return`<div style="border-radius:5px;overflow:hidden;border:1px solid ${bdr}">
            <div style="aspect-ratio:5/7;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:7px;color:${tx2};background:${alb.color}22">${card.img?`<img src="${card.img}" style="width:100%;height:100%;object-fit:cover">`:`${card.name}`}</div>
            <div style="padding:2px 3px;background:rgba(0,0,0,.5);display:flex;justify-content:space-between;font-size:7px;font-family:'Outfit',monospace;font-weight:700">
              <span style="color:${st==='c'?'#f43f5e':st==='m'?'#22c55e':st==='h'?'#3b82f6':'#7a8fb0'}">${cv}</span><span style="color:${tx2}">${gv}</span>
            </div>
          </div>`;}).join('')}
        </div>
      </div>`;
    }
  }
  const hdr=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid ${bd}"><div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Caligo Pt.2 수집 현황</div><div style="font-size:10px;color:${tx2}">${now}</div></div>`;
  area.innerHTML=hdr+`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(${Math.max((UI.cMembers.length||5)*46+20,100)}px,1fr));gap:6px">${secH}</div>`;
  try{
    const canvas=await html2canvas(area,{backgroundColor:bg,scale:2,useCORS:true,logging:false,windowWidth:w});
    const link=document.createElement('a');link.download=`수집_${now.replace(/\./g,'')}.png`;link.href=canvas.toDataURL('image/png');link.click();
    toast('📸 저장 완료!');
  }catch(e){toast('실패: '+e.message);}
  area.innerHTML='';
}

/* ══ NOTICE ══ */
function showNotice(){
  document.getElementById('notice-ko').textContent=NOTICE_KO;
  document.getElementById('notice-en').textContent=NOTICE_EN;
  document.getElementById('notice-ov').classList.add('open');
}
function closeNotice(){
  UI.noticeVer=NOTICE_VER;saveUI();
  document.getElementById('notice-ov').classList.remove('open');
}

/* ══ SETTINGS ══ */
function showSettings(){document.getElementById('set-ov').classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function importState(inp){if(!inp.files[0])return;const r=new FileReader();r.onload=e=>{try{ST=JSON.parse(e.target.result);ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};saveST();closeSheet('set-ov');renderCur();toast('복원 완료 ✓');}catch(e){toast('파일 오류');}};r.readAsText(inp.files[0]);}
function exportState(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(ST,null,2)],{type:'application/json'}));a.download=`포카백업_${new Date().toISOString().split('T')[0]}.json`;a.click();toast('백업 파일 저장됨 ✓');}
function resetState(){if(!confirm('모든 수집·목표·메모를 초기화할까요?'))return;ST={goals:{},collected:{},memos:{},hidden:{}};saveST();closeSheet('set-ov');renderCur();toast('초기화 완료');}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('theme-btn');if(b)b.textContent=t==='dark'?'🌙':'☀️';}
function toggleTheme(){UI.theme=UI.theme==='dark'?'light':'dark';applyTheme(UI.theme);saveUI();}
function toast(msg){const w=document.getElementById('tw');const el=document.createElement('div');el.className='toast';el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),2100);}

/* ══ INIT ══ */
function init(){
  loadDB();loadST();loadUI();
  applyTheme(UI.theme||'dark');
  renderCur();
  // scroll-to-top
  document.getElementById('main').addEventListener('scroll',function(){
    const btn=document.getElementById('scroll-top-btn');if(!btn)return;
    btn.style.opacity=this.scrollTop>200?'1':'0';
    btn.style.pointerEvents=this.scrollTop>200?'auto':'none';
  },{passive:true});
  // notice check
  if((UI.noticeVer||0)<NOTICE_VER)setTimeout(showNotice,600);
  // wizard for new users
  const hasGoal=Object.values(ST.goals).some(v=>v>0);
  if(!hasGoal&&(UI.noticeVer||0)>=NOTICE_VER)setTimeout(showWizard,400);
  // load db
  fetch('./poca_db.json').then(r=>r.json()).then(d=>{DB=d;saveDB();renderCur();}).catch(()=>{});
}
init();
</script>
