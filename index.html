<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Caligo Pt.2 드볼관리기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f9;--s1:#fff;--s2:#f4f6ff;--s3:#e8ecf7;
  --bd:#d4daf0;--bd2:#b8c2de;--tx:#141830;--tx2:#5a6a90;--tx3:#a0aecb;
  --blue:#4f8aff;--purple:#8b5cf6;
  --want:#f43f5e;--want-g:rgba(244,63,94,.12);--want-bd:rgba(244,63,94,.3);
  --have:#3b82f6;--have-g:rgba(59,130,246,.12);--have-bd:rgba(59,130,246,.3);
  --ok:#22c55e;--warn:#f59e0b;
  --r:12px;--r-sm:8px;
  /* card width that makes the strip text fit on one line */
  --card-w:72px;
}
[data-theme="dark"]{
  --bg:#08090f;--s1:#0e1018;--s2:#13161f;--s3:#191d28;
  --bd:#1f2535;--bd2:#2a3347;--tx:#e8edf8;--tx2:#7a8fb0;--tx3:#384560;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;overflow:hidden;height:100svh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,textarea{font-family:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-sm);outline:none}
input:focus,textarea:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100svh}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50}
.logo-main{font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;color:var(--tx2);margin-left:7px}
.hdr-r{display:flex;gap:4px;margin-left:auto}
.abtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);background:var(--s2);border:1px solid var(--bd);font-size:14px;flex-shrink:0}
.dtabs{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 12px;display:none;flex-shrink:0;overflow-x:auto}
.dtab{padding:9px 14px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Outfit',sans-serif}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.bnav-inner{display:flex;height:52px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:9px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif}
.btab.on{color:var(--blue)}
.btab-ico{font-size:18px;line-height:1}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px calc(60px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch}
@media(min-width:641px){.dtabs{display:flex}.bnav{display:none!important}.main{padding:12px}}
@media(max-width:640px){.dtabs{display:none}.bnav{display:block}}

/* ── FILTER ROW (inline, original style) ── */
.frow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.fp{padding:4px 11px;border-radius:16px;font-size:11px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx2);cursor:pointer;transition:all .14s;white-space:nowrap;font-family:'Outfit',sans-serif}
.fp.on-all{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:#fff}
.fp.on-alb{color:#fff;border-color:transparent}
.fp.on-m{background:var(--s3);border-color:var(--blue);color:var(--blue)}
.fsep{width:1px;height:16px;background:var(--bd);flex-shrink:0;margin:0 2px}
.ftog{display:inline-flex;background:var(--s2);border:1px solid var(--bd);border-radius:20px;overflow:hidden;flex-shrink:0}
.ftog-btn{padding:4px 11px;font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif}
.ftog-btn.on{background:var(--blue);color:#fff}
.coltog{display:inline-flex;background:var(--s2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;flex-shrink:0}
.coltog-btn{padding:4px 10px;font-size:10px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;border-right:1px solid var(--bd)}
.coltog-btn:last-child{border-right:none}
.coltog-btn:hover{background:var(--s3)}
.shot-btn{padding:4px 10px;font-size:10px;font-weight:700;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx2);cursor:pointer;white-space:nowrap}

/* ── SECTIONS ── */
.sets-wrap{display:grid;gap:6px;align-items:start}
.sec-block{border-radius:var(--r);background:var(--s1);border:1px solid var(--bd);overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;user-select:none;transition:background .12s}
.sec-hdr:hover{background:var(--s2)}
.sec-atag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;color:#fff;flex-shrink:0}
.sec-name{font-size:11px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-pw{display:flex;align-items:center;gap:4px;flex-shrink:0}
.sec-pct{font-size:9px;font-weight:700;color:var(--tx2);font-family:'Outfit',sans-serif}
.sec-pb{width:28px;height:2px;background:var(--bd);border-radius:2px;overflow:hidden}
.sec-pbf{height:100%;border-radius:2px;transition:width .4s}
.chev{font-size:10px;color:var(--tx3);transition:transform .22s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.sec-body{padding:6px 7px 8px}

/* ── CARD GRID
   Key rule: cards wrap into multiple rows if more than max per row.
   Max cards per row = 5. If set has ≤5 visible cards → 1 row at equal widths.
   If set has >5 → auto-fill with min card width so they wrap naturally.
── */
.pcg{display:grid;gap:4px}
/* For ≤5 cards: explicit equal columns */
/* For >5 cards: use repeat(auto-fill, minmax(var(--card-w), 1fr)) set in JS */

/* ── CARD TILE ── */
.pct{border-radius:7px;overflow:hidden;background:var(--s2);border:1px solid var(--bd);transition:border-color .2s,box-shadow .2s;user-select:none;display:flex;flex-direction:column}
.pct.sc{border-color:rgba(244,63,94,.5)}
.pct.sm{border-color:rgba(34,197,94,.6);box-shadow:0 0 6px rgba(34,197,94,.15)}
.pct.sh{border-color:rgba(59,130,246,.6);box-shadow:0 0 6px rgba(59,130,246,.15)}
.pct.ng{opacity:.5}
.pci{aspect-ratio:5/7;position:relative;overflow:hidden;cursor:pointer;background:var(--s3)}
.pci img{width:100%;height:100%;object-fit:cover;display:block}
.pcph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--tx2);text-align:center;padding:4px;line-height:1.4;background:linear-gradient(160deg,var(--s3),var(--s2))}
.pbdg{position:absolute;top:3px;right:3px;border-radius:4px;font-size:7px;font-weight:800;padding:1px 4px;line-height:1.4;font-family:'Outfit',monospace}
.pbdg.w{background:rgba(244,63,94,.88);color:#fff}
.pbdg.h{background:rgba(59,130,246,.88);color:#fff}
.pbdg.m{background:rgba(34,197,94,.88);color:#fff}
.mdot{position:absolute;bottom:3px;left:3px;width:6px;height:6px;border-radius:50%;background:var(--warn)}
/* +/- overlay */
.pc-ctrl{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;background:rgba(0,0,0,.55);padding:2px 3px;gap:1px}
.pcbtn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:13px;font-weight:800;color:#fff;background:rgba(255,255,255,.18);flex-shrink:0;line-height:1}
.pcbtn:active{transform:scale(.88)}
.pc-cnt{font-family:'Outfit',sans-serif;font-weight:800;font-size:12px;color:#fff;flex:1;text-align:center}
/* status strip — fixed height so it doesn't squish */
.pc-strip{padding:3px 4px;font-size:9px;font-weight:700;text-align:center;font-family:'Outfit',sans-serif;height:18px;line-height:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
/* goal row */
.pc-goal-row{display:flex;align-items:center;justify-content:center;padding:3px 4px;background:var(--s2);border-top:1px solid var(--bd);flex-shrink:0}
.gadj{display:inline-flex;align-items:center;background:var(--s3);border:1px solid var(--bd);border-radius:9px;overflow:hidden}
.gadj button{padding:2px 9px;font-size:13px;font-weight:800;color:var(--tx);font-family:'Outfit',sans-serif}
.gadj-num{font-family:'Outfit',sans-serif;font-weight:800;font-size:12px;min-width:22px;text-align:center;color:var(--tx)}

/* ── TRADE GRID: auto-fill so cards wrap, max width constrained ── */
.trade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));gap:4px}
.trade-wrap{display:flex;flex-direction:column;gap:12px}
@media(min-width:768px){
  .trade-wrap{flex-direction:row;align-items:flex-start}
  .trade-col{flex:1;min-width:0}
}
.trade-col{flex:1;min-width:0}
.trade-ttl-bar{padding:8px 10px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r) var(--r) 0 0}
.trade-body{background:var(--s1);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);padding:8px}

/* ── FULLSCREEN ── */
.fs-ov{position:fixed;inset:0;z-index:400;background:rgba(8,9,15,.94);display:flex;flex-direction:column;align-items:center;padding:16px 16px 24px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s}
.fs-ov.open{opacity:1;pointer-events:auto}
.fs-img-wrap{width:min(150px,42vw);flex-shrink:0}
.fsimg{width:100%;border-radius:10px;display:block}
.fsph-big{width:100%;aspect-ratio:5/7;display:flex;align-items:center;justify-content:center;background:var(--s2);border-radius:10px;font-size:30px}
.fs-name{font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;text-align:center;color:#fff;margin-top:10px}
.fs-meta{font-size:11px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:8px}
.fs-chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;min-height:22px}
.fs-controls{display:flex;gap:10px;justify-content:center;width:100%;max-width:340px;margin-bottom:10px}
.fs-box{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:9px 6px}
.fs-box-lbl{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;font-family:'Outfit',sans-serif}
.fs-box-val{font-family:'Outfit',sans-serif;font-weight:800;font-size:26px;color:#fff}
.fs-box-btns{display:flex;gap:6px}
.fs-box-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:8px;font-size:16px;font-weight:800;color:#fff}
.fs-box-btn:active{transform:scale(.88)}
.fs-bottom{width:100%;max-width:340px}
.fs-memo{width:100%;padding:7px 9px;font-size:12px;resize:none;border-radius:var(--r-sm);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:#fff;margin-bottom:8px}
.fs-memo::placeholder{color:rgba(255,255,255,.3)}
.fs-hide-btn{width:100%;padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;border:1px solid;font-family:'Outfit',sans-serif;margin-bottom:7px;display:none}
.fs-close{width:100%;padding:11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--r-sm);font-size:13px;font-weight:700;color:rgba(255,255,255,.75);cursor:pointer;font-family:'Outfit',sans-serif;text-align:center}

/* ── OVERLAYS ── */
.ov{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:auto}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.sheet{position:relative;width:100%;max-width:520px;margin:0 auto;background:var(--s1);border-radius:20px 20px 0 0;border-top:1px solid var(--bd);padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s}
.ov.open .sheet{transform:translateY(0)}
.sh-bar{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 14px}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sttl{font-family:'Outfit',sans-serif;font-weight:800;font-size:15px}

/* ── SETTINGS ── */
.btn{padding:9px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .14s;display:inline-block}
.btn-p{background:var(--blue);color:#fff;border:none}
.btn-s{background:var(--s2);color:var(--tx2);border:1px solid var(--bd)}
.btn-d{background:rgba(244,63,94,.12);color:var(--want);border:1px solid rgba(244,63,94,.3)}
.btn-sm{padding:7px 12px;font-size:11px}
.btn-full{width:100%;margin-bottom:6px;text-align:center}
.btn-warn{background:rgba(244,63,94,.12);color:var(--want);border:1px solid rgba(244,63,94,.3);width:100%;padding:9px;border-radius:var(--r-sm);font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;text-align:center}
.desc{font-size:11px;color:var(--tx2);line-height:1.6;padding:8px;background:var(--s2);border-radius:var(--r-sm);border:1px solid var(--bd);margin-bottom:8px}

/* ── STATS ── */
.stats-bar{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.stat-chip{padding:4px 10px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r-sm);font-family:'Outfit',sans-serif;font-weight:700;font-size:11px}
.stat-chip span{color:var(--blue)}

/* ── WIZARD ── */
.wiz-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--bd);color:var(--tx2);background:var(--s2);cursor:pointer;font-family:'Outfit',sans-serif}

/* ── USAGE ── */
.use-sec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.use-sec h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;margin-bottom:8px;color:var(--blue)}
.use-sec ul{padding-left:14px;font-size:12px;line-height:2;color:var(--tx2)}

/* ── MISC ── */
.tw{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0px) + 8px);left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:5px}
.toast{background:var(--tx);color:var(--bg);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;animation:tin .2s,tout .3s 1.8s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0}}
.scroll-top-btn{position:fixed;right:12px;bottom:calc(60px + env(safe-area-inset-bottom,0px) + 10px);width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;z-index:200;box-shadow:0 2px 10px rgba(79,138,255,.35)}
.scroll-top-btn.vis{opacity:1;pointer-events:auto}
#shot-area{position:fixed;left:-9999px;top:0;font-family:'Noto Sans KR',sans-serif}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <span class="logo-main">Caligo Pt.2</span><span class="logo-sub">드볼관리기</span>
    <div class="hdr-r">
      <button class="abtn" id="theme-btn" onclick="toggleTheme()">☀️</button>
      <button class="abtn" onclick="showSettings()">⚙️</button>
    </div>
  </div>
  <div class="dtabs" id="dtabs"></div>
  <div class="main" id="main"><div id="page-content"></div></div>
  <div class="bnav"><div class="bnav-inner" id="bnav"></div></div>
</div>

<button class="scroll-top-btn" id="scroll-top-btn" onclick="document.getElementById('main').scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- FULLSCREEN CARD -->
<div class="fs-ov" id="fsov">
  <div class="fs-img-wrap"><div id="fs-img"></div></div>
  <div class="fs-name" id="fs-name"></div>
  <div class="fs-meta" id="fs-meta"></div>
  <div class="fs-chips" id="fs-chips"></div>
  <div class="fs-controls">
    <div class="fs-box">
      <div class="fs-box-lbl">수집</div>
      <div class="fs-box-val" id="fs-coll">0</div>
      <div class="fs-box-btns">
        <button class="fs-box-btn" onclick="fsAdj(-1)">−</button>
        <button class="fs-box-btn" onclick="fsAdj(+1)">+</button>
      </div>
    </div>
    <div class="fs-box">
      <div class="fs-box-lbl">목표</div>
      <div class="fs-box-val" id="fs-goal">0</div>
      <div class="fs-box-btns">
        <button class="fs-box-btn" onclick="fsGoal(-1)">−</button>
        <button class="fs-box-btn" onclick="fsGoal(+1)">+</button>
      </div>
    </div>
  </div>
  <div class="fs-bottom">
    <button class="fs-hide-btn" id="fs-hide-btn" onclick="toggleHide()"></button>
    <textarea class="fs-memo" id="fs-memo" placeholder="메모..." rows="2" oninput="saveMemo()"></textarea>
    <button class="fs-close" onclick="closeFull()">✕ 닫기</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="ov" id="set-ov">
  <div class="ov-bg" onclick="closeSheet('set-ov')"></div>
  <div class="sheet">
    <div class="sh-bar"></div>
    <div class="shdr"><span class="sttl">⚙️ 설정</span><button onclick="closeSheet('set-ov')" style="font-size:16px;color:var(--tx2)">✕</button></div>
    <div class="desc"><b>💾 데이터 백업이란?</b><br>목표·수집 개수·메모를 파일로 저장해요. 브라우저 데이터가 지워져도 복원할 수 있어요.</div>
    <button class="btn btn-p btn-full btn-sm" onclick="exportState()">💾 지금 백업하기</button>
    <button class="btn btn-s btn-full btn-sm" onclick="document.getElementById('st-inp').click()">📂 백업 파일로 복원하기</button>
    <input type="file" id="st-inp" accept=".json" style="display:none" onchange="importState(this)">
    <div class="desc" style="margin-top:6px"><b>⚠️ 주의</b><br>복원하면 현재 데이터가 덮어씌워져요.</div>
    <hr style="border:none;border-top:1px solid var(--bd);margin:10px 0">
    <button class="btn-warn" onclick="resetState()">⚠️ 전체 초기화</button>
    <div style="display:flex;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-s btn-sm" onclick="closeSheet('set-ov')">닫기</button>
    </div>
  </div>
</div>

<!-- WIZARD -->
<div class="ov" id="wiz-ov">
  <div class="ov-bg" onclick="closeSheet('wiz-ov')"></div>
  <div class="sheet">
    <div class="sh-bar"></div>
    <div class="shdr"><span class="sttl" id="wiz-ttl">🎯 빠른 목표 설정</span><button onclick="closeSheet('wiz-ov')" style="font-size:16px;color:var(--tx2)">✕</button></div>
    <div id="wiz-body"></div>
    <div id="wiz-foot" style="display:flex;gap:8px;margin-top:14px"></div>
  </div>
</div>

<div class="tw" id="tw"></div>
<div id="shot-area"></div>

<script>
/* ════════════════════════════════
   CONSTANTS
════════════════════════════════ */
const DB_KEY='plave_poca_db_v3', ST_KEY='plave_poca_st_v2', UI_KEY='plave_poca_ui_v6';
const MEMBERS = ['예준','노아','밤비','은호','하민'];

// CORRECTED member → unit mapping
const MU = {
  '예준': ['맛탕즈','베리즈','댕댕즈','예라인'],
  '노아':  ['맛탕즈','쁜라인','노라인','냥냥즈'],
  '밤비':  ['베리즈','쁜라인','야타즈','댄라즈'],
  '은호':  ['댕댕즈','노라인','야타즈','댕냥즈'],
  '하민':  ['예라인','냥냥즈','댄라즈','댕냥즈'],
};

const TABS=[
  {id:'collect',label:'수집',ico:'📦'},
  {id:'trade',  label:'교환',ico:'🔄'},
  {id:'goals',  label:'목표',ico:'🎯'},
  {id:'usage',  label:'사용법',ico:'📖'},
];

// Card width that makes "✨ 있어요 +N" or "🔍 없어요 −N" fit on one line
// at font-size 9px with padding. ~72px works well.
const CARD_MIN_W = 72;
// Max cards in one row before wrapping
const MAX_PER_ROW = 5;

/* ════════════════════════════════
   STATE
════════════════════════════════ */
let DB=null;
let ST={goals:{},collected:{},memos:{},hidden:{}};
let UI={
  col:{},mgl:{},
  cAlbs:[],cMembers:[],flt:'all',
  mAlbs:[],mMembers:[],mflt:'all',
  theme:'light'
};
let curTab='collect', fsId=null, wiz={};

/* ════════════════════════════════
   STORAGE
════════════════════════════════ */
function loadDB(){const s=localStorage.getItem(DB_KEY);if(s)try{DB=JSON.parse(s);}catch(e){}}
function saveDB(){if(DB)try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}}
function loadST(){const s=localStorage.getItem(ST_KEY);if(s)try{ST=JSON.parse(s);}catch(e){}ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};}
function saveST(){try{localStorage.setItem(ST_KEY,JSON.stringify(ST));}catch(e){}}
function loadUI(){
  const s=localStorage.getItem(UI_KEY);
  if(s)try{Object.assign(UI,JSON.parse(s));}catch(e){}
  ['col','mgl'].forEach(k=>{UI[k]=UI[k]||{};});
  ['cAlbs','cMembers','mAlbs','mMembers'].forEach(k=>{if(!Array.isArray(UI[k]))UI[k]=[];});
  UI.theme=UI.theme||'light';
}
function saveUI(){try{localStorage.setItem(UI_KEY,JSON.stringify(UI));}catch(e){}}

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
const g  = id => ST.goals[id]||0;
const c  = id => ST.collected[id]||0;
const mo = id => ST.memos[id]||'';
const hid= id => !!ST.hidden[id];
const sp = id => {const cv=c(id),gv=g(id);return gv>0?Math.max(0,cv-gv):cv;};
const wt = id => g(id)>0?Math.max(0,g(id)-c(id)):0;
function sts(id){
  const gv=g(id),cv=c(id);
  if(!gv&&!cv)return'n';
  if(!gv&&cv>0)return'h';
  if(cv<gv)return'c';
  if(cv===gv)return'm';
  return'h';
}
function allCards(){
  if(!DB)return[];
  const r=[];
  for(const a of DB.albumTypes)
    for(const s of a.sets)
      for(const card of s.cards)
        r.push({...card,aId:a.id,aN:a.name,aS:a.shortName,aC:a.color,sId:s.id,sN:s.name});
  return r;
}
function findCard(id){
  if(!DB)return null;
  for(const a of DB.albumTypes)
    for(const s of a.sets)
      for(const card of s.cards)
        if(card.id===id)return{card,alb:a,set:s};
  return null;
}
function isLS(){return window.innerWidth>window.innerHeight;}

// does a card match the visible member filter?
function cardMatchesMems(card, mems){
  if(!mems.length)return true;
  if(card.cardType==='Individual'){
    return mems.includes(card.member)||mems.includes(card.name);
  }
  if(card.cardType==='Unit'&&card.unit){
    for(const m of mems)if(MU[m]&&MU[m].includes(card.unit))return true;
    return false;
  }
  // All / MMMM: always show (not member-specific)
  return true;
}

/* ════════════════════════════════
   STATUS / STRIP
════════════════════════════════ */
function stripHtml(id){
  const cv=c(id),gv=g(id),s_=sp(id),w_=wt(id),st=sts(id);
  if(st==='m')return`✓ 달성(${cv}/${gv})`;
  if(st==='h'&&gv>0)return`✨ 있어요 +${s_}`;
  if(st==='h'&&!gv)return`✨ ${cv}장`;
  if(st==='c')return`🔍 없어요 −${w_}`;
  return'';
}
function stripStyle(id){
  const st=sts(id),cv=c(id);
  if(st==='m')return'color:var(--ok);background:rgba(34,197,94,.1)';
  if(st==='h')return'color:var(--have);background:var(--have-g)';
  if(st==='c')return'color:var(--want);background:var(--want-g)';
  return'color:var(--tx3);background:transparent';
}

/* ════════════════════════════════
   CARD GRID COLUMNS
   ≤5 cards → exactly N equal columns
   >5 cards → auto-fill with CARD_MIN_W so they wrap at most MAX_PER_ROW wide
════════════════════════════════ */
function gridCols(n){
  if(n<=MAX_PER_ROW)return`repeat(${n},1fr)`;
  return`repeat(auto-fill,minmax(${CARD_MIN_W}px,1fr))`;
}

/* ════════════════════════════════
   CARD TILE HTML
════════════════════════════════ */
function cardTileHTML(card, showGoalRow){
  const cv=c(card.id),gv=g(card.id),s_=sp(card.id),w_=wt(card.id),st=sts(card.id);
  const hasMemo=mo(card.id).trim().length>0;
  let cls='pct';
  if(st==='c')cls+=' sc';
  else if(st==='m')cls+=' sm';
  else if(st==='h')cls+=' sh';
  else if(st==='n')cls+=' ng';
  let bdg='';
  if(s_>0&&gv>0)bdg=`<div class="pbdg h">+${s_}</div>`;
  else if(w_>0)bdg=`<div class="pbdg w">−${w_}</div>`;
  else if(st==='m')bdg=`<div class="pbdg m">✓</div>`;
  else if(cv>0&&!gv)bdg=`<div class="pbdg h">${cv}</div>`;
  return `<div class="${cls}" data-id="${card.id}">
    <div class="pci" onclick="openFull('${card.id}')">
      ${card.img
        ?`<img src="${card.img}" alt="${card.name}" loading="lazy">`
        :`<div class="pcph">${card.name}</div>`}
      ${bdg}${hasMemo?'<div class="mdot"></div>':''}
      <div class="pc-ctrl">
        <button class="pcbtn" onclick="subC('${card.id}',event)">−</button>
        <span class="pc-cnt">${cv}</span>
        <button class="pcbtn" onclick="addC('${card.id}',event)">+</button>
      </div>
    </div>
    <div class="pc-strip" style="${stripStyle(card.id)}">${stripHtml(card.id)}</div>
    ${showGoalRow?`<div class="pc-goal-row"><div class="gadj">
      <button onclick="goalAdj('${card.id}',-1)">−</button>
      <span class="gadj-num" data-gid="${card.id}">${gv}</span>
      <button onclick="goalAdj('${card.id}',+1)">+</button>
    </div></div>`:''}
  </div>`;
}

/* patch single tile */
function patchTile(id){
  const tile=document.querySelector(`.pct[data-id="${id}"]`);
  if(!tile)return;
  const cv=c(id),gv=g(id),s_=sp(id),w_=wt(id),st=sts(id);
  tile.classList.remove('sc','sm','sh','ng');
  if(st==='c')tile.classList.add('sc');
  else if(st==='m')tile.classList.add('sm');
  else if(st==='h')tile.classList.add('sh');
  else if(st==='n')tile.classList.add('ng');
  const cnt=tile.querySelector('.pc-cnt');if(cnt)cnt.textContent=cv;
  const strip=tile.querySelector('.pc-strip');
  if(strip){strip.innerHTML=stripHtml(id);strip.setAttribute('style',stripStyle(id));}
  const oldBdg=tile.querySelector('.pbdg');if(oldBdg)oldBdg.remove();
  let bdgHtml='';
  if(s_>0&&gv>0)bdgHtml=`<div class="pbdg h">+${s_}</div>`;
  else if(w_>0)bdgHtml=`<div class="pbdg w">−${w_}</div>`;
  else if(st==='m')bdgHtml=`<div class="pbdg m">✓</div>`;
  else if(cv>0&&!gv)bdgHtml=`<div class="pbdg h">${cv}</div>`;
  if(bdgHtml){const pci=tile.querySelector('.pci');if(pci)pci.insertAdjacentHTML('beforeend',bdgHtml);}
  const gn=tile.querySelector(`[data-gid="${id}"]`);if(gn)gn.textContent=gv;
}

/* ════════════════════════════════
   ACTIONS
════════════════════════════════ */
function addC(id,e){
  if(e)e.stopPropagation();
  ST.collected[id]=(ST.collected[id]||0)+1;saveST();patchTile(id);
  const g0=g(id),c0=c(id);
  if(g0>0&&c0===g0)toast('🎉 달성!');else if(g0>0&&c0>g0)toast(`✨ +${c0-g0}`);
}
function subC(id,e){
  if(e)e.stopPropagation();
  ST.collected[id]=Math.max(0,(ST.collected[id]||0)-1);saveST();patchTile(id);
}
function setGoalById(id,n){
  if(n<0)n=0;if(n===0)delete ST.goals[id];else ST.goals[id]=n;saveST();
}
function goalAdj(id,d){
  setGoalById(id,g(id)+d);patchTile(id);
  const gn=document.querySelector(`[data-gid="${id}"]`);if(gn)gn.textContent=g(id);
}
function toggleHide(){
  if(!fsId)return;
  const isH=hid(fsId);
  if(!confirm(isH?'다시 있어요 목록에 표시할까요?':'있어요 목록에서 숨길까요? (수집 수는 유지됩니다)'))return;
  if(isH)delete ST.hidden[fsId];else ST.hidden[fsId]=true;
  saveST();updFull();renderCur();toast(isH?'있어요에 표시됩니다':'있어요에서 숨겼어요');
}
function saveMemo(){
  if(!fsId)return;
  const v=document.getElementById('fs-memo').value;
  if(v)ST.memos[fsId]=v;else delete ST.memos[fsId];saveST();
}
function colSec(k){UI.col[k]=!UI.col[k];saveUI();renderCur();}
function collapseAll(){if(!DB)return;for(const a of DB.albumTypes)for(const s of a.sets)UI.col[s.id]=true;saveUI();renderCur();toast('모두 접음');}
function expandAll(){UI.col={};saveUI();renderCur();toast('모두 펼침');}
function mColSec(k){UI.mgl[k]=!UI.mgl[k];saveUI();renderGoals();}
function colAllGoals(){if(!DB)return;for(const a of DB.albumTypes)for(const s of a.sets)UI.mgl[s.id]=true;saveUI();renderGoals();}
function expAllGoals(){UI.mgl={};saveUI();renderGoals();}
function resetAllGoals(){if(!confirm('모든 목표를 0으로 초기화할까요?'))return;ST.goals={};saveST();renderGoals();toast('목표 초기화 완료');}

/* ════════════════════════════════
   FILTER ROW HTML
   (original inline style — chips directly in the page)
════════════════════════════════ */
function filterRowHTML(cAlbs, cMems, flt, fnAlb, fnMem, fnFlt, rightCtrl){
  const albumChips=DB.albumTypes.map(a=>`<button class="fp${cAlbs.includes(a.id)?' on-alb':''}" onclick="${fnAlb}('${a.id}')" style="${cAlbs.includes(a.id)?`background:${a.color};border-color:transparent;color:#fff`:`border-color:${a.color}55;color:${a.color}`}">${a.shortName}</button>`).join('');
  const memChips=MEMBERS.map(m=>`<button class="fp${cMems.includes(m)?' on-m':''}" onclick="${fnMem}('${m}')">${m}</button>`).join('');
  return `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:8px">
    <div style="display:flex;flex-direction:column;gap:5px;flex:1">
      <div class="frow" style="margin-bottom:0">
        <button class="fp${!cAlbs.length?' on-all':''}" onclick="${fnAlb}(null)">전체</button>
        ${albumChips}
      </div>
      <div class="frow" style="margin-bottom:0">
        ${memChips}
        <div class="fsep"></div>
        <div class="ftog">
          <span class="ftog-btn${flt==='all'?' on':''}" onclick="${fnFlt}('all')">모두</span>
          <span class="ftog-btn${flt==='h'?' on':''}" onclick="${fnFlt}('h')">있는것만</span>
          <span class="ftog-btn${flt==='n'?' on':''}" onclick="${fnFlt}('n')">없는것만</span>
        </div>
      </div>
    </div>
    ${rightCtrl||''}
  </div>`;
}

/* ════════════════════════════════
   NAVIGATION
════════════════════════════════ */
function renderNav(){
  document.getElementById('dtabs').innerHTML=TABS.map(t=>`<div class="dtab${curTab===t.id?' on':''}" data-v="${t.id}" onclick="goTab('${t.id}')">${t.label}</div>`).join('');
  document.getElementById('bnav').innerHTML=TABS.map(t=>`<div class="btab${curTab===t.id?' on':''}" data-v="${t.id}" onclick="goTab('${t.id}')"><div class="btab-ico">${t.ico}</div>${t.label}</div>`).join('');
}
function goTab(v){
  curTab=v;
  document.querySelectorAll('[data-v]').forEach(el=>el.classList.toggle('on',el.dataset.v===v));
  renderCur();
}
function renderCur(){
  if(!DB){document.getElementById('page-content').innerHTML='<div style="padding:24px;text-align:center;color:var(--tx2)">📦 DB 로딩 중...</div>';return;}
  if(curTab==='collect')renderCollect();
  else if(curTab==='trade')renderTrade();
  else if(curTab==='goals')renderGoals();
  else renderUsage();
}

/* ════════════════════════════════
   COLLECT TAB
════════════════════════════════ */
function renderCollect(){
  const el=document.getElementById('page-content');
  // section grid: auto-fill with min width that fits a reasonable number of sections
  const nMem=UI.cMembers.length||5;
  const secMinW=Math.max(nMem*CARD_MIN_W+20, 130);

  const colCtrl=`<div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0">
    <div class="coltog"><span class="coltog-btn" onclick="collapseAll()">접기</span><span class="coltog-btn" onclick="expandAll()">펼치기</span></div>
    <button class="shot-btn" onclick="exportCollectScreenshot()">📸</button>
  </div>`;

  const allC=allCards();
  const haveC=allC.filter(x=>c(x.id)>0).length;
  const metC=allC.filter(x=>g(x.id)>0&&c(x.id)>=g(x.id)).length;
  const goalC=allC.filter(x=>g(x.id)>0).length;

  const albums=UI.cAlbs.length?DB.albumTypes.filter(a=>UI.cAlbs.includes(a.id)):DB.albumTypes;
  let secs='';
  for(const alb of albums){
    for(const set of alb.sets){
      let cards=set.cards.filter(card=>cardMatchesMems(card,UI.cMembers));
      if(UI.flt==='h')cards=cards.filter(x=>c(x.id)>0);
      else if(UI.flt==='n')cards=cards.filter(x=>c(x.id)===0&&g(x.id)>0);
      if(!cards.length)continue;
      const isC=UI.col[set.id];
      const t2=set.cards.filter(x=>g(x.id)>0).length;
      const m2=set.cards.filter(x=>g(x.id)>0&&c(x.id)>=g(x.id)).length;
      const pct=t2?Math.round(m2/t2*100):0;
      secs+=`<div class="sec-block">
        <div class="sec-hdr" onclick="colSec('${set.id}')">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
          ${t2>0?`<div class="sec-pw"><span class="sec-pct">${m2}/${t2}</span><div class="sec-pb"><div class="sec-pbf" style="width:${pct}%;background:${alb.color}"></div></div></div>`:''}
          <span class="chev${isC?'':' open'}">▼</span>
        </div>
        ${isC?'':`<div class="sec-body"><div class="pcg" style="grid-template-columns:${gridCols(cards.length)}">
          ${cards.map(card=>cardTileHTML(card,false)).join('')}
        </div></div>`}
      </div>`;
    }
  }

  el.innerHTML=
    `<div class="stats-bar">
      <div class="stat-chip">전체 <span>${allC.length}</span></div>
      <div class="stat-chip">수집 <span>${haveC}</span></div>
      <div class="stat-chip">목표달성 <span>${metC}/${goalC}</span></div>
    </div>`+
    filterRowHTML(UI.cAlbs,UI.cMembers,UI.flt,'setCAl','setCM','setFlt',colCtrl)+
    `<div class="sets-wrap" style="grid-template-columns:repeat(auto-fill,minmax(${secMinW}px,1fr))">${secs}</div>`;
}
function setCAl(id){if(id===null)UI.cAlbs=[];else{const i=UI.cAlbs.indexOf(id);if(i>=0)UI.cAlbs.splice(i,1);else UI.cAlbs.push(id);}saveUI();renderCollect();}
function setCM(m){if(!m)return;const i=UI.cMembers.indexOf(m);if(i>=0)UI.cMembers.splice(i,1);else UI.cMembers.push(m);saveUI();renderCollect();}
function setFlt(f){UI.flt=f;saveUI();renderCollect();}

/* ════════════════════════════════
   TRADE TAB
════════════════════════════════ */
function renderTrade(){
  const el=document.getElementById('page-content');
  const all=allCards();
  const wCards=all.filter(x=>wt(x.id)>0);
  const hCards=all.filter(x=>sp(x.id)>0&&!hid(x.id));

  if(!wCards.length&&!hCards.length){
    el.innerHTML=`<div style="padding:20px;text-align:center;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx2);font-size:12px;line-height:1.8">
      수집 정보를 입력하면 교환 현황이 자동으로 표시돼요.<br>목표보다 적으면 🔍 구해요, 더 많으면 ✨ 있어요에 나타나요.
    </div>`;
    return;
  }

  const shotBtn=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button class="shot-btn" onclick="exportScreenshot()">📸 교환 스크린샷 저장</button>
  </div>`;

  let cols='<div class="trade-wrap">';
  if(wCards.length){
    cols+=`<div class="trade-col">
      <div class="trade-ttl-bar" style="border-bottom:1px solid rgba(244,63,94,.3)">
        <span style="background:rgba(244,63,94,.15);color:var(--want);border:1px solid rgba(244,63,94,.3);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">🔍 구해요 ${wCards.reduce((a,x)=>a+wt(x.id),0)}개</span>
      </div>
      <div class="trade-body">${tradeBodyHTML(wCards,'want')}</div>
    </div>`;
  }
  if(hCards.length){
    cols+=`<div class="trade-col">
      <div class="trade-ttl-bar" style="border-bottom:1px solid rgba(59,130,246,.3)">
        <span style="background:rgba(59,130,246,.15);color:var(--have);border:1px solid rgba(59,130,246,.3);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">✨ 있어요 ${hCards.reduce((a,x)=>a+sp(x.id),0)}개</span>
      </div>
      <div class="trade-body">${tradeBodyHTML(hCards,'have')}</div>
    </div>`;
  }
  cols+='</div>';
  el.innerHTML=shotBtn+cols;
}

function tradeBodyHTML(cards, mode){
  if(!DB||!cards.length)return'';
  let h='<div class="sets-wrap">';
  for(const alb of DB.albumTypes){
    const ac=cards.filter(x=>x.aId===alb.id);if(!ac.length)continue;
    const sids=[...new Set(ac.map(x=>x.sId))];
    for(const sid of sids){
      const sc=ac.filter(x=>x.sId===sid);
      const set=alb.sets.find(s=>s.id===sid);if(!set)continue;
      const bdCol=mode==='want'?'rgba(244,63,94,.45)':'rgba(59,130,246,.45)';
      const txCol=mode==='want'?'var(--want)':'var(--have)';
      const bg=mode==='want'?'var(--want-g)':'var(--have-g)';
      h+=`<div class="sec-block">
        <div class="sec-hdr" style="cursor:default;padding:6px 10px">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
        </div>
        <div class="sec-body">
          <div class="trade-grid">
            ${sc.map(card=>{
              const cnt=mode==='want'?wt(card.id):sp(card.id);
              return `<div class="pct" style="border-color:${bdCol}" data-id="${card.id}">
                <div class="pci" onclick="openFull('${card.id}')">
                  ${card.img?`<img src="${card.img}" alt="${card.name}" loading="lazy">`:`<div class="pcph">${card.name}</div>`}
                </div>
                <div class="pc-strip" style="color:${txCol};background:${bg}">${mode==='want'?'−':'+'} ${cnt}장</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>`;
    }
  }
  h+='</div>';
  return h;
}

/* ════════════════════════════════
   GOALS TAB
════════════════════════════════ */
function renderGoals(){
  const el=document.getElementById('page-content');
  const mAlbs=UI.mAlbs, mMems=UI.mMembers, mflt=UI.mflt;
  const nMem=mMems.length||5;
  const secMinW=Math.max(nMem*CARD_MIN_W+20, 130);

  const colCtrl=`<div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0">
    <div class="coltog"><span class="coltog-btn" onclick="colAllGoals()">접기</span><span class="coltog-btn" onclick="expAllGoals()">펼치기</span></div>
    <button class="shot-btn" style="color:var(--want);border-color:rgba(244,63,94,.3)" onclick="resetAllGoals()">🗑 초기화</button>
  </div>`;

  const albums=mAlbs.length?DB.albumTypes.filter(a=>mAlbs.includes(a.id)):DB.albumTypes;
  let secs='';
  for(const alb of albums){
    for(const set of alb.sets){
      let cards=set.cards.filter(card=>cardMatchesMems(card,mMems));
      if(mflt==='h')cards=cards.filter(x=>g(x.id)>0);
      else if(mflt==='n')cards=cards.filter(x=>!g(x.id));
      if(!cards.length)continue;
      const isC=UI.mgl[set.id];
      const t2=cards.length;
      const m2=cards.filter(x=>g(x.id)>0&&c(x.id)>=g(x.id)).length;
      const pct=t2?Math.round(m2/t2*100):0;
      secs+=`<div class="sec-block">
        <div class="sec-hdr" onclick="mColSec('${set.id}')">
          <span class="sec-atag" style="background:${alb.color}">${alb.shortName}</span>
          <span class="sec-name">${set.name}</span>
          <div class="sec-pw"><span class="sec-pct">${m2}/${t2}</span><div class="sec-pb"><div class="sec-pbf" style="width:${pct}%;background:${alb.color}"></div></div></div>
          <span class="chev${isC?'':' open'}">▼</span>
        </div>
        ${isC?'':`<div class="sec-body"><div class="pcg" style="grid-template-columns:${gridCols(cards.length)}">
          ${cards.map(card=>cardTileHTML(card,true)).join('')}
        </div></div>`}
      </div>`;
    }
  }

  el.innerHTML=
    `<div style="margin-bottom:8px"><button class="btn btn-p btn-sm" onclick="showWizard()">🎯 마법사로 일괄 설정</button></div>`+
    filterRowHTML(mAlbs,mMems,mflt,'setMAl','setMM','setMFlt',colCtrl)+
    `<div class="sets-wrap" style="grid-template-columns:repeat(auto-fill,minmax(${secMinW}px,1fr))">${secs}</div>`;
}
function setMAl(id){if(id===null)UI.mAlbs=[];else{const i=UI.mAlbs.indexOf(id);if(i>=0)UI.mAlbs.splice(i,1);else UI.mAlbs.push(id);}saveUI();renderGoals();}
function setMM(m){if(!m)return;const i=UI.mMembers.indexOf(m);if(i>=0)UI.mMembers.splice(i,1);else UI.mMembers.push(m);saveUI();renderGoals();}
function setMFlt(f){UI.mflt=f;saveUI();renderGoals();}

function openFull(id){
  const r=findCard(id);if(!r)return;
  fsId=id;const{card,alb,set}=r;
  document.getElementById('fs-img').innerHTML=card.img
    ?`<img class="fsimg" src="${card.img}" alt="${card.name}">`
    :`<div class="fsph-big">📷</div>`;
  document.getElementById('fs-name').textContent=card.name;
  document.getElementById('fs-meta').textContent=`${alb.name} · ${set.name}`;
  updFull();
  const m=document.getElementById('fs-memo');if(m)m.value=mo(id);
  document.getElementById('fsov').classList.add('open');
}
function updFull(){
  if(!fsId)return;
  const cv=c(fsId),gv=g(fsId),s_=sp(fsId),w_=wt(fsId);
  document.getElementById('fs-coll').textContent=cv;
  document.getElementById('fs-goal').textContent=gv;
  const ch=document.getElementById('fs-chips');
  if(ch){
    let h='';
    if(s_>0)h+=`<span style="background:var(--have-g);border:1px solid var(--have-bd);color:var(--have);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">✨ 있어요 ${s_}</span>`;
    if(w_>0)h+=`<span style="background:var(--want-g);border:1px solid var(--want-bd);color:var(--want);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif">🔍 구해요 ${w_}</span>`;
    ch.innerHTML=h;
  }
  const hb=document.getElementById('fs-hide-btn');
  if(hb){
    if(s_>0){
      const isH=hid(fsId);
      hb.style.cssText=`display:block;background:none;border-color:${isH?'var(--ok)':'var(--want)'};color:${isH?'var(--ok)':'var(--want)'};width:100%;padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:7px`;
      hb.textContent=isH?'👁 있어요에 다시 표시하기':'🚫 있어요에서 숨기기';
    }else{hb.style.display='none';}
  }
}
function closeFull(){document.getElementById('fsov').classList.remove('open');fsId=null;}
function fsAdj(d){
  if(!fsId)return;
  ST.collected[fsId]=Math.max(0,(ST.collected[fsId]||0)+d);
  saveST();updFull();patchTile(fsId);
  if(d>0){const gv=g(fsId),cv=c(fsId);if(gv>0&&cv===gv)toast('🎉 달성!');}
}
function fsGoal(d){
  if(!fsId)return;
  setGoalById(fsId,g(fsId)+d);updFull();patchTile(fsId);
}

        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 10px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)">

      <div style="text-align:center">
        <p style="font-size:11px;color:var(--tx2);margin-bottom:10px">수량</p>

          <button onclick="if(wiz.count>0)wiz.count--;renderWizStep()" style="padding:10px 20px;font-size:20px;font-weight:800;border-right:1px solid var(--bd);color:var(--tx)">−</button>

function wizToggleAlb(id){const i=wiz.albums.indexOf(id);if(i>=0)wiz.albums.splice(i,1);else wiz.albums.push(id);}
function wizToggleMember(m){const i=wiz.members.indexOf(m);if(i>=0)wiz.members.splice(i,1);else wiz.members.push(m);}
function wizNext(){if(!wiz.albums.length){toast('앨범을 선택해주세요');return;}wiz.step=2;renderWizStep();}
function wizPrev(){wiz.step=1;renderWizStep();}
function wizApply(){
  if(!wiz.members.length&&!wiz.inclAll&&!wiz.inclMmmm){toast('멤버 또는 카드 종류를 선택해주세요');return;}
  const albs=[...wiz.albums,...(wiz.inclUnpo?['unpo']:[])];
  const relevantUnits=new Set(wiz.members.flatMap(m=>MU[m]||[]));
  let count=0;
  for(const alb of DB.albumTypes){
    if(!albs.includes(alb.id))continue;
    for(const set of alb.sets)for(const card of set.cards){
      const ct=card.cardType;
      if(ct==='Individual'&&(wiz.members.includes(card.member)||wiz.members.includes(card.name))){ST.goals[card.id]=wiz.count;count++;}
      else if(ct==='Unit'&&relevantUnits.has(card.unit)){ST.goals[card.id]=wiz.count;count++;}
      else if(ct==='All'&&wiz.inclAll){ST.goals[card.id]=wiz.count;count++;}
      else if(ct==='MMMM'&&wiz.inclMmmm){ST.goals[card.id]=wiz.count;count++;}
    }
  }
  saveST();closeSheet('wiz-ov');renderCur();
  setTimeout(()=>{
    const unitList=[...relevantUnits].join(', ');
    const lines=[
      `✅ 목표 설정 완료!`,``,
      `적용된 카드: ${count}장`,
      `멤버: ${wiz.members.length?wiz.members.join(', '):'없음'}`,
      unitList?`유닛 (자동포함): ${unitList}`:'',
      wiz.inclAll?'단체 카드 포함':'',
      wiz.inclMmmm?'MMMM 카드 포함':'',
      ``,`목표 탭에서 개별 조정 가능해요.`,``,`목표 탭으로 이동할까요?`
    ].filter(l=>l!==undefined&&(l.length===0||l));
    if(confirm(lines.join('\n')))goTab('goals');
  },150);
}

async function loadH2C(){
  if(window.html2canvas)return;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

  const bg=dark?'#08090f':'#f0f2f9',tx2=dark?'#7a8fb0':'#5a6a90',bd=dark?'#1f2535':'#d4daf0';
  const now=new Date().toLocaleDateString('ko-KR');

      h+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:${alb.color};margin-bottom:3px">${alb.name}</div>`;

  };

    </div>`;
  }else{

    toast('📸 저장 완료!');

  let secH='';
  for(const alb of albums)for(const set of alb.sets){
    let cards=set.cards.filter(card=>cardMatchesMems(card,UI.cMembers));
    if(UI.flt==='h')cards=cards.filter(x=>c(x.id)>0);
    else if(UI.flt==='n')cards=cards.filter(x=>c(x.id)===0&&g(x.id)>0);
    if(!cards.length)continue;
    secH+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;margin-bottom:3px"><span style="background:${alb.color};color:#fff;padding:1px 6px;border-radius:5px;font-size:9px">${alb.shortName}</span> ${set.name}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:3px">
        ${cards.map(card=>{const cv=c(card.id),gv=g(card.id),st=sts(card.id);
          const bdr=st==='c'?'rgba(244,63,94,.5)':st==='m'?'rgba(34,197,94,.6)':st==='h'?'rgba(59,130,246,.6)':'rgba(0,0,0,.1)';
          return`<div style="border-radius:5px;overflow:hidden;border:1px solid ${bdr}">
            <div style="aspect-ratio:5/7;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:7px;color:${tx2};background:${alb.color}22">${card.img?`<img src="${card.img}" style="width:100%;height:100%;object-fit:cover">`:`${card.name}`}</div>
            <div style="padding:2px 3px;background:rgba(0,0,0,.4);display:flex;justify-content:space-between;font-size:7px;font-weight:700">
              <span style="color:${st==='c'?'#f43f5e':st==='m'?'#22c55e':st==='h'?'#3b82f6':'#aaa'}">${cv}</span><span style="color:${tx2}">${gv}</span>
            </div>
          </div>`;}).join('')}
      </div>
    </div>`;
  }
  const hdr=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid ${bd}"><div style="font-weight:800;font-size:14px;background:linear-gradient(135deg,#4f8aff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Caligo Pt.2 수집 현황</div><div style="font-size:10px;color:${tx2}">${now}</div></div>`;
  area.innerHTML=hdr+`<div style="display:grid;gap:6px">${secH}</div>`;
  try{
    const canvas=await html2canvas(area,{backgroundColor:bg,scale:2,useCORS:true,logging:false,windowWidth:w});
    const link=document.createElement('a');link.download=`수집_${now.replace(/\./g,'')}.png`;link.href=canvas.toDataURL('image/png');link.click();
    toast('📸 저장 완료!');
  }catch(e){toast('실패: '+e.message);}
  area.innerHTML='';
}

/* ════════════════════════════════
   SETTINGS / THEME
════════════════════════════════ */
function showSettings(){document.getElementById('set-ov').classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function importState(inp){
  if(!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    try{ST=JSON.parse(e.target.result);ST.goals=ST.goals||{};ST.collected=ST.collected||{};ST.memos=ST.memos||{};ST.hidden=ST.hidden||{};saveST();closeSheet('set-ov');renderCur();toast('복원 완료 ✓');}
    catch(e){toast('파일 오류');}
  };
  r.readAsText(inp.files[0]);
}
function exportState(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(ST,null,2)],{type:'application/json'}));a.download=`포카백업_${new Date().toISOString().split('T')[0]}.json`;a.click();toast('백업 파일 저장됨 ✓');}
function resetState(){if(!confirm('모든 수집·목표·메모를 초기화할까요?'))return;ST={goals:{},collected:{},memos:{},hidden:{}};saveST();closeSheet('set-ov');renderCur();toast('초기화 완료');}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('theme-btn');if(b)b.textContent=t==='dark'?'🌙':'☀️';}
function toggleTheme(){UI.theme=UI.theme==='dark'?'light':'dark';applyTheme(UI.theme);saveUI();}
function toast(msg){const w=document.getElementById('tw');const el=document.createElement('div');el.className='toast';el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),2100);}

/* ════════════════════════════════
   INIT
════════════════════════════════ */
function init(){
  loadST();loadUI();
  applyTheme(UI.theme||'light');
  renderNav();
  document.getElementById('page-content').innerHTML='<div style="padding:24px;text-align:center;color:var(--tx2);font-size:13px">📦 DB 로딩 중...</div>';
  fetch('./poca_db.json')
    .then(r=>r.json())
    .then(d=>{
      DB=d;saveDB();renderCur();
      const hasGoal=Object.values(ST.goals).some(v=>v>0);
      if(!hasGoal)setTimeout(showWizard,600);
    })
    .catch(()=>{
      loadDB();
      if(DB)renderCur();
      else document.getElementById('page-content').innerHTML='<div style="padding:24px;text-align:center;color:var(--want)">⚠️ poca_db.json을 같은 폴더에 두고 웹서버로 열어주세요.</div>';
    });
  document.getElementById('main').addEventListener('scroll',function(){
    const btn=document.getElementById('scroll-top-btn');
    if(btn)btn.classList.toggle('vis',this.scrollTop>200);
  },{passive:true});
}
init();
</script>
