<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAVE 포카 어드민</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="./watermark.js" defer></script>
<style>
:root{--bg:#0b0f1e;--sur:#131726;--sur2:#1a2035;--sur3:#202840;--bd:#252e4a;--bd2:#303d60;--tx:#dce6f8;--tx2:#7e96c4;--tx3:#4a5e8a;--ac:#4f7eff;--ac-g:rgba(79,126,255,.15);--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--pk:#a855f7;--r:10px;--r-sm:6px;--sh:0 4px 24px rgba(0,0,0,.6)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5}
button{cursor:pointer;font-family:inherit;font-size:12px;border:none;outline:none}
input,select,textarea{font-family:inherit;font-size:12px;color:var(--tx);background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r-sm);padding:6px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:44px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

.app{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--sur);border-bottom:1px solid var(--bd);padding:0 14px;height:48px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:50}
.hdr-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;background:linear-gradient(135deg,var(--warn),var(--err));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
.hdr-acts{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 48px)}
.sidebar{width:220px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bd);overflow-y:auto;padding:10px}
.content{flex:1;overflow-y:auto;padding:14px}

.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--r-sm);font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;border:none}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{filter:brightness(1.1)}
.btn-s{background:var(--sur2);color:var(--tx);border:1px solid var(--bd)}.btn-s:hover{border-color:var(--ac)}
.btn-d{background:transparent;color:var(--err);border:1px solid rgba(239,68,68,.3)}.btn-d:hover{background:rgba(239,68,68,.08)}
.btn-ok{background:var(--ok);color:#fff}
.btn-sm{padding:4px 8px;font-size:11px}
.iBtn{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r-sm);font-size:12px;cursor:pointer;transition:all .12s}
.iBtn:hover{border-color:var(--ac)}

/* SIDEBAR */
.sb-sec{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:.8px;padding:8px 6px 4px;text-transform:uppercase}
.sb-alb{padding:6px 10px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:7px;font-size:12px;transition:all .12s}
.sb-alb:hover{background:var(--sur2)}.sb-alb.on{background:var(--ac-g);color:var(--ac)}
.sb-set{padding:4px 8px 4px 25px;border-radius:var(--r-sm);cursor:pointer;font-size:11px;color:var(--tx2);margin-bottom:1px;transition:all .12s}
.sb-set:hover{background:var(--sur2);color:var(--tx)}.sb-set.on{background:var(--sur2);color:var(--ac)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* CARDS */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.card-ttl{font-weight:700;font-size:14px;display:flex;align-items:center;gap:7px}
.fg{margin-bottom:10px}
.fl{display:block;font-size:10px;font-weight:700;color:var(--tx2);margin-bottom:4px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* CARD ITEMS */
.card-item{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r-sm);padding:10px;margin-bottom:8px;transition:border-color .12s}
.card-item:hover{border-color:var(--bd2)}
.card-item-top{display:flex;align-items:flex-start;gap:9px}
.card-item-body{flex:1;min-width:0}
.card-item-acts{display:flex;gap:3px;flex-shrink:0;align-items:flex-start}
.crd-img{width:40px;height:56px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--sur3);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--tx3);text-align:center;line-height:1.3;transition:border-color .12s}
.crd-img:hover{border-color:var(--ac)}
.crd-img img{width:100%;height:100%;object-fit:cover}

/* TYPE BADGE */
.type-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.3px}
.tb-ind{background:rgba(79,126,255,.2);color:#7ba4ff;border:1px solid rgba(79,126,255,.3)}
.tb-all{background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.tb-unit{background:rgba(168,85,247,.2);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.tb-mmmm{background:rgba(245,158,11,.2);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}

/* CARD META */
.card-meta-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}

/* TYPE SELECTOR */
.type-sel-row{display:flex;gap:6px;flex-wrap:wrap}
.type-sel-btn{padding:5px 12px;border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--sur3);color:var(--tx2);transition:all .12s}
.type-sel-btn:hover{border-color:var(--ac);color:var(--tx)}
.type-sel-btn.on-ind{background:rgba(79,126,255,.2);color:#7ba4ff;border-color:rgba(79,126,255,.5)}
.type-sel-btn.on-all{background:rgba(34,197,94,.2);color:#4ade80;border-color:rgba(34,197,94,.5)}
.type-sel-btn.on-unit{background:rgba(168,85,247,.2);color:#c084fc;border-color:rgba(168,85,247,.5)}
.type-sel-btn.on-mmmm{background:rgba(245,158,11,.2);color:#fbbf24;border-color:rgba(245,158,11,.5)}

/* MEMBER CHIPS */
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.chip{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;user-select:none;text-align:center;line-height:1.3}
.chip-inactive{background:var(--sur3);color:var(--tx3);border-color:var(--bd)}
.chip-inactive:hover{border-color:var(--bd2);color:var(--tx2)}
.chip-yejun-on{background:#f59e0b;color:#000;border-color:#f59e0b}
.chip-noah-on{background:#06b6d4;color:#000;border-color:#06b6d4}
.chip-bamby-on{background:#ec4899;color:#fff;border-color:#ec4899}
.chip-eunho-on{background:#22c55e;color:#000;border-color:#22c55e}
.chip-hamin-on{background:#a855f7;color:#fff;border-color:#a855f7}

/* UNIT GRID */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px;margin-top:6px}
.unit-opt{padding:6px 8px;border-radius:var(--r-sm);font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--sur3);color:var(--tx3);transition:all .12s;text-align:center}
.unit-opt:hover{border-color:var(--pk);color:var(--tx)}
.unit-opt.on{background:rgba(168,85,247,.2);color:#c084fc;border-color:rgba(168,85,247,.5)}
.unit-sub{font-size:9px;color:inherit;opacity:.7;display:block;margin-top:2px}

/* MMMM GRID */
.mmmm-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:6px}
.mmmm-opt{padding:6px 4px;border-radius:var(--r-sm);font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--sur3);color:var(--tx3);transition:all .12s;text-align:center}
.mmmm-opt:hover{border-color:var(--warn);color:var(--tx)}
.mmmm-opt.on{background:rgba(245,158,11,.2);color:#fbbf24;border-color:rgba(245,158,11,.5)}
.mmmm-sub{font-size:9px;display:block;margin-top:2px;opacity:.7}

/* MEMO */
.memo-textarea{font-size:11px;color:var(--tx2);background:var(--bg);border:1px dashed var(--bd);border-radius:var(--r-sm);padding:6px 9px;min-height:40px;resize:vertical;width:100%}
.memo-textarea:focus{border-color:var(--ac);color:var(--tx)}
.memo-textarea::placeholder{color:var(--tx3)}

/* COLOR PICKER */
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.col-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.col-opt.on{border-color:#fff;transform:scale(1.15)}

/* SET OVERVIEW */
.set-ov{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r-sm);padding:9px 11px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sec-ttl{font-size:11px;font-weight:700;color:var(--tx2);margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.modal{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--sh)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.modal-ttl{font-weight:700;font-size:13px}
.modal-body{overflow-y:auto;padding:14px;flex:1}
.modal-foot{display:flex;justify-content:flex-end;gap:6px;padding:10px 14px;border-top:1px solid var(--bd);flex-shrink:0}

.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none}
.toast{background:var(--sur3);border:1px solid var(--bd2);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;white-space:nowrap;animation:tIn .2s ease,tOut .3s ease 1.7s forwards;margin-bottom:5px}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes tOut{to{opacity:0}}
.empty{text-align:center;padding:30px;color:var(--tx2)}

/* LOCK SCREEN */
.lock-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
.lock-box{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:32px 28px;width:100%;max-width:320px;text-align:center;box-shadow:var(--sh)}
.lock-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;background:linear-gradient(135deg,var(--warn),var(--err));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.lock-sub{font-size:11px;color:var(--tx3);margin-bottom:24px}
.lock-digits{display:flex;justify-content:center;gap:10px;margin-bottom:18px}
.lock-digit{width:48px;height:56px;background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--tx);transition:border-color .15s}
.lock-digit.filled{border-color:var(--ac);color:var(--ac)}
.lock-digit.active{border-color:var(--warn);box-shadow:0 0 0 2px rgba(245,158,11,.2)}
.lock-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.lock-key{height:48px;background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r-sm);font-size:18px;font-weight:600;color:var(--tx);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}
.lock-key:hover{background:var(--sur3);border-color:var(--ac);color:var(--ac)}
.lock-key:active{transform:scale(.95)}
.lock-key.del{font-size:14px;color:var(--tx3)}
.lock-key.del:hover{color:var(--err);border-color:var(--err)}
.lock-err{font-size:11px;color:var(--err);min-height:16px;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* GITHUB SETTINGS */
.gh-status{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.gh-ok{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.gh-no{background:rgba(100,100,120,.15);color:var(--tx3);border:1px solid var(--bd)}
.gh-err{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .main{flex-direction:column;height:auto;overflow:visible}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--bd);overflow:visible}
  .content{padding:10px}
  .mmmm-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<!-- LOCK SCREEN -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">🔐 POCA ADMIN</div>
    <div class="lock-sub">관리자 비밀번호를 입력하세요</div>
    <div class="lock-digits" id="lock-digits">
      <div class="lock-digit active" id="ld-0"></div>
      <div class="lock-digit" id="ld-1"></div>
      <div class="lock-digit" id="ld-2"></div>
      <div class="lock-digit" id="ld-3"></div>
    </div>
    <div class="lock-keypad">
      <div class="lock-key" onclick="lockKey('1')">1</div>
      <div class="lock-key" onclick="lockKey('2')">2</div>
      <div class="lock-key" onclick="lockKey('3')">3</div>
      <div class="lock-key" onclick="lockKey('4')">4</div>
      <div class="lock-key" onclick="lockKey('5')">5</div>
      <div class="lock-key" onclick="lockKey('6')">6</div>
      <div class="lock-key" onclick="lockKey('7')">7</div>
      <div class="lock-key" onclick="lockKey('8')">8</div>
      <div class="lock-key" onclick="lockKey('9')">9</div>
      <div class="lock-key del" onclick="lockKey('clear')">✕</div>
      <div class="lock-key" onclick="lockKey('0')">0</div>
      <div class="lock-key del" onclick="lockKey('del')">⌫</div>
    </div>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<div class="app" id="app-wrap" style="display:none">
  <header class="hdr">
    <div class="hdr-logo">⚙️ POCA ADMIN</div>
    <div class="hdr-acts">
      <span style="font-size:10px;color:var(--tx3)" id="db-info"></span>
      <button class="btn btn-ok btn-sm" id="gh-save-btn" onclick="saveToGitHub()">☁️ GitHub 저장</button>
      <span class="gh-status gh-no" id="gh-status">GitHub 미설정</span>
      <button class="btn btn-ok btn-sm" onclick="saveExport()">💾 로컬 저장</button>
      <button class="btn btn-s btn-sm" onclick="document.getElementById('imp-inp').click()">📥 DB 가져오기</button>
      <button class="btn btn-s btn-sm" onclick="openGhSettings()">⚙️ GitHub</button>
      <button class="btn btn-s btn-sm" onclick="window.open('index.html')">🔗 메인</button>
      <input type="file" id="imp-inp" accept=".json" style="display:none" onchange="handleImport(this)">
    </div>
  </header>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="empty" style="padding-top:60px"><div style="font-size:32px;margin-bottom:10px">⚙️</div>왼쪽에서 앨범을 선택하세요</div>
    </div>
  </div>
</div><!-- /app-wrap -->

<div class="toast-wrap" id="toast-wrap"></div>

<!-- Image modal -->
<div class="ov" id="img-modal" onclick="if(event.target===this)closeModal('img-modal')">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-ttl" id="img-modal-ttl">이미지 설정</span>
      <button onclick="closeModal('img-modal')" style="background:none;border:none;font-size:16px;color:var(--tx2);cursor:pointer">✕</button>
    </div>
    <div class="modal-body">
      <div id="img-preview" style="width:100px;height:140px;border-radius:8px;overflow:hidden;margin:0 auto 12px;background:var(--sur2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:11px"></div>
      <label style="cursor:pointer">
        <input type="file" accept="image/*" id="img-file" onchange="previewImg(this)" style="display:none">
        <div class="btn btn-p" style="width:100%;justify-content:center">📷 이미지 선택</div>
      </label>
      <div style="font-size:10px;color:var(--tx3);margin-top:8px">이미지는 base64로 DB에 저장돼요.</div>
      <div style="margin-top:10px"><button class="btn btn-d btn-sm" onclick="clearImg()">🗑 이미지 제거</button></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-s btn-sm" onclick="closeModal('img-modal')">취소</button>
      <button class="btn btn-p btn-sm" id="img-apply-btn" onclick="applyImg()">적용</button>
    </div>
  </div>
</div>

<!-- GitHub Settings Modal -->
<div class="ov" id="gh-modal" onclick="if(event.target===this)closeModal('gh-modal')">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr">
      <span class="modal-ttl">⚙️ GitHub 연동 설정</span>
      <button onclick="closeModal('gh-modal')" style="background:none;border:none;font-size:16px;color:var(--tx2);cursor:pointer">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">GitHub Personal Access Token (PAT)</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="ghDirty()">
        <div style="font-size:10px;color:var(--tx3);margin-top:4px">repo 권한만 있으면 됩니다. 브라우저에만 저장됩니다.</div>
      </div>
      <div class="fg">
        <label class="fl">GitHub 사용자명</label>
        <input type="text" id="gh-owner" placeholder="your-username" oninput="ghDirty()">
      </div>
      <div class="fg">
        <label class="fl">Repository 이름</label>
        <input type="text" id="gh-repo" placeholder="poca-collection" oninput="ghDirty()">
      </div>
      <div class="fg">
        <label class="fl">Branch</label>
        <input type="text" id="gh-branch" placeholder="main" oninput="ghDirty()">
      </div>
      <div class="fg">
        <label class="fl">DB 파일 경로 (repo 안 경로)</label>
        <input type="text" id="gh-path" placeholder="poca_db.json" oninput="ghDirty()">
      </div>
      <div id="gh-test-result" style="font-size:11px;min-height:16px;margin-top:4px"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-s btn-sm" onclick="testGhConnection()">🔍 연결 테스트</button>
      <button class="btn btn-s btn-sm" onclick="closeModal('gh-modal')">취소</button>
      <button class="btn btn-p btn-sm" onclick="saveGhSettings()">저장</button>
    </div>
  </div>
</div>

<!-- Card Detail Modal -->
<div class="ov" id="card-modal" onclick="if(event.target===this)closeModal('card-modal')">
  <div class="modal" style="max-width:500px">
    <div class="modal-hdr">
      <span class="modal-ttl" id="card-modal-ttl">카드 상세 편집</span>
      <button onclick="closeModal('card-modal')" style="background:none;border:none;font-size:16px;color:var(--tx2);cursor:pointer">✕</button>
    </div>
    <div class="modal-body" id="card-modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-s btn-sm" onclick="closeModal('card-modal')">닫기</button>
    </div>
  </div>
</div>

<script>
// ── LOCK SCREEN ───────────────────────────────────────
const ADMIN_PW = '0312';
const SESSION_KEY = 'poca_admin_auth';
let lockInput = '';

function lockKey(k){
  const err = document.getElementById('lock-err');
  err.textContent = '';
  if(k === 'clear'){ lockInput = ''; }
  else if(k === 'del'){ lockInput = lockInput.slice(0,-1); }
  else if(lockInput.length < 4){ lockInput += k; }

  // update digits
  for(let i=0;i<4;i++){
    const d = document.getElementById('ld-'+i);
    d.textContent = lockInput[i] ? '●' : '';
    d.className = 'lock-digit' +
      (lockInput[i] ? ' filled' : '') +
      (lockInput.length === i ? ' active' : '');
  }

  if(lockInput.length === 4){
    if(lockInput === ADMIN_PW){
      sessionStorage.setItem(SESSION_KEY,'1');
      document.getElementById('lock-screen').style.display='none';
      document.getElementById('app-wrap').style.display='flex';
      document.getElementById('app-wrap').style.flexDirection='column';
      init();
    } else {
      err.textContent = '비밀번호가 틀렸습니다 ✕';
      lockInput = '';
      for(let i=0;i<4;i++){
        const d = document.getElementById('ld-'+i);
        d.textContent=''; d.className='lock-digit'+(i===0?' active':'');
      }
      // shake effect
      const box = document.querySelector('.lock-box');
      box.style.animation='none'; box.offsetHeight;
      box.style.animation='shake .3s ease';
    }
  }
}

async function testGhConnection(){
  const cfg = {
    token:  document.getElementById('gh-token').value.trim(),
    owner:  document.getElementById('gh-owner').value.trim(),
    repo:   document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim()||'main',
    path:   document.getElementById('gh-path').value.trim()||'poca_db.json',
  };
  const el = document.getElementById('gh-test-result');
  if(!cfg.token||!cfg.owner||!cfg.repo){ el.style.color='var(--err)'; el.textContent='필수 항목을 입력하세요'; return; }
  el.style.color='var(--tx2)'; el.textContent='⏳ 연결 중...';
  try{
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`;
    const r = await fetch(url,{headers:{Authorization:`token ${cfg.token}`,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===200){ el.style.color='var(--ok)'; el.textContent='✅ 연결 성공! 파일을 찾았습니다.'; }
    else if(r.status===404){ el.style.color='var(--warn)'; el.textContent='⚠️ 파일 없음 (첫 저장 시 자동 생성됩니다)'; }
    else if(r.status===401){ el.style.color='var(--err)'; el.textContent='❌ 인증 실패 — Token을 확인하세요'; }
    else{ el.style.color='var(--err)'; el.textContent=`❌ 오류 ${r.status}`; }
  }catch(e){ el.style.color='var(--err)'; el.textContent='❌ 네트워크 오류: '+e.message; }
}

function updateGhStatus(){
  const cfg = loadGhCfg();
  const el = document.getElementById('gh-status');
  if(!el) return;
  if(cfg.token && cfg.owner && cfg.repo){
    el.className='gh-status gh-ok'; el.textContent=`☁️ ${cfg.owner}/${cfg.repo}`;
  } else {
    el.className='gh-status gh-no'; el.textContent='GitHub 미설정';
  }
}

async function saveToGitHub(){
  const cfg = loadGhCfg();
  if(!cfg.token||!cfg.owner||!cfg.repo){
    toast('⚙️ GitHub 설정을 먼저 해주세요'); openGhSettings(); return;
  }
  saveDB();
  const btn = document.getElementById('gh-save-btn');
  btn.disabled=true; btn.textContent='⏳ 저장 중...';
  try{
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2))));
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
    // get current SHA (needed for update)
    let sha = null;
    try{
      const r = await fetch(`${url}?ref=${cfg.branch||'main'}`,{headers:{Authorization:`token ${cfg.token}`,'Accept':'application/vnd.github.v3+json'}});
      if(r.ok){ const j=await r.json(); sha=j.sha; }
    }catch(e){}

    const body = {
      message:`[admin] DB update ${new Date().toLocaleString('ko-KR')}`,
      content,
      branch: cfg.branch||'main',
    };
    if(sha) body.sha = sha;

    const res = await fetch(url,{
      method:'PUT',
      headers:{Authorization:`token ${cfg.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify(body)
    });
    if(res.ok){
      toast('✅ GitHub 저장 완료! Vercel 재배포 시작됩니다');
      btn.textContent='☁️ GitHub 저장';
    } else {
      const j = await res.json();
      toast('❌ 저장 실패: '+(j.message||res.status));
      btn.textContent='☁️ GitHub 저장';
    }
  }catch(e){
    toast('❌ 오류: '+e.message);
    btn.textContent='☁️ GitHub 저장';
  }
  btn.disabled=false;
}

function loadDB(){
  const s = localStorage.getItem(DB_KEY);
  if(s){ DB = JSON.parse(s); return; }
  const legacy = localStorage.getItem('plave_poca_db_v2');
  DB = legacy ? migrateDB(JSON.parse(legacy)) : JSON.parse(JSON.stringify(DEF_DB));
}
function saveDB(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }
function genId(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fAlb(id){ return DB.albumTypes.find(a=>a.id===id); }
function fSet(ai,si){ const a=fAlb(ai); return a?a.sets.find(s=>s.id===si):null; }
function fCard(ai,si,ci){ const s=fSet(ai,si); return s?s.cards.find(c=>c.id===ci):null; }

function newCard(name, type, member, unit, mmmm){
  return { id:genId('c'), name:name||'카드', img:null,
    cardType:type||'Individual', member:member||null,
    unit:unit||null, mmmm:mmmm||null, memo:'' };
}

function migrateDB(old){
  const n = JSON.parse(JSON.stringify(old));
  n.meta = n.meta||{}; n.meta.version = '3.0.0';
  for(const alb of n.albumTypes){
    if(!alb.albumType) alb.albumType = 'POCAALBUM';
    for(const set of (alb.sets||[])){
      for(const card of (set.cards||[])){
        if(!card.cardType){
          const m = MEMBERS.find(m=>m.ko===card.name);
          card.cardType = m ? 'Individual' : 'All';
          card.member = m ? m.ko : null;
          card.unit = null; card.mmmm = null;
        }
        if(card.memo===undefined) card.memo = '';
      }
    }
  }
  return n;
}

// ── HELPERS ────────────────────────────────────────────

function getTypeCls(ct){
  return {Individual:'tb-ind',All:'tb-all',Unit:'tb-unit',MMMM:'tb-mmmm'}[ct]||'tb-ind';
}
function getTypeLabel(card){
  switch(card.cardType){
    case'Individual': return card.member||'개인';
    case'All': return '단체';
    case'Unit': return card.unit||'유닛';
    case'MMMM': return card.mmmm||'므메미무';
    default: return card.cardType||'?';
  }
}
function getTypeEnLabel(card){
  switch(card.cardType){
    case'Individual':{
      const m=MEMBERS.find(m=>m.ko===card.member);
      return m?m.en:(card.member||'Individual');
    }
    case'All': return 'All';
    case'Unit':{
      const u=UNITS.find(u=>u.ko===card.unit);
      if(!u) return card.unit||'Unit';
      return u.members.map(mk=>{const m=MEMBERS.find(m=>m.ko===mk);return m?m.en:mk;}).join(' & ');
    }
    case'MMMM':{
      const mm=MMMM_LIST.find(m=>m.ko===card.mmmm);
      return mm?mm.en:(card.mmmm||'MMMM');
    }
    default: return card.cardType||'?';
  }
}
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){
  const w=document.getElementById('toast-wrap');
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  w.appendChild(el); setTimeout(()=>el.remove(),2200);
}

      <div class="chip-row">
        ${MEMBERS.map(m=>{

    </div>`;
  } else if(card.cardType==='Unit'){
    subHtml = `<div style="margin-top:8px"><label class="fl">유닛 선택</label>
      <div class="unit-grid">
        ${UNITS.map(u=>{
          const on = card.unit===u.ko;
          const enMembers = u.members.map(mk=>{const m=MEMBERS.find(m=>m.ko===mk);return m?m.en:mk;}).join(' & ');
          return `<div class="unit-opt${on?' on':''}" onclick="setCardUnit('${u.ko}')">
            ${u.ko}<span class="unit-sub">${enMembers}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  } else if(card.cardType==='MMMM'){
    subHtml = `<div style="margin-top:8px"><label class="fl">므메미무 선택</label>
      <div class="mmmm-grid">
        ${MMMM_LIST.map(m=>{
          const on = card.mmmm===m.ko;
          return `<div class="mmmm-opt${on?' on':''}" onclick="setCardMMMM('${m.ko}')">
            ${m.ko}<span class="mmmm-sub">${m.en}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const enInfo = getTypeEnLabel(card);
  document.getElementById('card-modal-body').innerHTML = `
    <div class="fg"><label class="fl">카드 이름</label>
      <input id="cm-name" value="${escH(card.name)}" oninput="updEditField('name',this.value)">
    </div>
    <div class="fg"><label class="fl">카드 타입</label>
      <div class="type-sel-row">${typeBtns}</div>
      ${subHtml}
    </div>
    <div class="fg"><label class="fl">메모 💬</label>
      <textarea class="memo-textarea" placeholder="예: 랜덤 포카 SSR · 홀로그램 · 한정 특전 등 특징을 적어주세요" oninput="updEditField('memo',this.value)">${escH(card.memo||'')}</textarea>

    <div style="font-size:10px;color:var(--tx3);padding:6px 8px;background:var(--sur2);border-radius:var(--r-sm);display:flex;gap:10px;flex-wrap:wrap">

function previewImg(inp){
  if(!inp.files[0]) return;
  imgFileRaw = inp.files[0];
  const r = new FileReader();
  r.onload = e=>{
    imgPending = e.target.result; // base64 for preview only
    document.getElementById('img-preview').innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
  };
  r.readAsDataURL(inp.files[0]);

async function applyImg(){
  const c = fCard(imgAlb,imgSet,imgCard); if(!c) return;
  if(!imgPending){ closeModal('img-modal'); return; }

  const cfg = loadGhCfg();
  const btn = document.getElementById('img-apply-btn');

  // GitHub 설정이 있으면 이미지를 파일로 push
  if(cfg.token && cfg.owner && cfg.repo && imgFileRaw){
    btn.disabled=true; btn.textContent='⏳ 업로드 중...';
    try{
      // 파일 확장자 추출
      const ext = imgFileRaw.name.split('.').pop().toLowerCase() || 'webp';
      const imgPath = (cfg.path||'poca_db.json').replace(/[^/]+$/, '') + `images/cards/${c.id}.${ext}`;
      const imgUrl  = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${imgPath}`;

      // base64 데이터만 추출 (data:...;base64, 제거)
      const b64 = imgPending.split(',')[1];

      // 기존 파일 SHA 확인
      let sha = null;
      try{
        const r = await fetch(`${imgUrl}?ref=${cfg.branch||'main'}`,{headers:{Authorization:`token ${cfg.token}`,'Accept':'application/vnd.github.v3+json'}});
        if(r.ok){ const j=await r.json(); sha=j.sha; }
      }catch(e){}

      const body = { message:`[admin] image update: ${c.name}`, content:b64, branch:cfg.branch||'main' };
      if(sha) body.sha = sha;

      const res = await fetch(imgUrl,{
        method:'PUT',
        headers:{Authorization:`token ${cfg.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
        body:JSON.stringify(body)
      });

      if(res.ok){
        // DB에는 상대 경로만 저장
        const relPath = `./images/cards/${c.id}.${ext}`;
        c.img = relPath;
        saveDB();
        closeModal('img-modal'); renderSetView();
        toast(`✅ 이미지 업로드 완료! (${relPath})`);
        // DB도 자동 저장
        saveToGitHub();
      } else {
        const j = await res.json();
        toast('❌ 이미지 업로드 실패: '+(j.message||res.status));
      }
    }catch(e){
      toast('❌ 오류: '+e.message);
    }
    btn.disabled=false; btn.textContent='적용';
  } else {
    // GitHub 미설정이면 기존처럼 base64로 로컬 저장
    if(imgPending) c.img = imgPending;
    saveDB(); closeModal('img-modal'); renderSetView();
    toast(cfg.token ? '이미지 저장됨 (GitHub 미설정 — 로컬만)' : '이미지 저장됨 ✓');
  }
}

function clearImg(){
  const c = fCard(imgAlb,imgSet,imgCard);
  if(c){ c.img=null; saveDB(); renderSetView(); }
  closeModal('img-modal'); toast('이미지 제거됨');
}

function handleImport(inp){

      let d = JSON.parse(e.target.result);
      const needsMigration = d.albumTypes && d.albumTypes.some(a=>a.sets.some(s=>s.cards.some(c=>!c.cardType)));

  };
  r.readAsText(inp.files[0]);
}

  const res = await fetch(url,{method:'PUT',headers:{Authorization:`token ${cfg.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});

async function loadDBFromGitHub(){
  const cfg = loadGhCfg();
  if(!cfg.token||!cfg.owner||!cfg.repo) return false;
  try{
    const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'poca_db.json'}?ref=${cfg.branch||'main'}`;
    const r=await fetch(url,{headers:{Authorization:`token ${cfg.token}`,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) return false;
    const j=await r.json();
    const d=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
    applyDB(d);
    toast('✅ GitHub에서 DB 로드됨');
    return true;
  }catch(e){ return false; }
}

async function init(){
  updateGhStatus();

  // 1순위: 로컬 fetch (웹서버/GitHub Pages 환경)
  try{
    const r = await fetch('./poca_db.json?t='+Date.now());
    if(r.ok){
      const text = await r.text();
      const d = JSON.parse(text);
      applyDB(d);
      toast('✅ DB 로드됨');
      return;
    }
  }catch(e){ console.warn('fetch poca_db.json 실패:', e); }

  // 2순위: GitHub API
  const ghOk = await loadDBFromGitHub();
  if(ghOk) return;

  // 3순위: localStorage
  loadDB();
  if(DB && DB.albumTypes && DB.albumTypes.length){
    renderSidebar();
    toast('⚠️ 로컬 저장 데이터로 로드됨');
    return;
  }

  // 아무것도 없으면 안내
  renderSidebar();
  document.getElementById('content').innerHTML=`
    <div class="empty" style="padding-top:60px">
      <div style="font-size:28px;margin-bottom:10px">⚠️</div>
      <div style="margin-bottom:12px">DB를 불러올 수 없어요</div>
      <div style="font-size:11px;color:var(--tx3);margin-bottom:14px;line-height:1.8">
        poca_db.json이 같은 폴더에 있는지 확인하거나<br>
        GitHub 설정 후 다시 시도해주세요.
      </div>
      <button class="btn btn-p btn-sm" onclick="document.getElementById('imp-inp').click()">📥 DB 가져오기</button>
      <button class="btn btn-s btn-sm" style="margin-left:6px" onclick="openGhSettings()">⚙️ GitHub 설정</button>
    </div>`;
}

// Entry point — check session first, otherwise show lock
if(!checkSession()){
  // lock screen is already visible, init() called after successful unlock
}
</script>
</body>
</html>
